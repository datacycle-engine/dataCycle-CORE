version: '3.8'
services:
  postgres:
    image: 'git.pixelpoint.biz:5050/data-cycle/data-cycle-core/postgres:latest'
    environment:
      - ALLOW_IP_RANGE=0.0.0.0/0
      - POSTGRES_PASSWORD=password
    command: 'postgres -c config_file=/etc/postgresql.conf'
    ports:
      - ${PUBLIC_POSTGRES_PORT:-5432}:5432
    shm_size: 4gb
    volumes:
      - ./docker/postgres/postgresql.conf:/etc/postgresql.conf
  mongodb:
    image: 'mvertes/alpine-mongo:4.0.6-1'
    ports:
      - '${PUBLIC_MONGODB_PORT:-27017}:27017'
  web:
    build:
      context: ${COMPOSE_WEB_BUILD_CONTEXT:-../../../}
      dockerfile: ${COMPOSE_WEB_DOCKER_FILE:-./vendor/gems/data-cycle-core/Dockerfile}
    env_file:
      - ${COMPOSE_WEB_BUILD_CONTEXT:-../../../}.env
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_VERSION=11
      - POSTGRES_DATABASE=${COMPOSE_PROJECT_NAME}_development
      - MONGODB_HOST=mongodb
      - ALLOW_IP_RANGE=172.18.0.0/12
      - TZ=Europe/Vienna
      - MAILHOG_HOST=mailhog
      - APPLICATION_ROOT=${APPLICATION_ROOT:-/var/www/app}
      - APP_PROTOCOL=http
      - APP_HOST=localhost:${PUBLIC_APPLICATION_PORT:-3003}
      - PUBLIC_APPLICATION_PORT=${PUBLIC_APPLICATION_PORT:-3003}
      - SSH_AUTH_SOCK=/ssh-agent
    command:
      - ${COMPOSE_WEB_COMMAND:-./vendor/gems/data-cycle-core/docker/setup.sh}
    volumes:
      - 'gems:/gems'
      - '${COMPOSE_WEB_BUILD_CONTEXT:-../../../}:/var/www/app'
      - $SSH_AUTH_SOCK:/ssh-agent
    user: root
    links:
      - postgres
      - mongodb
    stdin_open: true
    tty: true
  mailhog:
    image: yappabe/mailhog
    environment:
      DNSDOCK_ALIAS: localhost
    ports:
      - '${PUBLIC_MAILHOG_PORT:-1025}:8025'
  redis:
    image: 'redis:latest'
    command: redis-server
    volumes:
      - 'redis:/data'
    ports:
      - '${PUBLIC_REDIS_PORT:-6379}:6379'
  nginx:
    image: nginx:1.19.4-alpine
    ports:
      - '${PUBLIC_NGINX_HTTP_PORT:-80}:80'
      - '${PUBLIC_APPLICATION_PORT:-3003}:${PUBLIC_APPLICATION_PORT:-3003}'
    env_file:
      - ${COMPOSE_WEB_BUILD_CONTEXT:-../../../}.env
    environment:
      - APPLICATION_ROOT=${APPLICATION_ROOT:-/var/www/app}
      - PUBLIC_APPLICATION_PORT=${PUBLIC_APPLICATION_PORT:-3003}
    volumes:
      - '${COMPOSE_WEB_BUILD_CONTEXT:-../../../}:/var/www/app'
      - './docker/nginx/templates/default.conf.template:/etc/nginx/templates/default.conf.template'
    links:
      - web
      - imaginary
  imaginary:
    image: h2non/imaginary:latest
    environment:
      PORT: 9000
    command: -enable-url-source -concurrency 20
    ports:
      - '${PUBLIC_IMAGINARY_PORT:-9000}:9000'
volumes:
  gems:
  redis:
  nginx:
