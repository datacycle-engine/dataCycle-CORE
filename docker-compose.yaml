version: '3.8'
services:
  postgres:
    image: 'git.pixelpoint.biz:5050/data-cycle/data-cycle-core/postgres:latest'
    environment:
      - ALLOW_IP_RANGE=0.0.0.0/0
      - POSTGRES_PASSWORD=password
    command: 'postgres'
    ports:
      - '5446:5432'
    shm_size: 4gb
  mongodb:
    image: 'mvertes/alpine-mongo:4.0.6-1'
    ports:
      - '27026:27017'
  web:
    build:
      context: $COMPOSE_WEB_BUILD_CONTEXT
      dockerfile: $COMPOSE_WEB_DOCKER_FILE
    env_file:
      - $COMPOSE_WEB_BUILD_CONTEXT/.env
    command:
      - $COMPOSE_WEB_COMMAND
    volumes:
      - 'gems:/gems'
      - '$COMPOSE_WEB_BUILD_CONTEXT:/var/www/app'
      - $SSH_AUTH_SOCK:/ssh-agent
    user: root
    links:
      - postgres
      - mongodb
    stdin_open: true
    tty: true
  mailhog:
    image: yappabe/mailhog
    environment:
      DNSDOCK_ALIAS: localhost
    ports:
      - '1035:8025'
  redis:
    image: 'redis:latest'
    command: redis-server
    volumes:
      - 'redis:/data'
    ports:
      - '6380:6379'
  nginx:
    image: nginx:1.19.4-alpine
    ports:
      - '80:80'
      - '$APPLICATION_PORT:$APPLICATION_PORT'
    env_file:
      - $COMPOSE_WEB_BUILD_CONTEXT/.env
    volumes:
      - '$COMPOSE_WEB_BUILD_CONTEXT:/var/www/app'
      - './docker/nginx/templates/default.conf.template:/etc/nginx/templates/default.conf.template'
    links:
      - web
      - imaginary
  imaginary:
    image: h2non/imaginary:latest
    environment:
      PORT: 9000
    command: -enable-url-source -concurrency 20
    ports:
      - '9000:9000'
volumes:
  gems:
  redis:
  nginx:
