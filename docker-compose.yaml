version: '3.8'
services:
  postgres:
    image: 'git.pixelpoint.biz:5050/data-cycle/data-cycle-core/postgres:latest'
    environment:
      - ALLOW_IP_RANGE=0.0.0.0/0
      - POSTGRES_PASSWORD=password
    command: 'postgres'
    ports:
      - '5446:5432'
    shm_size: 4gb
  mongodb:
    image: 'mvertes/alpine-mongo:4.0.6-1'
    ports:
      - '27026:27017'
  web:
    build: .
    environment:
      # - RAILS_ENV=production
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      # - POSTGRES_VERSION=11
      - MONGODB_HOST=mongodb
      - ALLOW_IP_RANGE=172.18.0.0/12
      - TZ=Europe/Vienna
      - APP_HOST=localhost:3010
      - APP_PROTOCOL=http
      - MAILHOG_HOST=mailhog
      - SSH_AUTH_SOCK=/ssh-agent
      - RAILS_LOG_TO_STDOUT=true
      # - SSH_AUTH_SOCK=/run/host-services/ssh-auth.sock  # SSH-forwarding for Mac
      # - WEBHOOKS=Local-Text-File
      - 'CORE_RAKE_PREFIX=app:'
    command:
      - ./docker/core-dummy-setup.sh
    volumes:
      - 'gems:/gems'
      - '.:/var/www/app'
      - $SSH_AUTH_SOCK:/ssh-agent
    # - /run/host-services/ssh-auth.sock:/run/host-services/ssh-auth.sock  # SSH-forwarding for Mac
    user: root
    #    ports:
    #      - '3010:3000'
    links:
      - postgres
      - mongodb
    stdin_open: true
    tty: true
  #    depends_on:
  #      - chrome
  mailhog:
    image: yappabe/mailhog
    environment:
      DNSDOCK_ALIAS: localhost
    ports:
      - '1035:8025'
  redis:
    image: 'redis:latest'
    command: redis-server
    volumes:
      - 'redis:/data'
    ports:
      - '6380:6379'
  nginx:
    ports:
      - '80:80'
      - '3010:3010'
    build:
      context: ./docker/nginx
    volumes:
      - '.:/var/www/app'
      - './docker/nginx/default.conf:/etc/nginx/conf.d/default.conf'
    links:
      - web
      - imaginary
  imaginary:
    image: h2non/imaginary:latest
    environment:
      PORT: 9000
    command: -enable-url-source -concurrency 20
    ports:
      - '9000:9000'
volumes:
  gems:
  redis:
  nginx:
