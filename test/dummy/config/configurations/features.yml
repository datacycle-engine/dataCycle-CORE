:publication_schedule:
  :enabled: true
  :classification_keys:
    - output_channel

:download:
  :enabled: true
  :collections:
    :content:
      :enabled: true
    :watch_list:
      :enabled: true
      :serializers:
        :json: true
        :xml: true
    :stored_filter:
      :enabled: true
      :serializers:
        :json: true
        :xml: true

:serialize:
  :enabled: true
  :serializers:
    :asset: true
    :json: true
    :xml: true

:overlay:
  :enabled: true

:container:
  :enabled: true

:external_media_archive:
  :enabled: false

:normalize:
  :enabled: true
  :external_source: Econob Normalize
  :endpoint: DataCycleCore::MasterData::Normalizer::Endpoint

:duplicate_content:
  :enabled: true

:releasable:
  :enabled: true

:main_filter:
  :autoload_last_filter: true

:advanced_filter:
  :boolean:
    - duplicate_candidates
  :advanced_attributes:
    :width:
      :type: numeric
    :height:
      :type: numeric
    :content_size:
      :type: numeric
    :contact_info.email:
      :type: string
    :address.postal_code:
      :type: string
    :upload_date:
      :type: date
    :mandatory_license:
      :type: boolean

:duplicate_candidate:
  :enabled: true

:content_lock:
  :enabled: true

:user_api:
  :enabled: true
