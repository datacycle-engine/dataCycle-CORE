default: &default
  adapter: postgis
  encoding: unicode
  # For details on connection pooling, see rails configuration guide
  # http://guides.rubyonrails.org/configuring.html#database-pooling
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

  username: <%= ENV["POSTGRES_USER"] || "developer" %>
  password: <%= ENV["POSTGRES_PASSWORD"] || "password" %>
  host:     <%= ENV["POSTGRES_HOST"] || "localhost" %>
  port:     <%= ENV["POSTGRES_PORT"] || 5432 %>
  schema_search_path: public, postgis

development:
  <<: *default
  database: data_cycle_core_development

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: data_cycle_core_test

staging:
  <<: *default
  username: <%= ENV["POSTGRES_USER"] || "data_cycle_core" %>
  password: <%= ENV["POSTGRES_PASSWORD"] || "1H2fpD6kaif92kyfC79acT" %>
  host:     <%= ENV["POSTGRES_HOST"] || "localhost" %>
  port:     <%= ENV["POSTGRES_PORT"] || 5433 %>
  database: data-cycle-core_staging

