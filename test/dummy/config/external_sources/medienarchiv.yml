#      tag_name_path: 'keywords'
#      external_id_prefix: 'MedienArchive - keyword - '
    images:
      sorting: 5
      source_type: images
      import_strategy: DataCycleCore::Generic::MediaArchive::ImportImages
      transformations:
        place:
          content_type: DataCycleCore::Place
          template: Örtlichkeit
        image:
          content_type: DataCycleCore::CreativeWork
          template: Bild
          place_template: Örtlichkeit
          default_values:
            output_channel:
              tree_label: Ausgabekanäle
              value: Medienarchiv
    videos:
      sorting: 6
      source_type: videos
      import_strategy: DataCycleCore::Generic::MediaArchive::ImportVideos
      transformations:
        place:
          content_type: DataCycleCore::Place
          template: Örtlichkeit
        director:
          content_type: DataCycleCore::Thing
          template: Person
        contributor:
          content_type: DataCycleCore::Thing
          template: Person
        video:
          content_type: DataCycleCore::CreativeWork
          template: Video
          place_template: Örtlichkeit
          default_values:
            output_channel:
              tree_label: Ausgabekanäle
              value: Medienarchiv
