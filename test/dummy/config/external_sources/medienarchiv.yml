          content_type: DataCycleCore::Person
          template: Person
        contributor:
          content_type: DataCycleCore::Person
          template: Person
        video:
          content_type: DataCycleCore::CreativeWork
          template: Video
          place_template: Örtlichkeit
          default_values:
            output_channel:
