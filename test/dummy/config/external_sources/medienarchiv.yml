    tags_images:
      sorting: 1
      source_type: images
      import_strategy: DataCycleCore::Generic::Common::ImportTags
      tree_label: MediaArchive - Tags
      tag_id_path: 'keywords'
      tag_name_path: 'keywords'
      external_id_prefix: 'MedienArchive - keyword - '
#    tags_videos:
#      sorting: 2
#      source_type: videos
#      import_strategy: DataCycleCore::Generic::Common::ImportTags
#      tree_label: MediaArchive - Tags
