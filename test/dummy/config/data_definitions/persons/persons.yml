---
- :data:
    :name: Person
    :type: object
    :content_type: entity
    :permissions:
      :read_write: true
    :boost: 1.0
    :properties:
      :id:
        :label: id
        :type: string
        :storage_type: string
        :storage_location: key
        :validations:
          :format: uuid
      :given_name:
        :label: Vorname
        :type: string
        :storage_type: string
        :storage_location: column
        :search: true
        :validations:
          :minLength: 1
        :editor:
          :type: input
          :sorting: 1
          :options:
            :data-validate: text
      :family_name:
        :label: Nachname
        :type: string
        :storage_type: string
        :storage_location: column
        :search: true
        :validations:
          :minLength: 1
        :editor:
          :type: input
          :sorting: 2
          :options:
            :data-validate: text
      :honorific_prefix:
        :label: "Anrede / Titel"
        :type: string
        :storage_type: string
        :storage_location: content
        :editor:
          :type: input
          :sorting: 3
      :telephone:
        :label: Telefonnummer
        :type: string
        :storage_type: string
        :storage_location: metadata
        :editor:
          :type: input
          :sorting: 4
      :fax_number:
        :label: Fax
        :type: string
        :storage_type: string
        :storage_location: metadata
        :editor:
          :type: input
          :sorting: 5
      :email:
        :label: E-Mail
        :type: string
        :storage_type: string
        :storage_location: metadata
        :editor:
          :type: input
          :sorting: 6
      :job_title:
        :label: Position
        :type: string
        :storage_type: string
        :storage_location: content
        :search: true
        :editor:
          :type: input
          :sorting: 7
      :gender:
        :label: Geschlecht
        :type: classificationTreeLabel
        :type_name: Geschlecht
        :storage_location: classification_relation
        :editor:
          :type: classificationSelector
          :sorting: 8
          :options:
            :tabindex: -1
      :data_type:
        :label: Inhaltstype
        :type: classificationTreeLabel
        :type_name: Inhaltstypen
        :storage_location: classification_relation
        :default_value: "Person"
      :creator:
        :label: Ersteller
        :type: embeddedLink
        :type_name: users
        :storage_type: string
        :storage_location: metadata
      :date_created:
        :label: Erstellungsdatum
        :type: string
        :storage_type: string
        :storage_location: metadata
        :validations:
          :format: date_time
      :date_modified:
        :label: Änderungsdatum
        :type: string
        :storage_type: string
        :storage_location: metadata
        :validations:
          :format: date_time