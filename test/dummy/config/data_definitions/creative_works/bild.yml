---
- :data:
    :name: Bild
    :description: ImageObject
    :type: object
    :content_type: embedded
    :permissions:
      :read_write: true
    :boost: 10.0
    :properties:
      :id:
        :label: id
        :type: string
        :storage_type: string
        :storage_location: key
        :validations:
          :format: uuid
      :headline:
        :label: Titel
        :type: string
        :storage_type: string
        :storage_location: column
        :search: true
        :editor:
          :type: input
          :sorting: 1
          :options:
            :data-validate: text
      :caption:
        :label: Alt-Label
        :type: string
        :storage_type: string
        :storage_location: content
        :search: true
        :editor:
          :sorting: 3
          :type: input
      :description:
        :label: Beschreibung
        :type: string
        :storage_type: text
        :storage_location: column
        :search: true
        :editor:
          :type: quillEditor
          :sorting: 4
          :options:
            :data-size: basic
            :tabindex: -1
      :url:
        :label: URL
        :type: string
        :storage_type: string
        :storage_location: metadata
        :validations:
          :format: url
        :editor:
          :type: input
          :sorting: 5
          :options:
            :data-validate: text
      :content_url:
        :label: URL
        :type: string
        :storage_type: string
        :storage_location: metadata
        :validations:
          :format: url
        :editor:
          :type: input
          :sorting: 6
          :options:
            :data-validate: text
      :thumbnail_url:
        :label: Thumbnail URL
        :type: string
        :storage_type: string
        :storage_location: metadata
        :validations:
          :format: url
        :editor:
          :type: image
          :sorting: 2
      :width:
        :label: Breite
        :type: number
        :storage_type: number
        :storage_location: metadata
        :validations:
          :format: integer
        :editor:
          :type: input
          :sorting: 7
      :height:
        :label: Höhe
        :type: number
        :storage_type: number
        :storage_location: metadata
        :validations:
          :format: integer
        :editor:
          :type: input
          :sorting: 8
      :content_size:
        :label: Dateigröße
        :type: number
        :storage_type: number
        :storage_location: metadata
        :validations:
          :format: integer
        :editor:
          :type: input
          :sorting: 9
      :photographer:
        :label: Fotograf
        :type: string
        :storage_type: string
        :storage_location: metadata
        :search: true
        :editor:
          :type: input
          :sorting: 10
      :license:
        :label: Copyright / Lizenz
        :type: string
        :storage_type: string
        :storage_location: metadata
        :search: true
        :editor:
          :type: input
          :sorting: 11
      #meta attributes
      :validity_period:
        :label: Gültigkeitszeitraum
        :type: object
        :storage_location: metadata
        :validations:
          :daterange:
            :from: valid_from
            :to: valid_until
        :editor:
          :sorting: 99
          :options:
            :class: daterange
            :tabindex: -1
        :properties:
          :valid_from:
            :label: Gültigkeit
            :type: string
            :storage_type: string
            :storage_location: metadata
            :validations:
              :format: date_time
            :editor:
              :type: date
              :options:
                :data-type: datepicker
                :data-validate: daterange
                :placeholder: tt.mm.jjjj
          :valid_until:
            :label: bis
            :type: string
            :storage_type: string
            :storage_location: metadata
            :validations:
              :format: date_time
            :editor:
              :type: date
              :options:
                :data-type: datepicker
                :data-validate: daterange
                :placeholder: tt.mm.jjjj
      :data_type:
        :label: Inhaltstyp
        :type: classificationTreeLabel
        :type_name: Inhaltstypen
        :storage_location: classification_relation
        :default_value: "Bild"
      :creator:
        :label: Ersteller
        :type: embeddedLink
        :type_name: users
        :storage_type: string
        :storage_location: metadata
      :date_created:
        :label: Erstellungsdatum
        :type: string
        :storage_type: string
        :storage_location: metadata
        :validations:
          :format: date_time
      :date_modified:
        :label: Änderungsdatum
        :type: string
        :storage_type: string
        :storage_location: metadata
        :validations:
          :format: date_time