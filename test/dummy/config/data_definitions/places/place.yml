---
- :data:
    :name: Ort
    :description: Place
    :type: object
    :content_type: entity
    :permissions:
      :read_write: true
    :boost: 1.0
    :properties:
      :id:
        :label: id
        :type: string
        :storage_type: string
        :storage_location: key
        :validations:
          :format: uuid
      :name:
        :label: Titel
        :type: string
        :storage_type: string
        :storage_location: column
        :search: true
        :validations:
          :minLength: 1
        :editor:
          :type: input
          :sorting: 1
          :options:
            :data-validate: text
      :address:
        :label: Adresse
        :type: object
        :storage_location: metadata
        :editor:
          :sorting: 2
        :properties:
          :address_locality:
            :label: Ort
            :type: string
            :storage_type: string
            :storage_location: column
            :editor:
              :type: input
              :sorting: 1
          :street_address:
            :label: Straße
            :type: string
            :storage_type: string
            :storage_location: column
            :editor:
              :type: input
              :sorting: 2
          :postal_code:
            :label: PLZ
            :type: string
            :storage_type: string
            :storage_location: column
            :editor:
              :type: input
              :sorting: 3
          :address_country:
            :label: Land
            :type: string
            :storage_type: string
            :storage_location: column
            :editor:
              :type: input
              :sorting: 4
      :longitude:
        :label: Longitude
        :type: number
        :storage_type: number
        :storage_location: column
        :validations:
          :format: float
        :editor:
          :options:
            :data-type: input
            :data-validate: text
          :sorting: 3
      :latitude:
        :label: Latitude
        :type: number
        :storage_type: number
        :storage_location: column
        :validations:
          :format: float
        :editor:
          :options:
            :data-type: input
            :data-validate: text
          :sorting: 4
      :location:
        :label: GPS-Koordinaten
        :type: geographic
        :storage_type: geographic
        :storage_location: column
        :editor:
          :sorting: 5
          :options:
            :disabled: disabled
      #meta attributes
      :data_type:
        :label: Inhaltstype
        :type: classificationTreeLabel
        :type_name: Inhaltstypen
        :storage_location: classification_relation
        :default_value: "Ort"
      :creator:
        :label: Ersteller
        :type: embeddedLink
        :type_name: users
        :storage_type: string
        :storage_location: metadata
      :date_created:
        :label: Erstellungsdatum
        :type: string
        :storage_type: string
        :storage_location: metadata
        :validations:
          :format: date_time
      :date_modified:
        :label: Änderungsdatum
        :type: string
        :storage_type: string
        :storage_location: metadata
        :validations:
          :format: date_time