          :type: input
      :telephone:
        :label: Telefonnummer
        :type: string
        :storage_location: value
        :editor:
          :type: input
      :fax_number:
        :label: Fax
        :type: string
        :storage_location: value
        :editor:
          :type: input
      :email:
        :label: E-Mail
        :type: string
        :storage_location: value
        :editor:
          :type: input
      :job_title:
        :label: Position
        :type: string
        :storage_location: translated_value
        :editor:
          :type: input
      :data_type:
