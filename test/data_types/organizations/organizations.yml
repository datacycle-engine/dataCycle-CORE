---
- :data:
    :name: Organization
    :type: object
    :content_type: entity
    :permissions:
      :read_write: true
    :boost: 1.0
    :properties:
      :id:
        :label: id
        :type: key
      :name:
        :label: Name
        :type: string
        :storage_location: translated_value
        :search: true
        :validations:
          :min: 1
        :editor:
          :type: input
          :options:
            :data-validate: text
      :legal_name:
        :label: Firmenname
        :type: string
        :storage_location: translated_value
        :search: true
        :validations:
          :min: 1
        :editor:
          :type: input
          :options:
            :data-validate: text
      :telephone:
        :label: Telefonnummer
        :type: string
        :storage_location: value
        :editor:
          :type: input
      :fax_number:
        :label: Fax
        :type: string
        :storage_location: value
        :editor:
          :type: input
      :email:
        :label: E-Mail
        :type: string
        :storage_location: value
        :editor:
          :type: input
      :address:
        :label: Adresse
        :type: object
        :storage_location: value
        :editor:
          :options:
            :class: detail_object
        :properties:
          :address_locality:
            :label: Ort
            :type: string
            :storage_location: value
            :editor:
              :type: input
          :street_address:
            :label: Straße
            :type: string
            :storage_location: value
            :editor:
              :type: input
          :postal_code:
            :label: PLZ
            :type: string
            :stroage_location: value
            :editor:
              :type: input
      :url:
        :label: Web
        :type: string
        :stroage_location: value
        :editor:
          :type: input
      :description:
        :label: Text
        :type: string
        :storage_location: column
        :search: true
        :editor:
          :type: quillEditor
          :options:
            :data-size: full
      :image:
        :label: Bild
        :type: linked
        :linked_table: creative_works
        :stroage_location: value
        :editor:
          :type: objectBrowser
          :options:
            :data-validate: media
            :data-type: image
      :data_type:
        :label: Inhaltstype
        :type: classification
        :tree_label: Inhaltstypen
        :default_value: "Organisation"
      :creator:
        :label: Ersteller
        :type: linked
        :table_name: users
        :validations:
          :max: 1
      :date_created:
        :label: Erstellungsdatum
        :type: datetime
        :stroage_location: value
      :date_modified:
        :label: Änderungsdatum
        :type: datetime
        :stroage_location: value
