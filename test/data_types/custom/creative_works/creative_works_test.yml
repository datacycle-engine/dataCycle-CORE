- :data:
    :name: ThemaTest
    :type: object
    :properties:
      :headline:
        :label: Titel
        :type: string
        :storage_location: column
        :validations:
          :min: 1
        :editor:
          :type: input
          :options:
            :data-validate: text
      :description:
        :label: Beschreibung
        :type: string
        :storage_location: column
        :editor:
          :type: quillEditor
          :options:
            :data-size: basic
      :topics:
        :label: Themenbereiche
        :type: classification
        :tree_label: Themenbereiche
        :editor:
          :type: classificationSelector
      :markets:
        :label: Zielmarkt
        :type: classification
        :tree_label: Märkte
        :editor:
          :type: classificationSelector
      :tags:
        :label: Tags
        :type: classification
        :tree_label: Tags
        :editor:
          :type: classificationSelector
      :state:
        :label: Bundesland
        :type: classification
        :tree_label: Bundesländer
        :validations:
          :max: 1
        :editor:
          :type: classificationSelector
          :options:
            :data-validate: classification
      :validity_period:
        :label: Gültigkeitszeitraum
        :type: object
        :storage_location: value
        :validations:
          :daterange:
            :from: valid_from
            :to: valid_until
        :editor:
          :options:
            :class: daterange validation-container
        :properties:
          :valid_from:
            :label: Gültigkeit
            :type: datetime
            :storage_location: value
            :editor:
              :type: date
              :options:
                :data-type: datepicker
                :data-validate: daterange
          :valid_until:
            :label: bis
            :type: datetime
            :storage_location: value
            :editor:
              :type: date
              :options:
                :data-type: datepicker
                :data-validate: daterange
      :data_pool:
        :label: Inhaltspool
        :type: classification
        :tree_label: Inhaltspools
        :default_value: "Aktuelle Inhalte"
        :ui:
          :show:
            :content_area: header
          :edit:
            :disabled: true
      :date_created:
        :label: Erstellungsdatum
        :type: datetime
        :storage_location: value
      :date_modified:
        :label: Änderungsdatum
        :type: datetime
        :storage_location: value

