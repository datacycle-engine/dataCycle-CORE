        :validations:
          :min: 1
        :ui:
          :show:
            :disabled: true
        :api:
          :minimal: true
          :name: headline
      :data_type:
        :label: Inhaltstype
        :type: classification
        :tree_label: Inhaltstypen
        :default_value: "Artikel"
      :data_pool:
        :label: Inhaltspool
        :type: classification
        :tree_label: Inhaltspools
        :default_value: "Aktuelle Inhalte"
        :ui:
          :show:
            :content_area: header
