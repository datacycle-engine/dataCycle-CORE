---
- :data:
    :name: Quiz
    :type: object
    :content_type: entity
    :releasable: true
    :boost: 100.0
    :properties:
      :id:
        :label: id
        :type: key
      :headline:
        :label: Arbeitstitel
        :type: string
        :storage_location: column
        :search: true
        :validations:
          :min: 1
        :editor:
          :type: input
          :options:
            :data-validate: text
      :headline_external:
        :label: Titel
        :type: string
        :storage_location: translated_value
        :search: true
        :validations:
          :min: 1
        :editor:
          :type: input
          :options:
            :data-validate: text
      :validity_period:
        :label: Gültigkeitszeitraum
        :type: object
        :storage_location: value
        :validations:
          :daterange:
            :from: valid_from
            :to: valid_until
        :editor:
          :options:
            :class: daterange
            :tabindex: -1
        :properties:
          :valid_from:
            :label: Gültigkeit
            :type: datetime
            :storage_location: value
            :editor:
              :type: date
              :options:
                :data-type: datepicker
                :data-validate: daterange
                :placeholder: tt.mm.jjjj
          :valid_until:
            :label: bis
            :type: datetime
            :storage_location: value
            :editor:
              :type: date
              :options:
                :data-type: datepicker
                :data-validate: daterange
                :placeholder: tt.mm.jjjj
      :alternative_headline:
        :label: Subüberschrift
        :type: string
        :storage_location: translated_value
        :search: true
        :editor:
          :type: input
      :description:
        :label: Teasertext
        :type: string
        :storage_location: column
        :search: true
        :editor:
          :type: quillEditor
          :options:
            :data-size: basic
            :tabindex: -1
      :question:
        :label: Frage
        :type: embedded
        :linked_table: creative_works
        :template_name: Frage
        :editor:
          :type: embeddedObject
      :topics:
        :label: Themenbereiche
        :type: classification
        :tree_label: Themenbereiche
        :editor:
          :type: classificationSelector
          :options:
            :tabindex: -1
      :markets:
        :label: Zielmarkt
        :type: classification
        :tree_label: Märkte
        :editor:
          :type: classificationSelector
          :options:
            :tabindex: -1
      :kind:
        :label: Inhaltsart
        :type: classification
        :tree_label: Inhaltsarten
        :editor:
          :type: classificationSelector
          :options:
            :tabindex: -1
      :season:
        :label: Jahreszeit
        :type: classification
        :tree_label: Jahreszeiten
        :editor:
          :type: classificationSelector
          :options:
            :tabindex: -1
      :state:
        :label: Bundesland
        :type: classification
        :tree_label: Bundesländer
        :editor:
          :type: classificationSelector
          :options:
            :data-validate: classification
            :tabindex: -1
      :tags:
        :label: Tags
        :type: classification
        :tree_label: Tags
        :editor:
          :type: classificationSelector
          :options:
            :tabindex: -1
      :output_channels:
        :label: Ausgabekanäle
        :type: classification
        :tree_label: Ausgabekanäle
        :editor:
          :type: classificationSelector
          :options:
            :tabindex: -1
      :permitted_creator:
        :label: Ersteller
        :type: classification
        :tree_label: Ersteller
        :editor:
          :type: classificationSelector
          :options:
            :tabindex: -1
      :data_pool:
        :label: Inhaltspool
        :type: classification
        :tree_label: Inhaltspools
        :default_value: "Aktuelle Inhalte"
        :ui:
          :show:
            :content_area: header
          :edit:
            :disabled: true
      :data_type:
        :label: Inhaltstype
        :type: classification
        :tree_label: Inhaltstypen
        :default_value: "Quiz"
      :creator:
        :label: Ersteller
        :type: linked
        :linked_table: users
        :validations:
          :max: 1
      :date_created:
        :label: Erstellungsdatum
        :type: datetime
        :storage_location: value
      :date_modified:
        :label: Änderungsdatum
        :type: datetime
        :storage_location: value

- :data:
    :name: Frage
    :type: object
    :content_type: embedded
    :permissions:
      :read_write: true
    :properties:
      :id:
        :label: id
        :type: key
      :headline:
        :label: Frage
        :type: string
        :storage_location: column
        :validations:
          :min: 1
        :editor:
          :type: input
          :options:
            :data-validate: text
      :text:
        :label: Hinweis
        :type: string
        :storage_location: translated_value
        :editor:
          :type: quillEditor
          :options:
            :data-size: basic
            :tabindex: -1
      :image:
        :label: Bild
        :type: linked
        :linked_table: creative_works
        :validations:
          :max: 1
        :editor:
          :type: objectBrowser
          :options:
            :data-validate: media
            :data-type: image
      :accepted_answer:
        :label: Richtige Antwort
        :type: embedded
        :linked_table: creative_works
        :template_name: Antwort
        :validations:
          :max: 1
        :editor:
          :type: embeddedObject
      :suggested_answer:
        :label: Falsche Antwort
        :type: embedded
        :linked_table: creative_works
        :template_name: Antwort
        :editor:
          :type: embeddedObject
      :data_type:
        :label: Inhaltstype
        :type: classification
        :tree_label: Inhaltstypen
        :default_value: "Frage"
      :creator:
        :label: Ersteller
        :type: linked
        :linked_table: users
        :validations:
          :max: 1
      :date_created:
        :label: Erstellungsdatum
        :type: datetime
        :storage_location: value
      :date_modified:
        :label: Änderungsdatum
        :type: datetime
        :storage_location: value

- :data:
    :name: Antwort
    :type: object
    :content_type: embedded
    :permissions:
      :read_write: true
    :properties:
      :id:
        :label: id
        :type: key
      :text:
        :label: Antwort
        :type: string
        :storage_location: translated_value
        :validations:
          :min: 1
        :editor:
          :type: quillEditor
          :options:
            :data-size: basic
            :data-validate: text
            :tabindex: -1
      :image:
        :label: Bild
        :type: linked
        :linked_table: creative_works
        :validations:
          :max: 1
        :editor:
          :type: objectBrowser
          :options:
            :data-validate: media
            :data-type: image
      :data_type:
        :label: Inhaltstype
        :type: classification
        :tree_label: Inhaltstypen
        :default_value: "Zitat"
      :creator:
        :label: Ersteller
        :type: linked
        :linked_table: users
        :validations:
          :max: 1
      :date_created:
        :label: Erstellungsdatum
        :type: datetime
        :storage_location: value
      :date_modified:
        :label: Änderungsdatum
        :type: datetime
        :storage_location: value
