---
- :data:
    :name: Video
    :type: object
    :content_type: entity
    :permissions:
      :read_write: false
    :boost: 1.0
    :properties:
      :id:
        :label: id
        :type: key
      :headline:
        :label: Titel
        :type: string
        :storage_location: column
        :search: true
      :description:
        :label: Beschreibung
        :type: string
        :storage_location: column
        :search: true
      :director:
        :label: Regie
        :type: object
        :storage_location: value
        :properties:
          :given_name:
            :label: Vorname
            :type: string
            :storage_location: value
          :family_name:
            :label: Familienname
            :type: string
            :storage_location: value
          :job_title:
            :label: Berufsbezeichnung
            :type: string
            :storage_location: value
      :contributor:
        :label: Kamera
        :type: object
        :storage_location: value
        :properties:
          :given_name:
            :label: Vorname
            :type: string
            :storage_location: value
          :family_name:
            :label: Familienname
            :type: string
            :storage_location: value
          :job_title:
            :label: Berufsbezeichnung
            :type: string
            :storage_location: value
      :creator:
        :label: Ersteller
        :type: linked
        :linked_table: users
        :validations:
          :max: 1
      :license:
        :label: Copyright / Lizenz
        :type: string
        :storage_location: value
      :mandatory_license:
        :label: Copyright Nennung verpflichtend
        :type: boolean
        :storage_location: value
      :content_location:
        :label: Ort
        :type: linked
        :linked_table: places
        :template_name: contentLocation
        :editor:
          :type: objectBrowser
      :width:
        :label: Breite
        :type: number
        :storage_location: value
        :validations:
          :format: integer
      :height:
        :label: Höhe
        :type: number
        :storage_location: value
        :validations:
          :format: integer
      :content_size:
        :label: Dateigröße
        :type: number
        :storage_location: value
        :validations:
          :format: integer
      :file_format:
        :label: Dateiformat
        :type: string
        :storage_location: value
      :duration:
        :label: Länge
        :type: string
        :storage_location: value
      :validity_period:
        :label: Gültigkeitszeitraum
        :type: object
        :storage_location: value
        :properties:
          :date_published:
            :label: Gültig von
            :type: datetime
            :storage_location: value
          :expires:
            :label: Gültig bis
            :type: datetime
            :storage_location: value
      :date_created:
        :label: Erstellungsdatum
        :type: datetime
        :storage_location: value
      :date_modified:
        :label: Änderungsdatum
        :type: datetime
        :storage_location: value
      :source:
        :label: Erhalten von
        :type: string
        :storage_location: value
      :visibility:
        :label: Sichtbarkeit
        :type: string
        :storage_location: value
      :access:
        :label: Rechte/Einsatzgebiet
        :type: classification
        :tree_label: Rechte
      :content_url:
        :label: Video URL
        :type: string
        :storage_location: value
        :validations:
          :format: url
      :image:
        :label: Teaserbild
        :type: string
        :storage_location: value
        :validations:
          :format: url
      :url:
        :label: URL
        :type: string
        :storage_location: value
        :validations:
          :format: url
      :data_type:
        :label: Inhaltstyp
        :type: classification
        :tree_label: Inhaltstypen
        :default_value: "Video"
      :data_pool:
        :label: Inhaltspool
        :type: classification
        :tree_label: Inhaltspools
        :default_value: "Aktuelle Inhalte"
      :restrictions:
        :label: Einschränkungen
        :type: string
        :storage_location: value
