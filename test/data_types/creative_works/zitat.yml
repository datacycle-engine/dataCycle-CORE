---
- :data:
    :name: Zitat
    :type: object
    :content_type: embedded
    :boost: 1.0
    :properties:
      :id:
        :label: id
        :type: key
      :text:
        :label: text
        :type: string
        :storage_location: translated_value
        :search: true
        :validations:
          :min: 1
        :editor:
          :type: quillEditor
          :options:
            :data-size: basic
            :data-validate: text
            :tabindex: -1
      :image:
        :label: Bild
        :type: linked
        :linked_table: creative_works
        :template_name: Bild
        :validations:
          :max: 1
        :editor:
          :type: objectBrowser
          :options:
            :data-validate: media
            :data-type: image
      :author:
        :label: "Zitat von"
        :type: linked
        :linked_table: persons
        :template_name: Person
        :editor:
          :type: objectBrowser
          :options:
            :data-validate: object
            :data-type: person
      :data_type:
        :label: Inhaltstype
        :type: classification
        :tree_label: Inhaltstypen
        :default_value: "Zitat"
      :creator:
        :label: Ersteller
        :type: linked
        :linked_table: users
        :validations:
          :max: 1
      :date_created:
        :label: Erstellungsdatum
        :type: datetime
        :storage_location: value
      :date_modified:
        :label: Änderungsdatum
        :type: datetime
        :storage_location: value
