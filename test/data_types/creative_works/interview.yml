---
- :data:
    :name: Interview
    :description: CreativeWork
    :type: object
    :content_type: variant
    :permissions:
      :read_write: true
    :properties:
      :id:
        :label: id
        :type: string
        :storage_type: string
        :storage_location: key
        :validations:
          :format: uuid
      :headline:
        :label: Titel
        :type: string
        :storage_type: string
        :storage_location: column
        :validations:
          :minLength: 1
        :editor:
          :type: input
          :sorting: 1
          :options:
            :data-validate: text
      :validity_period:
        :label: Gültigkeitszeitraum
        :type: object
        :storage_location: metadata
        :validations:
          :daterange:
            :from: valid_from
            :to: valid_until
        :editor:
          :sorting: 2
          :options:
            :class: daterange validation-container
            :tabindex: -1
        :properties:
          :valid_from:
            :label: Gültigkeit
            :type: string
            :storage_type: string
            :storage_location: metadata
            :validations:
              :format: date_time
            :editor:
              :type: date
              :options:
                :data-type: datepicker
                :data-validate: daterange
                :placeholder: tt.mm.jjjj
          :valid_until:
            :label: bis
            :type: string
            :storage_type: string
            :storage_location: metadata
            :validations:
              :format: date_time
            :editor:
              :type: date
              :options:
                :data-type: datepicker
                :data-validate: daterange
                :placeholder: tt.mm.jjjj
      :alternativeHeadline:
        :label: Subüberschrift
        :type: string
        :storage_type: string
        :storage_location: content
        :editor:
          :type: input
          :sorting: 3
      :description:
        :label: Teasertext
        :type: string
        :storage_type: text
        :storage_location: content
        :editor:
          :type: quillEditor
          :sorting: 4
          :options:
            :data-size: basic
      :text:
        :label: Interview
        :type: string
        :storage_type: text
        :storage_location: content
        :editor:
          :type: quillEditor
          :sorting: 5
          :options:
            :data-size: full
#      :video:
#        :label: Video
#        :type: embeddedLinkArray
#        :type_name: creative_works
#        :storage_type: array
#        :storage_location: metadata
#        :editor:
#          :sorting: 6
#      :audio:
#        :label: Audio
#        :type: embeddedLinkArray
#        :type_name: creative_works
#        :storage_type: array
#        :storage_location: metadata
#        :editor:
#          :sorting: 7
      :quotation:
        :label: Zitat
        :type: object
        :storage_location: creative_works
        :delete: true
        :name: Zitat
        :description: CreativeWork
        :validations:
          :maxLength: 1
        :editor:
          :type: embeddedObject
          :sorting: 8
          :options:
            :data-validate: text
      #meta attributes
      :topics:
        :label: Themenbereiche
        :type: classificationTreeLabel
        :type_name: Themenbereiche
        :storage_location: classification_relation
        :editor:
          :type: classificationSelector
          :sorting: 20
      :markets:
        :label: Zielmarkt
        :type: classificationTreeLabel
        :type_name: Märkte
        :storage_location: classification_relation
        :editor:
          :type: classificationSelector
          :sorting: 21
      :kind:
        :label: Inhaltsart
        :type: classificationTreeLabel
        :type_name: Inhaltsarten
        :storage_location: classification_relation
        :editor:
          :type: classificationSelector
          :sorting: 22
      :season:
        :label: Jahreszeit
        :type: classificationTreeLabel
        :type_name: Jahreszeiten
        :storage_location: classification_relation
        :editor:
          :type: classificationSelector
          :sorting: 23
      :state:
        :label: Bundesland
        :type: classificationTreeLabel
        :type_name: Bundesländer
        :storage_location: classification_relation
        :editor:
          :type: classificationSelector
          :sorting: 24
          :options:
            :data-validate: classification
      :tags:
        :label: Tags
        :type: classificationTreeLabel
        :type_name: Tags
        :storage_location: classification_relation
        :editor:
          :type: classificationSelector
          :sorting: 25
      :outputChannels:
        :label: Ausgabekanäle
        :type: classificationTreeLabel
        :type_name: Ausgabekanäle
        :storage_location: classification_relation
        :editor:
          :type: classificationSelector
          :sorting: 27
#      :data_pool:
#        :label: Inhaltspool
#        :type: classificationTreeLabel
#        :type_name: Inhaltspools
#        :storage_location: classification_relation
#        :default_value: "Aktuelle Themen"
      :data_type:
        :label: Inhaltstype
        :type: classificationTreeLabel
        :type_name: Inhaltstypen
        :storage_location: classification_relation
        :default_value: "Interview"
      :creator:
        :label: Ersteller
        :type: embeddedLink
        :type_name: users
        :storage_type: string
        :storage_location: metadata
      :date_created:
        :label: Erstellungsdatum
        :type: string
        :storage_type: string
        :storage_location: metadata
        :validations:
          :format: date_time
      :date_modified:
        :label: Änderungsdatum
        :type: string
        :storage_type: string
        :storage_location: metadata
        :validations:
          :format: date_time
