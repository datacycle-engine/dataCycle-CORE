---
- :data:
    :name: Standard-Artikel
    :description: CreativeWork
    :type: object
    :content_type: variant
    :permissions:
      :read_write: true
    :properties:
      :id:
        :label: id
        :type: string
        :storage_type: string
        :storage_location: key
        :validations:
          :format: uuid
      :headline:
        :label: Titel
        :type: string
        :storage_type: string
        :storage_location: column
        :validations:
          :minLength: 1
        :editor:
          :type: input
          :sorting: 1
          :options:
            :data-validate: text
      :validityPeriod:
        :label: Gültigkeitszeitraum
        :type: object
        :storage_location: metadata
        :validations:
          :daterange:
            :from: validFrom
            :to: validUntil
        :editor:
          :sorting: 2
          :options:
            :class: daterange validation-container
            :tabindex: -1
        :properties:
          :validFrom:
            :label: Gültigkeit
            :type: string
            :storage_type: string
            :storage_location: metadata
            :validations:
              :format: date_time
            :editor:
              :type: date
              :options:
                :data-type: datepicker
                :data-validate: daterange
                :placeholder: tt.mm.jjjj
          :validUntil:
            :label: bis
            :type: string
            :storage_type: string
            :storage_location: metadata
            :validations:
              :format: date_time
            :editor:
              :type: date
              :options:
                :data-type: datepicker
                :data-validate: daterange
                :placeholder: tt.mm.jjjj
      :alternativeHeadline:
        :label: Subüberschrift
        :type: string
        :storage_type: string
        :storage_location: content
        :editor:
          :type: input
          :sorting: 3
      :description:
        :label: Teasertext
        :type: string
        :storage_type: text
        :storage_location: content
        :editor:
          :type: quillEditor
          :sorting: 4
          :options:
            :data-size: basic
      :name:
        :label: Linktext
        :type: string
        :storage_type: string
        :storage_location: content
        :editor:
          :type: input
          :sorting: 5
      :text:
        :label: Fließtext
        :type: string
        :storage_type: text
        :storage_location: content
        :editor:
          :type: quillEditor
          :sorting: 6
          :options:
            :data-size: full
      :metaTitle:
        :label: Meta-Titel
        :type: string
        :storage_type: string
        :storage_location: content
        :editor:
          :type: input
          :sorting: 7
      :metaDescription:
        :label: Meta-Description
        :type: string
        :storage_type: text
        :storage_location: content
        :editor:
          :type: quillEditor
          :sorting: 8
          :options:
            :data-size: none
      :keywords:
        :label: SEO Keywords
        :type: string
        :storage_type: text
        :storage_location: content
        :editor:
          :type: quillEditor
          :sorting: 9
          :options:
            :data-size: none
      :sameAs:
        :label: Canonical Tag
        :type: string
        :storage_type: string
        :storage_location: content
        :editor:
          :type: input
          :sorting: 10
      :image:
        :label: Bilder
        :type: embeddedLinkArray
        :type_name: creative_works
        :releasable: true
        :storage_type: array
        :storage_location: metadata
        :editor:
          :sorting: 11
          :options:
            :data-validate: media
            :data-type: image
#      :video:
#        :label: Videos
#        :type: embeddedLinkArray
#        :type_name: creative_works
#        :storage_type: array
#        :storage_location: metadata
#        :editor:
#          :sorting: 12
#          :options:
#            :data-validate: media
#            :data-type: video
      #meta attributes
      :author:
        :label: Autor
        :type: object
        :storage_location: persons
        :name: Person
        :description: Person
        :delete: false
        :editor:
          :sorting: 13
          :type: objectBrowser
          :options:
            :data-validate: object
            :data-type: person
      :contentLocation:
        :label: Ort
        :type: object
        :storage_location: places
        :name: contentLocation
        :description: Place
        :delete: false
        :editor:
          :sorting: 14
          :type: objectBrowser
          :options:
            :data-validate: object
            :data-type: place
      :quotation:
        :label: Zitat
        :type: object
        :storage_location: creative_works
        :delete: true
        :name: Zitat
        :description: CreativeWork
        :validations:
          :maxLength: 1
        :editor:
          :type: embeddedObject
          :sorting: 15
          :options:
            :data-validate: text
      :topics:
        :label: Themenbereiche
        :type: classificationTreeLabel
        :type_name: Themenbereiche
        :storage_location: classification_relation
        :editor:
          :type: classificationSelector
          :sorting: 16
      :markets:
        :label: Zielmarkt
        :type: classificationTreeLabel
        :type_name: Märkte
        :storage_location: classification_relation
        :editor:
          :type: classificationSelector
          :sorting: 17
      :kind:
        :label: Inhaltsart
        :type: classificationTreeLabel
        :type_name: Inhaltsarten
        :storage_location: classification_relation
        :editor:
          :type: classificationSelector
          :sorting: 18
      :season:
        :label: Jahreszeit
        :type: classificationTreeLabel
        :type_name: Jahreszeiten
        :storage_location: classification_relation
        :editor:
          :type: classificationSelector
          :sorting: 19
      :state:
        :label: Bundesland
        :type: classificationTreeLabel
        :type_name: Bundesländer
        :storage_location: classification_relation
        :editor:
          :type: classificationSelector
          :sorting: 20
          :options:
            :data-validate: classification
      :tags:
        :label: Tags
        :type: classificationTreeLabel
        :type_name: Tags
        :storage_location: classification_relation
        :editor:
          :type: classificationSelector
          :sorting: 21
      :outputChannels:
        :label: Ausgabekanäle
        :type: classificationTreeLabel
        :type_name: Ausgabekanäle
        :storage_location: classification_relation
        :editor:
          :type: classificationSelector
          :sorting: 22
#      :data_pool:
#        :label: Inhaltspool
#        :type: classificationTreeLabel
#        :type_name: Inhaltspools
#        :storage_location: classification_relation
#        :default_value: "Aktuelle Themen"
      :data_type:
        :label: Inhaltstype
        :type: classificationTreeLabel
        :type_name: Inhaltstypen
        :storage_location: classification_relation
        :default_value: "Artikel"
      :creator:
        :label: Ersteller
        :type: embeddedLink
        :type_name: users
        :storage_type: string
        :storage_location: metadata
      :date_created:
        :label: Erstellungsdatum
        :type: string
        :storage_type: string
        :storage_location: metadata
        :validations:
          :format: date_time
      :date_modified:
        :label: Änderungsdatum
        :type: string
        :storage_type: string
        :storage_location: metadata
        :validations:
          :format: date_time
