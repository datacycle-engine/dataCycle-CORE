---
- :data:
    :name: Recherche
    :type: object
    :content_type: entity
    :releasable: true
    :boost: 10000.0
    :properties:
      :id:
        :label: id
        :type: key
      :headline:
        :label: Arbeitstitel
        :type: string
        :storage_location: column
        :search: true
        :validations:
          :min: 1
        :editor:
          :type: input
          :options:
            :data-validate: text
      :text:
        :label: Recherchedaten
        :type: string
        :storage_location: translated_value
        :search: true
        :editor:
          :type: quillEditor
          :options:
            :data-size: full
            :tabindex: -1
      :image:
        :label: Bilder
        :type: linked
        :linked_table: creative_works
        :editor:
          :type: objectBrowser
          :options:
            :data-validate: media
            :data-type: image
      :video:
        :label: Videos
        :type: linked
        :linked_table: creative_works
        :editor:
          :type: objectBrowser
          :options:
            :data-validate: media
            :data-type: video
      :data_pool:
        :label: Inhaltspool
        :type: classification
        :tree_label: Inhaltspools
        :default_value: "Recherche"
        :ui:
          :show:
            :content_area: header
          :edit:
            :disabled: true
      :date_created:
        :label: Erstellungsdatum
        :type: datetime
        :storage_location: value
      :date_modified:
        :label: Änderungsdatum
        :type: datetime
        :storage_location: value
