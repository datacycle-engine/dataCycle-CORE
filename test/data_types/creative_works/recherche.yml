        :type: string
        :storage_type: string
        :storage_location: column
        :validations:
          :minLength: 1
        :editor:
          :type: input
          :sorting: 1
          :options:
            :data-validate: text
      :text:
        :label: Recherchedaten
        :type: string
        :storage_type: text
        :storage_location: content
        :editor:
          :type: quillEditor
          :sorting: 2
          :options:
            :data-size: full
      :image:
        :label: Bilder
        :type: embeddedLinkArray
        :type_name: creative_works
        :storage_type: array
        :storage_location: metadata
        :editor:
          :sorting: 3
