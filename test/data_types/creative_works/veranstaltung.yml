---
- :data:
    :name: Veranstaltung
    :type: object
    :content_type: variant
    :releasable: true
    :permissions:
      :read_write: true
    :boost: 100.0
    :properties:
      :id:
        :label: id
        :type: string
        :storage_type: string
        :storage_location: key
        :validations:
          :format: uuid
      :headline:
        :label: Arbeitstitel
        :type: string
        :storage_type: string
        :storage_location: column
        :search: true
        :validations:
          :minLength: 1
        :editor:
          :type: input
          :sorting: 1
          :options:
            :data-validate: text
      :headline_external:
        :label: Titel
        :type: string
        :storage_type: string
        :storage_location: content
        :search: true
        :validations:
          :minLength: 1
        :editor:
          :type: input
          :sorting: 2
          :options:
            :data-validate: text
      :validity_period:
        :label: Gültigkeitszeitraum
        :type: object
        :storage_location: metadata
        :validations:
          :daterange:
            :from: valid_from
            :to: valid_until
        :editor:
          :sorting: 3
          :options:
            :class: daterange
            :tabindex: -1
        :properties:
          :valid_from:
            :label: Gültigkeit
            :type: string
            :storage_type: string
            :storage_location: metadata
            :validations:
              :format: date_time
            :editor:
              :type: date
              :options:
                :data-type: datepicker
                :data-validate: daterange
                :placeholder: tt.mm.jjjj
          :valid_until:
            :label: bis
            :type: string
            :storage_type: string
            :storage_location: metadata
            :validations:
              :format: date_time
            :editor:
              :type: date
              :options:
                :data-type: datepicker
                :data-validate: daterange
                :placeholder: tt.mm.jjjj
      :description:
        :label: Teasertext
        :type: string
        :storage_type: text
        :storage_location: column
        :search: true
        :editor:
          :type: quillEditor
          :sorting: 4
          :options:
            :data-size: basic
            :tabindex: -1
      :name:
        :label: Linktext
        :type: string
        :storage_type: string
        :storage_location: content
        :editor:
          :type: input
          :sorting: 5
      :content_location:
        :label: Veranstaltungsort
        :type: object
        :storage_location: places
        :name: contentLocation
        :delete: false
        :validations:
          :max: 1
        :editor:
          :sorting: 6
          :type: objectBrowser
          :options:
            :data-validate: object
            :data-type: place
      :event:
        :label: Veranstaltungsdaten
        :type: object
        :storage_location: events
        :delete: true
        :name: Event
        :editor:
          :type: embeddedObject
          :sorting: 7
      :image:
        :label: Bilder
        :type: embeddedLinkArray
        :type_name: creative_works
        :storage_type: array
        :storage_location: metadata
        :editor:
          :sorting: 8
          :type: objectBrowser
          :options:
            :data-validate: media
            :data-type: image
      :video:
        :label: Videos
        :type: embeddedLinkArray
        :type_name: creative_works
        :storage_type: array
        :storage_location: metadata
        :editor:
          :sorting: 9
          :type: objectBrowser
          :options:
            :data-validate: media
            :data-type: video
      #meta attributes
      :topics:
        :label: Themenbereiche
        :type: classificationTreeLabel
        :type_name: Themenbereiche
        :storage_location: classification_relation
        :editor:
          :type: classificationSelector
          :sorting: 20
          :options:
            :tabindex: -1
      :markets:
        :label: Zielmarkt
        :type: classificationTreeLabel
        :type_name: Märkte
        :storage_location: classification_relation
        :editor:
          :type: classificationSelector
          :sorting: 21
          :options:
            :tabindex: -1
      :kind:
        :label: Inhaltsart
        :type: classificationTreeLabel
        :type_name: Inhaltsarten
        :storage_location: classification_relation
        :editor:
          :type: classificationSelector
          :sorting: 22
          :options:
            :tabindex: -1
      :season:
        :label: Jahreszeit
        :type: classificationTreeLabel
        :type_name: Jahreszeiten
        :storage_location: classification_relation
        :editor:
          :type: classificationSelector
          :sorting: 23
          :options:
            :tabindex: -1
      :state:
        :label: Bundesland
        :type: classificationTreeLabel
        :type_name: Bundesländer
        :storage_location: classification_relation
        :editor:
          :type: classificationSelector
          :sorting: 24
          :options:
            :data-validate: classification
            :tabindex: -1
      :tags:
        :label: Tags
        :type: classificationTreeLabel
        :type_name: Tags
        :storage_location: classification_relation
        :editor:
          :type: classificationSelector
          :sorting: 25
          :options:
            :tabindex: -1
      :output_channels:
        :label: Ausgabekanäle
        :type: classificationTreeLabel
        :type_name: Ausgabekanäle
        :storage_location: classification_relation
        :editor:
          :type: classificationSelector
          :sorting: 26
          :options:
            :tabindex: -1
      :permitted_creator:
        :label: Ersteller
        :type: classificationTreeLabel
        :type_name: Ersteller
        :storage_location: classification_relation
        :editor:
          :type: classificationSelector
          :sorting: 27
          :options:
            :tabindex: -1
      :data_pool:
        :label: Inhaltspool
        :type: classificationTreeLabel
        :type_name: Inhaltspools
        :storage_location: classification_relation
        :default_value: "Aktuelle Inhalte"
      :data_type:
        :label: Inhaltstype
        :type: classificationTreeLabel
        :type_name: Inhaltstypen
        :storage_location: classification_relation
        :default_value: "Veranstaltung"
      :creator:
        :label: Ersteller
        :type: embeddedLink
        :type_name: users
        :storage_type: string
        :storage_location: metadata
      :date_created:
        :label: Erstellungsdatum
        :type: string
        :storage_type: string
        :storage_location: metadata
        :validations:
          :format: date_time
      :date_modified:
        :label: Änderungsdatum
        :type: string
        :storage_type: string
        :storage_location: metadata
        :validations:
          :format: date_time
