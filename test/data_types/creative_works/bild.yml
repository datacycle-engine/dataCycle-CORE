---
- :data:
    :name: Bild
    :type: object
    :content_type: entity
    :boost: 1.0
    :properties:
      :id:
        :label: id
        :type: key
      :headline:
        :label: Titel
        :type: string
        :storage_location: column
        :search: true
        :editor:
          :type: input
      :caption:
        :label: Alt-Label
        :type: string
        :storage_location: translated_value
        :search: true
        :editor:
          :type: input
      :description:
        :label: Beschreibung
        :type: string
        :storage_location: column
        :search: true
        :editor:
          :type: input
      :photographer:
        :label: Fotograf
        :type: string
        :storage_location: value
        :search: true
        :editor:
          :type: input
      :license:
        :label: Copyright / Lizenz
        :type: string
        :storage_location: value
        :editor:
          :type: input
      :mandatory_license:
        :label: Copyright Nennung verpflichtend
        :type: boolean
        :storage_location: value
        :editor:
          :type: input
      :content_location:
        :label: Ort
        :type: embedded
        :linked_table: things
        :template_name: contentLocation
        :editor:
          :type: objectBrowser
      :width:
        :label: Breite
        :type: number
        :storage_location: value
        :validations:
          :format: integer
        :editor:
          :type: input
      :height:
        :label: Höhe
        :type: number
        :storage_location: value
        :validations:
          :format: integer
        :editor:
          :type: input
      :content_size:
        :label: Dateigröße
        :type: number
        :storage_location: value
        :validations:
          :format: integer
        :editor:
          :type: input
      :file_format:
        :label: Dateiformat
        :type: string
        :storage_location: value
        :editor:
          :type: input
      :comment:
        :label: Kommentar
        :type: string
        :storage_location: value
        :search: true
        :editor:
          :type: input
      :validity_period:
        :label: Gültigkeitszeitraum
        :type: object
        :storage_location: value
        :editor:
          :sorting: 3
          :options:
            :class: daterange
            :tabindex: -1
        :properties:
          :date_published:
            :label: Gültig von
            :type: datetime
            :storage_location: value
            :editor:
              :type: date
              :options:
                :data-type: datepicker
                :data-validate: daterange
                :placeholder: tt.mm.jjjj
          :expires:
            :label: Gültig bis
            :type: datetime
            :storage_location: value
            :editor:
              :type: date
              :options:
                :data-type: datepicker
                :data-validate: daterange
                :placeholder: tt.mm.jjjj
      :date_created:
        :label: Erstellungsdatum
        :type: datetime
        :storage_location: value
      :date_modified:
        :label: Änderungsdatum
        :type: datetime
        :storage_location: value
      :source:
        :label: Erhalten von
        :type: string
        :storage_location: value
        :editor:
          :type: input
      :image_id:
        :label: Bildnummer
        :type: string
        :storage_location: value
        :editor:
          :type: input
      :visibility:
        :label: Sichtbarkeit
        :type: string
        :storage_location: value
        :editor:
          :type: input
      :access:
        :label: Rechte/Einsatzgebiet
        :type: classification
        :tree_label: Rechte
        :editor:
          :type: input
      :content_url:
        :label: Bild URL
        :type: string
        :storage_location: value
        :validations:
          :format: url
        :editor:
          :type: input
      :thumbnail_url:
        :label: Thumbnail URL
        :type: string
        :storage_location: value
        :validations:
          :format: url
        :editor:
          :type: image
      :url:
        :label: URL
        :type: string
        :storage_location: value
        :validations:
          :format: url
        :editor:
          :type: input
      :keywords:
        :label: Tags
        :type: classification
        :tree_label: Tags
        :editor:
          :type: input
      :data_type:
        :label: Inhaltstype
        :type: classification
        :tree_label: Inhaltstypen
        :default_value: "Bild"
      :data_pool:
        :label: Inhaltspool
        :type: classification
        :tree_label: Inhaltspools
        :default_value: "Aktuelle Inhalte"
        :ui:
          :show:
            :content_area: header
          :edit:
            :disabled: true
      :restrictions:
        :label: Einschränkungen
        :type: string
        :storage_location: value
