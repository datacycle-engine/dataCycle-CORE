---
- :data:
    :name: Bild
    :type: object
    :content_type: entity
    :permissions:
      :read_write: false
    :boost: 1.0
    :properties:
      :id:
        :label: id
        :type: string
        :storage_type: string
        :storage_location: key
        :validations:
          :format: uuid
      :headline:
        :label: Titel
        :type: string
        :storage_type: string
        :storage_location: column
        :search: true
        :editor:
          :type: input
      :caption:
        :label: Alt-Label
        :type: string
        :storage_type: string
        :storage_location: content
        :search: true
        :editor:
          :type: input
      :description:
        :label: Beschreibung
        :type: string
        :storage_type: string
        :storage_location: column
        :search: true
        :editor:
          :type: input
      :photographer:
        :label: Fotograf
        :type: string
        :storage_type: string
        :storage_location: metadata
        :search: true
        :editor:
          :type: input
      :creator:
        :label: Ersteller
        :type: embeddedLink
        :type_name: users
        :storage_type: string
        :storage_location: metadata
      :license:
        :label: Copyright / Lizenz
        :type: string
        :storage_type: string
        :storage_location: metadata
        :editor:
          :type: input
      :mandatory_license:
        :label: Copyright Nennung verpflichtend
        :type: string
        :storage_type: string
        :storage_location: metadata
        :validations:
          :format: boolean
        :editor:
          :type: input
      :content_location:
        :label: Ort
        :type: object
        :storage_location: places
        :name: contentLocation
        :editor:
          :type: objectBrowser
      :width:
        :label: Breite
        :type: number
        :storage_type: number
        :storage_location: metadata
        :validations:
          :format: integer
        :editor:
          :type: input
      :height:
        :label: Höhe
        :type: number
        :storage_type: number
        :storage_location: metadata
        :validations:
          :format: integer
        :editor:
          :type: input
      :content_size:
        :label: Dateigröße
        :type: number
        :storage_type: number
        :storage_location: metadata
        :validations:
          :format: integer
        :editor:
          :type: input
      :file_format:
        :label: Dateiformat
        :type: string
        :storage_type: string
        :storage_location: metadata
        :editor:
          :type: input
      :comment:
        :label: Kommentar
        :type: string
        :storage_type: string
        :storage_location: metadata
        :search: true
        :editor:
          :type: input
      :validity_period:
        :label: Gültigkeitszeitraum
        :type: object
        :storage_location: metadata
        :editor:
          :sorting: 3
          :options:
            :class: daterange
            :tabindex: -1
        :properties:
          :date_published:
            :label: Gültig von
            :type: string
            :storage_type: string
            :storage_location: metadata
            :validations:
              :format: date_time
            :editor:
              :type: date
              :options:
                :data-type: datepicker
                :data-validate: daterange
                :placeholder: tt.mm.jjjj
          :expires:
            :label: Gültig bis
            :type: string
            :storage_type: string
            :storage_location: metadata
            :validations:
              :format: date_time
            :editor:
              :type: date
              :options:
                :data-type: datepicker
                :data-validate: daterange
                :placeholder: tt.mm.jjjj
      :date_created:
        :label: Erstellungsdatum
        :type: string
        :storage_type: string
        :storage_location: metadata
        :validations:
          :format: date_time
      :date_modified:
        :label: Änderungsdatum
        :type: string
        :storage_type: string
        :storage_location: metadata
        :validations:
          :format: date_time
      :source:
        :label: Erhalten von
        :type: string
        :storage_type: string
        :storage_location: metadata
        :editor:
          :type: input
      :image_id:
        :label: Bildnummer
        :type: string
        :storage_type: string
        :storage_location: metadata
        :editor:
          :type: input
      :visibility:
        :label: Sichtbarkeit
        :type: string
        :storage_type: string
        :storage_location: metadata
        :editor:
          :type: input
      :access:
        :label: Rechte/Einsatzgebiet
        :type: classificationTreeLabel
        :type_name: Rechte
        :storage_location: classification_relation
        :editor:
          :type: input
      :content_url:
        :label: Bild URL
        :type: string
        :storage_type: string
        :storage_location: metadata
        :validations:
          :format: url
        :editor:
          :type: input
      :thumbnail_url:
        :label: Thumbnail URL
        :type: string
        :storage_type: string
        :storage_location: metadata
        :validations:
          :format: url
        :editor:
          :type: image
          :sorting: 1
      :url:
        :label: URL
        :type: string
        :storage_type: string
        :storage_location: metadata
        :validations:
          :format: url
        :editor:
          :type: input
      :keywords:
        :label: Tags
        :type: classificationTreeLabel
        :type_name: MediaArchive - Tags
        :storage_location: classification_relation
        :editor:
          :type: input
      :data_type:
        :label: Inhaltstype
        :type: classificationTreeLabel
        :type_name: Inhaltstypen
        :storage_location: classification_relation
        :default_value: "Bild"
      :data_pool:
        :label: Inhaltspool
        :type: classificationTreeLabel
        :type_name: Inhaltspools
        :storage_location: classification_relation
        :default_value: "Aktuelle Inhalte"
      :restrictions:
        :label: Einschränkungen
        :type: string
        :storage_type: string
        :storage_location: metadata
