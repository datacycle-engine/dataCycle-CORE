---
- :data:
    :name: Publikations-Plan
    :type: object
    :content_type: embedded
    :permissions:
      :read_write: true
    :boost: 1.0
    :properties:
      :id:
        :label: id
        :type: key
      :publish_at:
        :label: Publikationsdatum
        :type: datetime
        :storage_location: value
        :validations:
          :minLength: 1
        :editor:
          :type: date
          :options:
            :data-type: datepicker
            :data-validate: daterange
            :placeholder: tt.mm.jjjj
      :markets:
        :label: Zielmarkt
        :type: classification
        :tree_label: Märkte
        :editor:
          :type: classificationSelector
          :options:
            :tabindex: -1
      :output_channels:
        :label: Ausgabekanäle
        :type: classification
        :tree_label: Ausgabekanäle
        :editor:
          :type: classificationSelector
          :options:
            :tabindex: -1
      :data_type:
        :label: Inhaltstype
        :type: classification
        :tree_label: Inhaltstypen
        :default_value: "Publikations-Plan"
      :creator:
        :label: Ersteller
        :type: linked
        :linked_table: users
        :storage_location: value
      :date_created:
        :label: Erstellungsdatum
        :type: datetime
        :storage_location: value
      :date_modified:
        :label: Änderungsdatum
        :type: datetime
        :storage_location: value
