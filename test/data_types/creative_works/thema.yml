---
- :data:
    :name: Thema
    :description: CreativeWork
    :type: object
    :content_type: entity
    :permissions:
      :read_write: true
    :boost: 10000.0      
    :properties:
      :id:
        :label: id
        :type: string
        :storage_type: string
        :storage_location: key
        :validations:
          :format: uuid
      :headline:
        :label: Titel
        :type: string
        :storage_type: string
        :storage_location: column
        :search: true
        :validations:
          :minLength: 1
        :editor:
          :type: input
          :sorting: 1
          :options:
            :data-validate: text
      :validity_period:
        :label: Gültigkeitszeitraum
        :type: object
        :storage_location: metadata
        :validations:
          :daterange:
            :from: valid_from
            :to: valid_until
        :editor:
          :sorting: 3
          :options:
            :class: daterange
            :tabindex: -1
        :properties:
          :valid_from:
            :label: Gültigkeit
            :type: string
            :storage_type: string
            :storage_location: metadata
            :validations:
              :format: date_time
            :editor:
              :type: date
              :options:
                :data-type: datepicker
                :data-validate: daterange
                :placeholder: tt.mm.jjjj
          :valid_until:
            :label: bis
            :type: string
            :storage_type: string
            :storage_location: metadata
            :validations:
              :format: date_time
            :editor:
              :type: date
              :options:
                :data-type: datepicker
                :data-validate: daterange
                :placeholder: tt.mm.jjjj
      :description:
        :label: Beschreibung
        :type: string
        :storage_type: text
        :storage_location: column
        :search: true
        :editor:
          :type: quillEditor
          :sorting: 4
          :options:
            :data-size: basic
            :tabindex: -1
      #meta attributes
      :topics:
        :label: Themenbereiche
        :type: classificationTreeLabel
        :type_name: Themenbereiche
        :storage_location: classification_relation
        :editor:
          :type: classificationSelector
          :sorting: 5
          :options:
            :tabindex: -1
      :markets:
        :label: Zielmarkt
        :type: classificationTreeLabel
        :type_name: Märkte
        :storage_location: classification_relation
        :editor:
          :type: classificationSelector
          :sorting: 6
          :options:
            :tabindex: -1
      :kind:
        :label: Inhaltsart
        :type: classificationTreeLabel
        :type_name: Inhaltsarten
        :storage_location: classification_relation
        :editor:
          :type: classificationSelector
          :sorting: 7
          :options:
            :tabindex: -1
      :season:
        :label: Jahreszeit
        :type: classificationTreeLabel
        :type_name: Jahreszeiten
        :storage_location: classification_relation
        :editor:
          :type: classificationSelector
          :sorting: 8
          :options:
            :tabindex: -1
      :state:
        :label: Bundesland
        :type: classificationTreeLabel
        :type_name: Bundesländer
        :storage_location: classification_relation
        :editor:
          :type: classificationSelector
          :sorting: 9
          :options:
            :data-validate: classification
            :tabindex: -1
      :tags:
        :label: Tags
        :type: classificationTreeLabel
        :type_name: Tags
        :storage_location: classification_relation
        :editor:
          :type: classificationSelector
          :sorting: 10
          :options:
            :tabindex: -1
      :permitted_creator:
        :label: Ersteller
        :type: classificationTreeLabel
        :type_name: Ersteller
        :storage_location: classification_relation
        :editor:
          :type: classificationSelector
          :sorting: 27
          :options:
            :tabindex: -1
      :data_pool:
        :label: Inhaltspool
        :type: classificationTreeLabel
        :type_name: Inhaltspools
        :storage_location: classification_relation
        :default_value: "Aktuelle Inhalte"
      :creator:
        :label: Ersteller
        :type: embeddedLink
        :type_name: users
        :storage_type: string
        :storage_location: metadata
      :date_created:
        :label: Erstellungsdatum
        :type: string
        :storage_type: string
        :storage_location: metadata
        :validations:
          :format: date_time
      :date_modified:
        :label: Änderungsdatum
        :type: string
        :storage_type: string
        :storage_location: metadata
        :validations:
          :format: date_time
