---
- :data:
    :name: Thema
    :type: object
    :content_type: container
    :permissions:
      :read_write: true
    :boost: 10000.0
    :properties:
      :id:
        :label: id
        :type: key
      :headline:
        :label: Titel
        :type: string
        :storage_location: column
        :search: true
        :validations:
          :min: 1
        :editor:
          :type: input
          :options:
            :data-validate: text
      :validity_period:
        :label: Gültigkeitszeitraum
        :type: object
        :storage_location: value
        :validations:
          :daterange:
            :from: valid_from
            :to: valid_until
        :editor:
          :options:
            :class: daterange
            :tabindex: -1
        :properties:
          :valid_from:
            :label: Gültigkeit
            :type: datetime
            :storage_location: value
            :editor:
              :type: date
              :options:
                :data-type: datepicker
                :data-validate: daterange
                :placeholder: tt.mm.jjjj
          :valid_until:
            :label: bis
            :type: datetime
            :storage_location: value
            :editor:
              :type: date
              :options:
                :data-type: datepicker
                :data-validate: daterange
                :placeholder: tt.mm.jjjj
      :description:
        :label: Beschreibung
        :type: string
        :storage_location: column
        :search: true
        :editor:
          :type: quillEditor
          :options:
            :data-size: basic
            :tabindex: -1
      #meta attributes
      :topics:
        :label: Themenbereiche
        :type: classification
        :tree_label: Themenbereiche
        :editor:
          :type: classificationSelector
          :options:
            :tabindex: -1
      :markets:
        :label: Zielmarkt
        :type: classification
        :tree_label: Märkte
        :editor:
          :type: classificationSelector
          :options:
            :tabindex: -1
      :kind:
        :label: Inhaltsart
        :type: classification
        :tree_label: Inhaltsarten
        :editor:
          :type: classificationSelector
          :options:
            :tabindex: -1
      :season:
        :label: Jahreszeit
        :type: classification
        :tree_label: Jahreszeiten
        :editor:
          :type: classificationSelector
          :options:
            :tabindex: -1
      :state:
        :label: Bundesland
        :type: classification
        :tree_label: Bundesländer
        :editor:
          :type: classificationSelector
          :options:
            :data-validate: classification
            :tabindex: -1
      :tags:
        :label: Tags
        :type: classification
        :tree_label: Tags
        :editor:
          :type: classificationSelector
          :options:
            :tabindex: -1
      :permitted_creator:
        :label: Ersteller
        :type: classification
        :tree_label: Ersteller
        :editor:
          :type: classificationSelector
          :options:
            :tabindex: -1
      :data_pool:
        :label: Inhaltspool
        :type: classification
        :tree_label: Inhaltspools
        :default_value: "Aktuelle Inhalte"
      :creator:
        :label: Ersteller
        :type: linked
        :linked_table: users
        :storage_location: value
      :date_created:
        :label: Erstellungsdatum
        :type: datetime
        :storage_location: value
      :date_modified:
        :label: Änderungsdatum
        :type: datetime
        :storage_location: value
