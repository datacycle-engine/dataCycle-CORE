---
- :data:
    :name: Rezept
    :description: CreativeWork
    :type: object
    :content_type: variant
    :permissions:
      :read_write: true
    :properties:
      :id:
        :label: id
        :type: string
        :storage_type: string
        :storage_location: key
        :validations:
          :format: uuid
      :headline:
        :label: Titel
        :type: string
        :storage_type: string
        :storage_location: column
        :validations:
          :minLength: 1
        :editor:
          :type: input
          :sorting: 1
          :options:
            :data-validate: text
      :validity_period:
        :label: Gültigkeitszeitraum
        :type: object
        :storage_location: metadata
        :validations:
          :daterange:
            :from: valid_from
            :to: valid_until
        :editor:
          :sorting: 2
          :options:
            :class: daterange validation-container
            :tabindex: -1
        :properties:
          :valid_from:
            :label: Gültigkeit
            :type: string
            :storage_type: string
            :storage_location: metadata
            :validations:
              :format: date_time
            :editor:
              :type: date
              :options:
                :data-type: datepicker
                :data-validate: daterange
                :placeholder: tt.mm.jjjj
          :valid_until:
            :label: bis
            :type: string
            :storage_type: string
            :storage_location: metadata
            :validations:
              :format: date_time
            :editor:
              :type: date
              :options:
                :data-type: datepicker
                :data-validate: daterange
                :placeholder: tt.mm.jjjj
      :description:
        :label: Teasertext
        :type: string
        :storage_type: text
        :storage_location: content
        :editor:
          :type: quillEditor
          :sorting: 3
          :options:
            :data-size: basic
      :name:
        :label: Linktext
        :type: string
        :storage_type: string
        :storage_location: content
        :editor:
          :type: input
          :sorting: 4
      :image:
        :label: Bilder
        :type: embeddedLinkArray
        :type_name: creative_works
        :storage_type: array
        :storage_location: metadata
        :editor:
          :sorting: 5
      :recipeInstructions:
        :label: Fließtext
        :type: string
        :storage_type: text
        :storage_location: content
        :editor:
          :type: quillEditor
          :sorting: 6
          :options:
            :data-size: full
      :recipeYield:
        :label: Portionen
        :type: string
        :storage_type: string
        :storage_location: content
        :editor:
          :type: input
          :sorting: 7
      :totalTime:
        :label: Kochzeit
        :type: number
        :storage_type: number
        :storage_location: content
        :validations:
          :format: integer
          :max: 300
        :editor:
          :type: duration
          :sorting: 8
          :options:
            :data-type: duration
            :data-validate: integer
      :recipeCourse:
        :label: 'Gang'
        :type: classificationTreeLabel
        :type_name: 'Rezept-Gänge'
        :storage_location: classification_relation
        :editor:
          :type: classificationSelector
          :sorting: 9
      :recipeCategory:
        :label: 'Kategorie'
        :type: classificationTreeLabel
        :type_name: 'Rezept-Kategorien'
        :storage_location: classification_relation
        :editor:
          :type: classificationSelector
          :sorting: 10
      :recipeIngredient:
        :label: Zutat
        :type: string
        :storage_type: text
        :storage_location: content
        :editor:
          :type: quillEditor
          :sorting: 11
          :options:
            :data-size: full
      :recipeComponent:
        :label: Komponente
        :type: object
        :storage_location: creative_works
        :delete: true
        :name: Rezept-Komponente
        :description: CreativeWork
        :editor:
          :type: embeddedObject
          :sorting: 12
#      :video:
#        :label: Videos
#        :type: embeddedLinkArray
#        :type_name: creative_works
#        :storage_type: array
#        :storage_location: metadata
#        :editor:
#          :sorting: 13
      #meta attributes
      :topics:
        :label: Themenbereiche
        :type: classificationTreeLabel
        :type_name: Themenbereiche
        :storage_location: classification_relation
        :editor:
          :type: classificationSelector
          :sorting: 20
      :markets:
        :label: Zielmarkt
        :type: classificationTreeLabel
        :type_name: Märkte
        :storage_location: classification_relation
        :editor:
          :type: classificationSelector
          :sorting: 21
      :kind:
        :label: Inhaltsart
        :type: classificationTreeLabel
        :type_name: Inhaltsarten
        :storage_location: classification_relation
        :editor:
          :type: classificationSelector
          :sorting: 22
      :season:
        :label: Jahreszeit
        :type: classificationTreeLabel
        :type_name: Jahreszeiten
        :storage_location: classification_relation
        :editor:
          :type: classificationSelector
          :sorting: 23
      :state:
        :label: Bundesland
        :type: classificationTreeLabel
        :type_name: Bundesländer
        :storage_location: classification_relation
        :editor:
          :type: classificationSelector
          :sorting: 24
          :options:
            :data-validate: classification
      :tags:
        :label: Tags
        :type: classificationTreeLabel
        :type_name: Tags
        :storage_location: classification_relation
        :editor:
          :type: classificationSelector
          :sorting: 25
      :outputChannels:
        :label: Ausgabekanäle
        :type: classificationTreeLabel
        :type_name: Ausgabekanäle
        :storage_location: classification_relation
        :editor:
          :type: classificationSelector
          :sorting: 27
#      :data_pool:
#        :label: Inhaltspool
#        :type: classificationTreeLabel
#        :type_name: Inhaltspools
#        :storage_location: classification_relation
#        :default_value: "Aktuelle Themen"
      :data_type:
        :label: Inhaltstype
        :type: classificationTreeLabel
        :type_name: Inhaltstypen
        :storage_location: classification_relation
        :default_value: "Rezept"
      :creator:
        :label: Ersteller
        :type: embeddedLink
        :type_name: users
        :storage_type: string
        :storage_location: metadata
      :date_created:
        :label: Erstellungsdatum
        :type: string
        :storage_type: string
        :storage_location: metadata
        :validations:
          :format: date_time
      :date_modified:
        :label: Änderungsdatum
        :type: string
        :storage_type: string
        :storage_location: metadata
        :validations:
          :format: date_time

