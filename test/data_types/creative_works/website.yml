---
- :data:
    :name: Website
    :type: object
    :content_type: embedded
    :boost: 1.0
    :properties:
      :id:
        :label: id
        :type: key
      :url:
        :label: Link
        :type: string
        :storage_location: translated_value
        :validations:
          :min: 1
          :format: url
        :editor:
          :type: input
          :options:
            :data-validate: text
      :name:
        :label: Linktitel
        :type: string
        :storage_location: translated_value
        :validations:
          :min: 1
        :editor:
          :type: quillEditor
          :options:
            :data-size: basic
            :data-validate: text
            :tabindex: -1
      :description:
        :label: Linkbeschreibung
        :type: string
        :storage_location: column
        :editor:
          :type: quillEditor
          :options:
            :data-size: basic
            :data-validate: text
            :tabindex: -1
      :is_part_of:
        :label: parent
        :type: string
        :storage_location: column
        :validations:
          :format: uuid
      :data_type:
        :label: Inhaltstype
        :type: classification
        :tree_label: Inhaltstypen
        :default_value: "Website"
      :creator:
        :label: Ersteller
        :type: linked
        :linked_table: users
        :validations:
          :max: 1
      :date_created:
        :label: Erstellungsdatum
        :type: datetime
        :storage_location: value
      :date_modified:
        :label: Änderungsdatum
        :type: datetime
        :storage_location: value
