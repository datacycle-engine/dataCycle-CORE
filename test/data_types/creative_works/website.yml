---
- :data:
    :name: Website
    :type: object
    :content_type: embedded
    :permissions:
      :read_write: true
    :boost: 1.0
    :properties:
      :id:
        :label: id
        :type: string
        :storage_type: string
        :storage_location: key
        :validations:
          :format: uuid
      :url:
        :label: Link
        :type: string
        :storage_type: string
        :storage_location: content
        :validations:
          :minLength: 1
          :format: url
        :editor:
          :type: input
          :sorting: 1
          :options:
            :data-validate: text
      :name:
        :label: Linktitel
        :type: string
        :storage_type: text
        :storage_location: content
        :validations:
          :minLength: 1
        :editor:
          :type: quillEditor
          :sorting: 2
          :options:
            :data-size: basic
            :data-validate: text
            :tabindex: -1
      :description:
        :label: Linkbeschreibung
        :type: string
        :storage_type: text
        :storage_location: column
        :editor:
          :type: quillEditor
          :sorting: 3
          :options:
            :data-size: basic
            :data-validate: text
            :tabindex: -1
      :is_part_of:
        :label: parent
        :type: string
        :storage_type: string
        :storage_location: column
        :validations:
          :format: uuid
      :data_type:
        :label: Inhaltstype
        :type: classificationTreeLabel
        :type_name: Inhaltstypen
        :storage_location: classification_relation
        :default_value: "Website"
      :creator:
        :label: Ersteller
        :type: embeddedLink
        :type_name: users
        :storage_type: string
        :storage_location: metadata
      :date_created:
        :label: Erstellungsdatum
        :type: string
        :storage_type: string
        :storage_location: metadata
        :validations:
          :format: date_time
      :date_modified:
        :label: Änderungsdatum
        :type: string
        :storage_type: string
        :storage_location: metadata
        :validations:
          :format: date_time
