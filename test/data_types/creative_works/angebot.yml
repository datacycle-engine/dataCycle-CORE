---
- :data:
    :name: Angebot
    :type: object
    :content_type: entity
    :releasable: true
    :permissions:
      :read_write: true
    :boost: 100.0
    :properties:
      :id:
        :label: id
        :type: key
      :headline:
        :label: Arbeitstitel
        :type: string
        :storage_location: column
        :search: true
        :validations:
          :min: 1
        :editor:
          :type: input
          :options:
            :data-validate: text
      :headline_external:
        :label: Titel
        :type: string
        :stroage_location: translated_value
        :search: true
        :validations:
          :min: 1
        :editor:
          :type: input
          :options:
            :data-validate: text
      :validity_period:
        :label: Gültigkeitszeitraum
        :type: object
        :stroage_location: value
        :validations:
          :daterange:
            :from: valid_from
            :to: valid_until
        :editor:
          :options:
            :class: daterange
            :tabindex: -1
        :properties:
          :valid_from:
            :label: Gültigkeit
            :type: datetime
            :stroage_location: value
            :editor:
              :type: date
              :options:
                :data-type: datepicker
                :data-validate: daterange
                :placeholder: tt.mm.jjjj
          :valid_until:
            :label: bis
            :type: datetime
            :stroage_location: value
            :editor:
              :type: date
              :options:
                :data-type: datepicker
                :data-validate: daterange
                :placeholder: tt.mm.jjjj
      :alternative_headline:
        :label: Subüberschrift
        :type: string
        :stroage_location: translated_value
        :search: true
        :editor:
          :type: input
      :description:
        :label: Teasertext
        :type: string
        :storage_location: column
        :search: true
        :editor:
          :type: quillEditor
          :options:
            :data-size: basic
            :tabindex: -1
      :name:
        :label: Linktext
        :type: string
        :stroage_location: translated_value
        :editor:
          :type: input
      :text:
        :label: Fließtext
        :type: string
        :stroage_location: translated_value
        :search: true
        :editor:
          :type: quillEditor
          :options:
            :data-size: full
            :tabindex: -1
      :price:
        :label: Preis
        :type: string
        :stroage_location: translated_value
        :editor:
          :type: input
      :service:
        :label: Inklusivleistungen
        :type: string
        :stroage_location: translated_value
        :editor:
          :type: quillEditor
          :options:
            :data-size: full
            :tabindex: -1
      :offer_periods:
        :label: Angebotszeitraum
        :type: embedded
        :linked_table: creative_works
        :delete: true
        :template_name: Angebotszeitraum
        :editor:
          :type: embeddedObject
      :image:
        :label: Bilder
        :type: linked
        :linked_table: creative_works
        :editor:
          :type: objectBrowser
          :options:
            :data-validate: media
            :data-type: image
      :logo:
        :label: Logo
        :type: linked
        :linked_table: creative_works
        :validations:
          :max: 1
        :editor:
          :type: objectBrowser
          :options:
            :data-validate: media
            :data-type: image
      :video:
        :label: Videos
        :type: linked
        :linked_table: creative_works
        :editor:
          :type: objectBrowser
          :options:
            :data-validate: media
            :data-type: video
      :content_location:
        :label: Ort
        :type: embedded
        :linked_table: places
        :template_name: contentLocation
        :delete: false
        :editor:
          :type: objectBrowser
          :options:
            :data-validate: object
            :data-type: place
      :website:
        :label: Link
        :type: embedded
        :linked_table: creative_works
        :delete: true
        :template_name: Website
        :editor:
          :type: embeddedObject
      #meta attributes
      :topics:
        :label: Themenbereiche
        :type: classification
        :tree_label: Themenbereiche
        :editor:
          :type: classificationSelector
          :options:
            :tabindex: -1
      :markets:
        :label: Zielmarkt
        :type: classification
        :tree_label: Märkte
        :editor:
          :type: classificationSelector
          :options:
            :tabindex: -1
      :kind:
        :label: Inhaltsart
        :type: classification
        :tree_label: Inhaltsarten
        :editor:
          :type: classificationSelector
          :options:
            :tabindex: -1
      :season:
        :label: Jahreszeit
        :type: classification
        :tree_label: Jahreszeiten
        :editor:
          :type: classificationSelector
          :options:
            :tabindex: -1
      :state:
        :label: Bundesland
        :type: classification
        :tree_label: Bundesländer
        :editor:
          :type: classificationSelector
          :options:
            :data-validate: classification
            :tabindex: -1
      :tags:
        :label: Tags
        :type: classification
        :tree_lable: Tags
        :editor:
          :type: classificationSelector
          :options:
            :tabindex: -1
      :output_channels:
        :label: Ausgabekanäle
        :type: classification
        :tree_label: Ausgabekanäle
        :editor:
          :type: classificationSelector
          :options:
            :tabindex: -1
      :permitted_creator:
        :label: Ersteller
        :type: classification
        :tree_label: Ersteller
        :editor:
          :type: classificationSelector
          :options:
            :tabindex: -1
      :data_pool:
        :label: Inhaltspool
        :type: classification
        :tree_label: Inhaltspools
        :default_value: "Aktuelle Inhalte"
      :data_type:
        :label: Inhaltstype
        :type: classification
        :tree_label: Inhaltstypen
        :default_value: "Angebot"
      :creator:
        :label: Ersteller
        :type: linked
        :linked_table: users
        :stroage_location: value
      :date_created:
        :label: Erstellungsdatum
        :type: datetime
        :stroage_location: value
      :date_modified:
        :label: Änderungsdatum
        :type: datetime
        :stroage_location: value

- :data:
    :name: Angebotszeitraum
    :type: object
    :content_type: embedded
    :permissions:
      :read_write: true
    :properties:
      :id:
        :label: id
        :type: key
      :is_part_of:
        :label: parent
        :type: string
        :storage_location: column
        :validations:
          :format: uuid
      :creator:
        :label: Ersteller
        :type: linked
        :linked_table: users
        :stroage_location: value
        :validations:
          :max: 1
      :date_created:
        :label: Erstellungsdatum
        :type: datetime
        :stroage_location: value
      :date_modified:
        :label: Änderungsdatum
        :type: datetime
        :stroage_location: value
      :data_type:
        :label: Inhaltstype
        :type: classification
        :tree_label: Inhaltstypen
        :default_value: "Angebotszeitraum"
      :offer_period:
        :label: Zeitraum
        :type: object
        :stroage_location: value
        :validations:
          :daterange:
            :from: valid_from
            :to: valid_until
        :editor:
          :options:
            :class: daterange
            :tabindex: -1
        :properties:
          :valid_from:
            :label: "Zeitraum von"
            :type: datetime
            :stroage_location: value
            :editor:
              :type: date
              :options:
                :data-type: datepicker
                :data-validate: daterange
                :placeholder: "tt.mm.jjjj"
          :valid_until:
            :label: "bis"
            :type: datetime
            :stroage_location: value
            :editor:
              :type: date
              :options:
                :data-type: datepicker
                :data-validate: daterange
                :placeholder: "tt.mm.jjjj"
