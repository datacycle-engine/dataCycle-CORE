---
- :data:
    :name: Event
    :type: object
    :permissions:
      :read_write: true
    :properties:
      :id:
        :label: id
        :type: key
      :event_period:
        :label: Gültigkeitszeitraum
        :type: object
        :stroage_location: value
        :validations:
          :daterange:
            :from: start_date
            :to: end_date
        :editor:
          :options:
            :class: daterange validation-container
            :tabindex: -1
        :properties:
          :start_date:
            :label: Gültigkeit
            :type: datetime
            :storage_location: column
            :editor:
              :type: date
              :options:
                :data-type: datepicker
                :data-validate: daterange
                :placeholder: tt.mm.jjjj
          :end_date:
            :label: bis
            :type: datetime
            :storage_location: column
            :editor:
              :type: date
              :options:
                :data-type: datepicker
                :data-validate: daterange
                :placeholder: tt.mm.jjjj
      :url:
        :label: Link
        :type: string
        :stroage_location: value
        :editor:
          :type: input
      :creator:
        :label: Ersteller
        :type: linked
        :linked_table: users
        :validations:
          :max: 1
      :date_created:
        :label: Erstellungsdatum
        :type: datetime
        :stroage_location: value
      :date_modified:
        :label: Änderungsdatum
        :type: datetime
        :stroage_location: value
