      :eventPeriod:
        :label: Gültigkeitszeitraum
        :type: object
        :storage_location: metadata
        :validations:
          :daterange:
            :from: startDate
            :to: endDate
        :editor:
          :sorting: 2
          :options:
            :class: daterange validation-container
            :tabindex: -1
        :properties:
          :startDate:
            :label: Gültigkeit
            :type: string
            :storage_type: string
            :storage_location: column
            :validations:
              :format: date_time
            :editor:
              :sorting: 1
              :type: date
              :options:
                :data-type: datepicker
                :data-validate: daterange
                :placeholder: tt.mm.jjjj
          :endDate:
            :label: bis
            :type: string
            :storage_type: string
            :storage_location: column
            :validations:
              :format: date_time
            :editor:
              :sorting: 2
              :type: date
              :options:
                :data-type: datepicker
                :data-validate: daterange
                :placeholder: tt.mm.jjjj
