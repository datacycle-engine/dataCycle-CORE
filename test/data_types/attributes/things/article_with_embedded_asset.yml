---
- :data:
    :name: Article-w-embedded-asset
    :type: object
    :schema_type: CreativeWork
    :content_type: entity
    :features:
      :creatable:
        :allowed: true
      :translatable:
        :allowed: true
    :properties:
      :id:
        :label: id
        :type: key
      :name:
        :label: Titel
        :type: string
        :storage_location: column
      :thumbnail:
        :label: Thumbnail
        :type: embedded
        :template_name: Embedded-Asset
      :content_block:
        :label: Inhaltsblock
        :type: embedded
        :template_name: Inhaltsblock

- :data:
    :name: Inhaltsblock
    :type: object
    :content_type: embedded
    :schema_type: CreativeWork
    :properties:
      :id:
        :label: id
        :type: key
      :name:
        :label: Titel
        :type: string
        :storage_location: column
      :text:
        :label: Fließtext
        :type: string
        :storage_location: translated_value
        :ui:
          :edit:
            :type: text_editor
            :options:
              :data-size: full
      :image:
        :label: Bild
        :type: embedded
        :template_name: Embedded-Asset

- :data:
    :name: Embedded-Asset
    :type: object
    :schema_type: CreativeWork
    :content_type: embedded
    :properties:
      :id:
        :label: id
        :type: key
      :asset:
        :label: Bild
        :type: asset
        :asset_type: image
      :caption:
        :label: Bildunterschrift
        :type: string
        :storage_location: translated_value
      :text:
        :label: Bildbeschreibung (Alt-Label)
        :type: string
        :storage_location: translated_value