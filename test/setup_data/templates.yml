---
- :data:
    :name: Thema
    :description: CreativeWork
    :type: object
    :properties:
      :headline:
        :label: Titel
        :type: string
        :storage_type: string
        :storage_location: content
        :validations:
          :minLength: 1
        :editor:
          :type: input
          :sorting: 1
          :options:
            :data-validate: text
      :description:
        :label: Beschreibung
        :type: string
        :storage_type: text
        :storage_location: column
        :editor:
          :type: quillEditor
          :sorting: 2
          :options:
            :data-size: full
      :topics:
        :label: Themenbereiche
        :type: classificationTreeLabel
        :type_name: Themenbereiche
        :storage_type: classification_creative_works
        :storage_location: classification_creative_works
        :editor:
          :type: classificationSelector
          :sorting: 3
      :markets:
        :label: Zielmarkt
        :type: classificationTreeLabel
        :type_name: Märkte
        :storage_type: classification_creative_works
        :storage_location: classification_creative_works
        :editor:
          :type: classificationSelector
          :sorting: 4
      :tags:
        :label: Tags
        :type: classificationTreeLabel
        :type_name: Sonstiges
        :storage_type: classification_creative_works
        :storage_location: classification_creative_works
        :editor:
          :type: classificationSelector
          :sorting: 5
      :state:
        :label: Bundesland
        :type: classificationTreeLabel
        :type_name: Bundesländer
        :storage_type: classification_creative_works
        :storage_location: classification_creative_works
        :validations:
          :max: 1
        :editor:
          :type: classificationSelector
          :sorting: 6
      :validityPeriod:
        :label: Gültigkeitszeitraum
        :type: object
        :storage_location: metadata
        :validations:
          :daterange:
            :from: validFrom
            :to: validUntil
        :editor:
          :sorting: 7
          :options:
            :class: daterange
        :properties:
          :validFrom:
            :label: Gültigkeit
            :type: string
            :storage_type: string
            :storage_location: metadata
            :validations:
              :format: date_time
            :editor:
              :type: date
              :options:
                :data-type: datepicker
          :validUntil:
            :label: bis
            :type: string
            :storage_type: string
            :storage_location: metadata
            :validations:
              :format: date_time
            :editor:
              :type: date
              :options:
                :data-type: datepicker
      :data_pool:
        :label: Inhaltspool
        :type: classificationTreeLabel
        :type_name: Inhaltspools
        :storage_type: classification_creative_works
        :storage_location: classification_creative_works
        :default_value: "Aktuelle Themen"
      :creator:
        :label: Ersteller
        :type: embeddedLink
        :type_name: users
        :storage_type: string
        :storage_location: metadata
      :dateCreated:
        :label: Erstellungsdatum
        :type: string
        :storage_type: string
        :storage_location: metadata
        :validations:
          :format: date_time
      :dateModified:
        :label: Änderungsdatum
        :type: string
        :storage_type: string
        :storage_location: metadata
        :validations:
          :format: date_time

