---
- :data:
    :name: Content-Einheit
    :description: CreativeWork
    :type: object
    :properties:
      :title:
        :label: Titel
        :type: string
        :storage_type: string
        :storage_location: content
        :validations:
          :minLength: 10
          :maxLength: 50
      :description:
        :label: Beschreibung
        :type: string
        :storage_type: text
        :storage_location: column
      :topics:
        :label: Themenbereiche
        :type: classificationTreeLabel
        :type_name: Themenbereiche
        :storage_type: classification_creative_works
        :storage_location: classification_creative_works
      :markets:
        :label: Zielmarkt
        :type: classificationTreeLabel
        :type_name: Märkte
        :storage_type: classification_creative_works
        :storage_location: classification_creative_works
      :tags:
        :label: Tags
        :type: classificationTreeLabel
        :type_name: Sonstiges
        :storage_type: classification_creative_works
        :storage_location: classification_creative_works
      :state:
        :label: Bundesland
        :type: classificationTreeLabel
        :type_name: Bundesländer
        :storage_type: classification_creative_works
        :storage_location: classification_creative_works
      :validityPeriod:
        :label: Gültigkeitszeitraum
        :type: object
        :storage_location: metadata
        :properties:
          :validFrom:
            :label: Gültig von
            :type: string
            :storage_type: string
            :storage_location: metadata
            :validations:
              :format: date_time
          :validUntil:
            :label: Gültig bis
            :type: string
            :storage_type: string
            :storage_location: metadata
            :validations:
              :format: date_time
      :creator:   # person table not implemented yet
        :label: Ersteller
        :type: embeddedLink
        :type_name: users
        :storage_type: string
        :storage_location: metadata
      :dateCreated:
        :label: Erstellungsdatum
        :type: string
        :storage_type: string
        :storage_location: metadata
        :validations:
          :format: date_time
      :dateModified:
        :label: Änderungsdatum
        :type: string
        :storage_type: string
        :storage_location: metadata
        :validations:
          :format: date_time

- :data:
    :validation:
      :name: Recherche
      :description: CreativeWork
      :type: object
      :properties:
        :image:
          :label: Bilder
          :type: creativeWorkRef
          :type_name: Bild
          :storage_type: array
          :storage_location: metadata
          :validations:
            :format: uuid
        :video:
          :label: Videos
          :type: creativeWorkRef
          :type_name: Video
          :storage_type: array
          :storage_location: metadata
          :validations:
            :format: uuid
        :text:
          :label: Text
          :type: string
          :storage_type: string
          :storage_location: metadata
