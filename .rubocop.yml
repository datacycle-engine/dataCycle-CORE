# author: rainer@pixelpoint.at
inherit_from: .rubocop_todo.yml

AllCops:
  TargetRubyVersion: 2.4.3
  TargetRailsVersion: 5.0
  DisplayCopNames: true
  Exclude:
    - 'node_modules/**/*'
    - 'tmp/**/*'

Rails:
  Enabled: true

########## Layout
Layout/MultilineMethodCallIndentation:
  EnforcedStyle: indented

########## Style
Style/BlockDelimiters:
  EnforcedStyle: braces_for_chaining

Style/BracesAroundHashParameters:
  Enabled: false

Style/ConditionalAssignment:
  Enabled: false

Style/Documentation:
  Enabled: false

Style/EmptyMethod:
  EnforcedStyle: expanded

Style/MixinUsage:
  Exclude:
    - 'test/dummy/bin/setup'
    - 'test/dummy/bin/update'

Style/MultilineBlockChain:
  Enabled: false

Style/NestedTernaryOperator:
  Enabled: false

Style/NumericLiteralPrefix:
  Exclude:
    - 'config/initializers/carrierwave.rb'

Style/RedundantReturn:
  AllowMultipleReturnValues: true

Style/SymbolArray:
  EnforcedStyle: brackets

Style/WordArray:
  EnforcedStyle: brackets

########## Metrics
Metrics/AbcSize:
  Enabled: false

Metrics/BlockLength:
  Enabled: false

Metrics/BlockNesting:
  Max: 5

Metrics/ClassLength:
  Enabled: false

Metrics/CyclomaticComplexity:
  Enabled: false

Metrics/LineLength:
  Enabled: false

Metrics/MethodLength:
  Enabled: false

Metrics/ModuleLength:
  Enabled: false

Metrics/ParameterLists:
  Enabled: false

Metrics/PerceivedComplexity:
  Enabled: false

########## Security
Security/YAMLLoad:
  Exclude:
    - 'app/models/data_cycle_core/master_data/import_classifications.rb'
    - 'app/models/data_cycle_core/master_data/import_templates.rb'

########## Transproc
# Offense count: 1
Layout/AlignParameters:
  Exclude:
    - 'app/models/data_cycle_core/generic/transformations/transformations.rb'

# Offense count: 4
Style/Lambda:
  Exclude:
    - 'app/models/data_cycle_core/generic/transformations/transformations.rb'

# Offense count: 1
Layout/MultilineHashBraceLayout:
  Exclude:
    - 'app/models/data_cycle_core/generic/transformations/transformations.rb'

# Offense count: 2
# Cop supports --auto-correct.
Style/RescueModifier:
  Exclude:
    - 'app/models/data_cycle_core/generic/transformations/transformations.rb'

# Offense count: 39
Style/StabbyLambdaParentheses:
  Exclude:
    - 'app/models/data_cycle_core/generic/transformations/transformations.rb'

########## check later
# Offense count: 69
Style/ClassAndModuleChildren:
  Enabled: false

# Offense count: 14
Style/ClassVars:
  Exclude:
    - 'app/controllers/data_cycle_core/api/v1/classification_controller.rb'
    - 'app/controllers/data_cycle_core/api/v1/contents_controller.rb'
    - 'app/controllers/data_cycle_core/object_browser_controller.rb'
    - 'app/helpers/data_cycle_core/data_hash_helper.rb'
    - 'app/models/data_cycle_core/master_data/validators/classification_tree_label.rb'
    - 'app/models/data_cycle_core/master_data/validators/embedded_link_array.rb'
    - 'app/models/data_cycle_core/master_data/validators/number.rb'
    - 'app/models/data_cycle_core/master_data/validators/object.rb'
    - 'app/models/data_cycle_core/master_data/validators/string.rb'

# Offense count: 33
Style/DateTime:
  Enabled: false

Style/FrozenStringLiteralComment:
  Enabled: false

# Offense count: 49
Style/GuardClause:
  Enabled: false

# Offense count: 2
Style/MethodMissing:
  Exclude:
    - 'app/models/data_cycle_core/callbacks.rb'
    - 'app/models/data_cycle_core/content.rb'

# Offense count: 9
# Cop supports --auto-correct.
Style/MutableConstant:
  Exclude:
    - 'app/helpers/data_cycle_core/application_helper.rb'
    - 'app/helpers/data_cycle_core/history_helper.rb'
    - 'app/models/data_cycle_core/content.rb'
    - 'app/models/data_cycle_core/filter/query_builder.rb'
    - 'app/models/data_cycle_core/filter/search.rb'
    - 'lib/data_cycle_core/version.rb'