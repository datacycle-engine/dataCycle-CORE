---
- :data:
    :name: Event
    :type: object
    :boost: 10.0
    :content_type: entity
    :permissions:
      :read_write: true
    :properties:
      :id:
        :label: id
        :type: string
        :storage_type: string
        :storage_location: key
        :validations:
          :format: uuid
      :name:
        :label: Titel
        :type: string
        :storage_type: string
        :storage_location: content
        :search: true
        :validations:
          :minLength: 1
        :editor:
          :type: input
          :sorting: 1
          :options:
            :data-validate: text
      # mixin: validity_period
      :validity_period:
        :label: Gültigkeitszeitraum
        :type: object
        :storage_location: metadata
        :validations:
          :daterange:
            :from: valid_from
            :to: valid_until
        :editor:
          :sorting: 3
          :options:
            :class: daterange
        :properties:
          :valid_from:
            :label: Gültigkeit
            :type: string
            :storage_type: string
            :storage_location: metadata
            :validations:
              :format: date_time
            :editor:
              :type: date
              :options:
                :data-type: datepicker
                :data-validate: daterange
                :placeholder: tt.mm.jjjj
          :valid_until:
            :label: bis
            :type: string
            :storage_type: string
            :storage_location: metadata
            :validations:
              :format: date_time
            :editor:
              :type: date
              :options:
                :data-type: datepicker
                :data-validate: daterange
                :placeholder: tt.mm.jjjj
      :event_period:
        :label: Veranstaltungszeitraum
        :type: object
        :storage_location: metadata
        :validations:
          :daterange:
            :from: start_date
            :to: end_date
        :editor:
          :sorting: 4
          :options:
            :class: daterange
        :properties:
          :start_date:
            :label: Startzeitpunkt
            :type: string
            :storage_type: string
            :storage_location: column
            :validations:
              :format: date_time
            :editor:
              :type: datetime
              :sorting: 1
              :options:
                :data-type: datepicker
                :data-validate: daterange
                :placeholder: "tt.mm.jjjj --:--"
          :end_date:
            :label: Endzeitpunkt
            :type: string
            :storage_type: string
            :storage_location: column
            :validations:
              :format: date_time
            :editor:
              :type: datetime
              :sorting: 2
              :options:
                :data-type: datepicker
                :data-validate: daterange
                :placeholder: "tt.mm.jjjj --:--"
      :description:
        :label: Beschreibung
        :type: string
        :storage_type: text
        :storage_location: column
        :search: true
        :editor:
          :type: quillEditor
          :sorting: 5
          :options:
            :data-size: basic
      :image:
        :label: Bilder
        :type: embeddedLinkArray
        :type_name: creative_works
        :storage_type: array
        :storage_location: metadata
        :editor:
          :sorting: 6
          :type: objectBrowser
          :options:
            :data-validate: media
            :data-type: image
      :url:
        :label: URL
        :type: string
        :storage_type: string
        :storage_location: content
        :validations:
          :format: url
        :editor:
          :type: input
          :sorting: 7
      :location:
        :label: Veranstaltungsort
        :type: object
        :storage_location: places
        :name: Örtlichkeit
        :delete: false
        :validations:
          :max: 1
        :editor:
          :sorting: 8
          :type: objectBrowser
          :options:
            :data-validate: object
            :data-type: place
      :sub_event:
        :label: Veranstaltungsdaten
        :type: object
        :storage_location: events
        :delete: true
        :name: SubEvent
        :editor:
          :type: embeddedObject
          :sorting: 9
      :data_type:
        :label: Inhaltstype
        :type: classificationTreeLabel
        :type_name: Inhaltstypen
        :storage_location: classification_relation
        :default_value: "Veranstaltung"
      # mixin: content_classifications
      :output_channel:
        :label: Ausgabekanal
        :type: classificationTreeLabel
        :type_name: Ausgabekanäle
        :storage_location: classification_relation
        :editor:
          :type: classificationSelector
          :sorting: 80
      # mixin: meta_data
      :creator:
        :label: Ersteller
        :type: embeddedLink
        :type_name: users
        :storage_type: string
        :storage_location: metadata
      :date_created:
        :label: Erstellungsdatum
        :type: string
        :storage_type: string
        :storage_location: metadata
        :validations:
          :format: date_time
      :date_modified:
        :label: Änderungsdatum
        :type: string
        :storage_type: string
        :storage_location: metadata
        :validations:
          :format: date_time
