
- :data:
    :name: SubEvent
    :type: object
    :permissions:
      :read_write: false
    :content_type: embedded
    :properties:
      :id:
        :label: id
        :type: string
        :storage_type: string
        :storage_location: key
        :validations:
          :format: uuid
      :name:
        :label: Titel
        :type: string
        :storage_type: string
        :storage_location: content
        :editor:
          :type: input
          :sorting: 1
          :options:
            :data-validate: text
      :event_period:
        :label: Veranstaltungszeitraum
        :type: object
        :storage_location: metadata
        :validations:
          :daterange:
            :from: start_date
            :to: end_date
        :editor:
          :sorting: 2
          :options:
            :class: daterange
        :properties:
          :start_date:
            :label: Startzeitpunkt
            :type: string
            :storage_type: string
            :storage_location: column
            :validations:
              :format: date_time
            :editor:
              :type: datetime
              :sorting: 1
              :options:
                :data-type: datepicker
                :data-validate: daterange
                :placeholder: "tt.mm.jjjj --:--"
          :end_date:
            :label: Endzeitpunkt
            :type: string
            :storage_type: string
            :storage_location: column
            :validations:
              :format: date_time
            :editor:
              :type: datetime
              :sorting: 2
              :options:
                :data-type: datepicker
                :data-validate: daterange
                :placeholder: "tt.mm.jjjj --:--"
      :description:
        :label: Beschreibung
        :type: string
        :storage_type: text
        :storage_location: column
        :editor:
          :type: quillEditor
          :sorting: 3
          :options:
            :data-size: basic
      :image:
        :label: Bilder
        :type: embeddedLinkArray
        :type_name: creative_works
        :storage_type: array
        :storage_location: metadata
        :editor:
          :sorting: 4
          :type: objectBrowser
          :options:
            :data-validate: media
            :data-type: image
      :url:
        :label: URL
        :type: string
        :storage_type: string
        :storage_location: content
        :validations:
          :format: url
        :editor:
          :type: input
          :sorting: 5
      :location:
        :label: Veranstaltungsort
        :type: object
        :storage_location: places
        :name: Örtlichkeit
        :delete: false
        :validations:
          :max: 1
        :editor:
          :sorting: 6
          :type: objectBrowser
          :options:
            :data-validate: object
            :data-type: place
      #metadata
      :data_type:
        :label: Inhaltstype
        :type: classificationTreeLabel
        :type_name: Inhaltstypen
        :storage_location: classification_relation
        :default_value: "Veranstaltungstermin"
      :creator:
        :label: Ersteller
        :type: embeddedLink
        :type_name: users
        :storage_type: string
        :storage_location: metadata
      :date_created:
        :label: Erstellungsdatum
        :type: string
        :storage_type: string
        :storage_location: metadata
        :validations:
          :format: date_time
      :date_modified:
        :label: Änderungsdatum
        :type: string
        :storage_type: string
        :storage_location: metadata
        :validations:
          :format: date_time
