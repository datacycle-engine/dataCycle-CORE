---
- :data:
    :name: Person
    :type: object
    :schema_type: Person
    :content_type: entity
    :boost: 1.0
    :features:
      :creatable:
        :allowed: true
      :translatable:
        :allowed: true
    :properties:
      :id:
        :label: id
        :type: key
      :title:
        :type: mixin
        :name: title
      :honorific_prefix:
        :label: "Anrede / Titel"
        :type: string
        :storage_location: translated_value
      :contact_info:
        :type: mixin
        :name: contact_info
      :postal_address:
        :type: mixin
        :name: postal_address
      :job_title:
        :label: Position
        :type: string
        :storage_location: translated_value
        :search: true
      :description:
        :label: Text
        :type: string
        :storage_location: column
        :search: true
        :ui:
          :edit:
            :type: text_editor
            :options:
              :data-size: full
      :image:
        :label: Bilder
        :type: linked
        :template_name: Bild
      :gender:
        :label: Geschlecht
        :type: classification
        :tree_label: Geschlecht
        :ui:
          :show:
            :content_area: header
      :data_type:
        :label: Inhaltstype
        :type: classification
        :tree_label: Inhaltstypen
        :default_value: "Person"
      :content_classifications:
        :type: mixin
        :name: content_classifications
      :meta_data:
        :type: mixin
        :name: meta_data
      :additional_properties:
        :type: mixin
        :name: additional_properties
