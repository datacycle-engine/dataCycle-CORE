---
- :data:
    :name: Artikel
    :type: object
    :content_type: entity
    :permissions:
      :read_write: true
    :boost: 100.0
    :releasable: true
    :properties:
      :id:
        :label: id
        :type: string
        :storage_type: string
        :storage_location: key
        :validations:
          :format: uuid
      :headline:
        :label: Titel
        :type: string
        :storage_type: string
        :storage_location: column
        :search: true
        :validations:
          :minLength: 1
        :editor:
          :type: input
          :sorting: 1
          :options:
            :data-validate: text
      :alternative_headline:
        :label: Subüberschrift
        :type: string
        :storage_type: string
        :storage_location: content
        :search: true
        :editor:
          :type: input
          :sorting: 2
      :name:
        :label: Linktitel
        :type: string
        :storage_type: string
        :storage_location: content
        :search: true
        :editor:
          :type: input
          :sorting: 3
      :text:
        :label: Fließtext
        :type: string
        :storage_type: text
        :storage_location: content
        :search: true
        :editor:
          :type: quillEditor
          :sorting: 6
          :options:
            :data-size: full
      :image:
        :label: Bilder
        :type: embeddedLinkArray
        :type_name: creative_works
        :storage_type: array
        :storage_location: metadata
        :editor:
          :sorting: 11
          :type: objectBrowser
          :options:
            :data-validate: media
            :data-type: image
      :content_location:
        :label: Ort
        :type: object
        :storage_location: places
        :name: Ort
        :delete: false
        :editor:
          :sorting: 12
          :type: objectBrowser
          :options:
            :data-validate: object
            :data-type: place
      :quotation:
        :label: Zitat
        :type: object
        :storage_location: creative_works
        :delete: true
        :name: Zitat
        :editor:
          :type: embeddedObject
          :sorting: 13
          :options:
            :data-validate: text
      :thema:
        :label: Thema
        :type: classificationTreeLabel
        :type_name: Thema
        :storage_location: classification_relation
        :editor:
          :type: classificationSelector
          :sorting: 14
          :options:
            :tabindex: -1
#      :video:
#        :label: Videos
#        :type: embeddedLinkArray
#        :type_name: creative_works
#        :storage_type: array
#        :storage_location: metadata
#        :releasable: true
#        :editor:
#          :sorting: 12
#          :options:
#            :data-validate: media
#            :data-type: video
      #meta attributes
      :output_channels:
        :label: Ausgabekanäle
        :type: classificationTreeLabel
        :type_name: Ausgabekanäle
        :storage_location: classification_relation
        :editor:
          :type: classificationSelector
          :sorting: 23
      :publication_schedule:
        :label: Geplante Publikation
        :type: object
        :storage_location: creative_works
        :delete: true
        :name: Publikations-Plan
        :validations:
          :classifications: no_conflicts
        :editor:
          :type: embeddedObject
          :sorting: 25
          :options:
            :data-validate: publication
      :validity_period:
        :label: Gültigkeitszeitraum
        :type: object
        :storage_location: metadata
        :validations:
          :daterange:
            :from: valid_from
            :to: valid_until
        :editor:
          :sorting: 99
          :options:
            :class: daterange
            :tabindex: -1
        :properties:
          :valid_from:
            :label: Gültigkeit
            :type: string
            :storage_type: string
            :storage_location: metadata
            :validations:
              :format: date_time
            :editor:
              :type: date
              :options:
                :data-type: datepicker
                :data-validate: daterange
                :placeholder: tt.mm.jjjj
          :valid_until:
            :label: bis
            :type: string
            :storage_type: string
            :storage_location: metadata
            :validations:
              :format: date_time
            :editor:
              :type: date
              :options:
                :data-type: datepicker
                :data-validate: daterange
                :placeholder: tt.mm.jjjj
      :data_type:
        :label: Inhaltstype
        :type: classificationTreeLabel
        :type_name: Inhaltstypen
        :storage_location: classification_relation
        :default_value: "Artikel"
      :creator:
        :label: Ersteller
        :type: embeddedLink
        :type_name: users
        :storage_type: string
        :storage_location: metadata
      :date_created:
        :label: Erstellungsdatum
        :type: string
        :storage_type: string
        :storage_location: metadata
        :validations:
          :format: date_time
      :date_modified:
        :label: Änderungsdatum
        :type: string
        :storage_type: string
        :storage_location: metadata
        :validations:
          :format: date_time
