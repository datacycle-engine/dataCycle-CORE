---
- :data:
    :name: Angebot
    :type: object
    :content_type: entity
    :permissions:
      :read_write: true
    :boost: 100.0
    :properties:
      :id:
        :label: id
        :type: string
        :storage_type: string
        :storage_location: key
        :validations:
          :format: uuid
      :headline:
        :label: Titel
        :type: string
        :storage_type: string
        :storage_location: column
        :search: true
        :validations:
          :minLength: 1
        :editor:
          :type: input
          :sorting: 1
          :options:
            :data-validate: text
      :alternative_headline:
        :label: Subüberschrift
        :type: string
        :storage_type: string
        :storage_location: content
        :search: true
        :editor:
          :type: input
          :sorting: 2
      :name:
        :label: Linktitel
        :type: string
        :storage_type: string
        :storage_location: content
        :search: true
        :editor:
          :type: input
          :sorting: 3
      :description:
        :label: Teasertext
        :type: string
        :storage_type: text
        :storage_location: column
        :search: true
        :editor:
          :type: quillEditor
          :sorting: 4
          :options:
            :data-size: basic
      :text:
        :label: Fließtext
        :type: string
        :storage_type: text
        :storage_location: content
        :search: true
        :editor:
          :type: quillEditor
          :sorting: 5
          :options:
            :data-size: full
      :price:
        :label: Preis
        :type: string
        :storage_type: text
        :storage_location: content
        :editor:
          :type: input
          :sorting: 6
      :service:
        :label: Inklusivleistungen
        :type: string
        :storage_type: text
        :storage_location: content
        :search: true
        :editor:
          :type: quillEditor
          :sorting: 7
          :options:
            :data-size: full
      :offer_period:
        :label: Angebotszeitraum
        :type: object
        :storage_location: creative_works
        :delete: true
        :name: Angebotszeitraum
        :editor:
          :type: embeddedObject
          :sorting: 8
      :image:
        :label: Bilder
        :type: embeddedLinkArray
        :type_name: creative_works
        :storage_type: array
        :storage_location: metadata
        :editor:
          :sorting: 9
          :type: objectBrowser
          :options:
            :data-validate: media
            :data-type: image
      :website:
        :label: Link
        :type: object
        :storage_location: creative_works
        :delete: true
        :name: Website
        :editor:
          :type: embeddedObject
          :sorting: 10
      :datacycleimage:
        :label: DataCycle-Bild
        :type: object
        :storage_location: creative_works
        :delete: true
        :name: DataCycle-Image
        :editor:
          :type: embeddedObject
      :datacycleasset:
        :label: DataCycle-File
        :type: object
        :storage_location: creative_works
        :delete: true
        :name: DataCycle-File
        :editor:
          :type: embeddedObject
      :thema:
        :label: Thema
        :type: classificationTreeLabel
        :type_name: Thema
        :storage_location: classification_relation
        :editor:
          :type: classificationSelector
          :sorting: 11
          :options:
            :tabindex: -1
      #meta attributes
      :validity_period:
        :label: Gültigkeitszeitraum
        :type: object
        :storage_location: metadata
        :validations:
          :daterange:
            :from: valid_from
            :to: valid_until
        :editor:
          :sorting: 99
          :options:
            :class: daterange
            :tabindex: -1
        :properties:
          :valid_from:
            :label: Gültigkeit
            :type: string
            :storage_type: string
            :storage_location: metadata
            :validations:
              :format: date_time
            :editor:
              :type: date
              :options:
                :data-type: datepicker
                :data-validate: daterange
                :placeholder: tt.mm.jjjj
          :valid_until:
            :label: bis
            :type: string
            :storage_type: string
            :storage_location: metadata
            :validations:
              :format: date_time
            :editor:
              :type: date
              :options:
                :data-type: datepicker
                :data-validate: daterange
                :placeholder: tt.mm.jjjj
      :data_type:
        :label: Inhaltstype
        :type: classificationTreeLabel
        :type_name: Inhaltstypen
        :storage_location: classification_relation
        :default_value: "Angebot"
      :creator:
        :label: Ersteller
        :type: embeddedLink
        :type_name: users
        :storage_type: string
        :storage_location: metadata
      :date_created:
        :label: Erstellungsdatum
        :type: string
        :storage_type: string
        :storage_location: metadata
        :validations:
          :format: date_time
      :date_modified:
        :label: Änderungsdatum
        :type: string
        :storage_type: string
        :storage_location: metadata
        :validations:
          :format: date_time

- :data:
    :name: Angebotszeitraum
    :type: object
    :content_type: embedded
    :permissions:
      :read_write: true
    :properties:
      :id:
        :label: id
        :type: string
        :storage_type: string
        :storage_location: key
        :validations:
          :format: uuid
      :is_part_of:
        :label: parent
        :type: string
        :storage_type: string
        :storage_location: column
        :validations:
          :format: uuid
      :creator:
        :label: Ersteller
        :type: embeddedLink
        :type_name: users
        :storage_type: string
        :storage_location: metadata
      :date_created:
        :label: Erstellungsdatum
        :type: string
        :storage_type: string
        :storage_location: metadata
        :validations:
          :format: date_time
      :date_modified:
        :label: Änderungsdatum
        :type: string
        :storage_type: string
        :storage_location: metadata
        :validations:
          :format: date_time
      :data_type:
        :label: Inhaltstype
        :type: classificationTreeLabel
        :type_name: Inhaltstypen
        :storage_location: classification_relation
        :default_value: "Angebotszeitraum"
      :offer_period:
        :label: Zeitraum
        :type: object
        :storage_location: metadata
        :validations:
          :daterange:
            :from: validFrom
            :to: validUntil
        :editor:
          :sorting: 1
          :options:
            :class: daterange validation-container
            :tabindex: -1
        :properties:
          :valid_from:
            :label: "Zeitraum von"
            :type: string
            :storage_type: string
            :storage_location: metadata
            :validations:
              :format: date
            :editor:
              :type: date
              :options:
                :data-type: datepicker
                :data-validate: daterange
                :placeholder: "tt.mm.jjjj"
          :valid_until:
            :label: "bis"
            :type: string
            :storage_type: string
            :storage_location: metadata
            :validations:
              :format: date
            :editor:
              :type: date
              :options:
                :data-type: datepicker
                :data-validate: daterange
                :placeholder: "tt.mm.jjjj"
