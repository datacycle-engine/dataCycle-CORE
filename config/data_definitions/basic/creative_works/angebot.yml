- :data:
    :name: Angebotszeitraum
    :type: object
    :content_type: embedded
    :properties:
      :id:
        :label: id
        :type: string
        :storage_type: string
        :storage_location: key
        :validations:
          :format: uuid
      :offer_period:
        :label: Zeitraum
        :type: object
        :storage_location: metadata
        :validations:
          :daterange:
            :from: valid_from
            :to: valid_until
        :editor:
          :options:
            :class: daterange validation-container
        :properties:
          :valid_from:
            :label: "Zeitraum von"
            :type: string
            :storage_type: string
            :storage_location: metadata
            :validations:
              :format: date
            :editor:
              :type: date
              :options:
                :data-type: datepicker
                :data-validate: daterange
                :placeholder: "tt.mm.jjjj"
          :valid_until:
            :label: "bis"
            :type: string
            :storage_type: string
            :storage_location: metadata
            :validations:
              :format: date
            :editor:
              :type: date
              :options:
                :data-type: datepicker
                :data-validate: daterange
                :placeholder: "tt.mm.jjjj"
      :data_type:
        :label: Inhaltstype
        :type: classificationTreeLabel
        :type_name: Inhaltstypen
        :storage_location: classification_relation
        :default_value: "Angebotszeitraum"
      :meta_data:
        :type: mixin
        :name: meta_data
