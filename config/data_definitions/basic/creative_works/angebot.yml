---
- :data:
    :name: Angebot
    :type: object
    :content_type: entity
    :boost: 100.0
    :features:
      :publication_schedule: ['publication_schedule']
      :releasable: true
    :properties:
      :id:
        :label: id
        :type: key
      :headline:
        :label: Titel
        :type: string
        :storage_location: column
        :search: true
        :validations:
          :min: 1
      :validity_period:
        :type: mixin
        :name: validity_period
      :alternative_headline:
        :label: Subüberschrift
        :type: string
        :storage_location: translated_value
        :search: true
      :description:
        :label: Teasertext
        :type: string
        :storage_location: column
        :search: true
        :ui:
          :edit:
            :type: text_editor
            :options:
              :data-size: basic
      :name:
        :label: Linktitel
        :type: string
        :storage_location: translated_value
        :search: true
      :text:
        :label: Fließtext
        :type: string
        :storage_location: translated_value
        :search: true
        :ui:
          :edit:
            :type: text_editor
            :options:
              :data-size: full
      :price:
        :label: Preis
        :type: string
        :storage_location: value
      :service:
        :label: Inklusivleistungen
        :type: string
        :storage_location: translated_value
        :search: true
        :ui:
          :edit:
            :type: text_editor
            :options:
              :data-size: full
      :offer_period:
        :label: Angebotszeitraum
        :type: embedded
        :linked_table: creative_works
        :template_name: Angebotszeitraum
      :image:
        :label: Bilder
        :type: linked
        :linked_table: creative_works
        :template_name: Bild
      :website:
        :label: Link
        :type: embedded
        :linked_table: creative_works
        :template_name: Website
      :data_type:
        :label: Inhaltstype
        :type: classification
        :tree_label: Inhaltstypen
        :default_value: "Angebot"
      :content_classifications:
        :type: mixin
        :name: content_classifications
      :publication_schedule:
        :type: mixin
        :name: publication_schedule
      :meta_data:
        :type: mixin
        :name: meta_data
      :additional_properties:
        :type: mixin
        :name: additional_properties

- :data:
    :name: Angebotszeitraum
    :type: object
    :content_type: embedded
    :properties:
      :id:
        :label: id
        :type: key
      :offer_period:
        :label: Zeitraum
        :type: object
        :storage_location: value
        :validations:
          :daterange:
            :from: valid_from
            :to: valid_until
        :ui:
          :edit:
            :type: daterange
        :properties:
          :valid_from:
            :label: "Zeitraum von"
            :type: string
            :storage_location: value
            :validations:
              :format: date_time
            :ui:
              :edit:
                :type: date
                :options:
                  :data-validate: daterange
                  :placeholder: tt.mm.jjjj
          :valid_until:
            :label: "bis"
            :type: string
            :storage_location: value
            :validations:
              :format: date_time
            :ui:
              :edit:
                :type: date
                :options:
                  :data-validate: daterange
                  :placeholder: tt.mm.jjjj
      :data_type:
        :label: Inhaltstype
        :type: classification
        :tree_label: Inhaltstypen
        :default_value: "Angebotszeitraum"
      :meta_data:
        :type: mixin
        :name: meta_data
