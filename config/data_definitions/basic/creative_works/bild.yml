---
- :data:
    :name: Bild
    :type: object
    :content_type: entity
    :boost: 10.0
    :properties:
      :id:
        :label: id
        :type: key
      :headline:
        :label: Titel
        :type: string
        :storage_location: column
        :search: true
        :validations:
          :min: 1
      :validity_period:
        :type: mixin
        :name: validity_period
      :caption:
        :label: Alt-Label
        :type: string
        :storage_location: translated_value
        :search: true
      :description:
        :label: Teasertext
        :type: string
        :storage_location: column
        :search: true
        :ui:
          :edit:
            :type: text_editor
            :options:
              :data-size: basic
      :content_url:
        :label: Bild URL
        :type: string
        :storage_location: value
        :validations:
          :format: url
      :thumbnail_url:
        :label: Thumbnail URL
        :type: string
        :storage_location: value
        :validations:
          :format: url
        :ui:
          :show:
            :type: image
      :url:
        :label: Inhalt URL
        :type: string
        :storage_location: value
        :validations:
          :format: url
      :asset:
        :label: Datei
        :type: asset
        :asset_type: image
      :photographer:
        :label: Fotograf
        :type: string
        :storage_location: value
        :search: true
      :license:
        :label: Copyright / Lizenz
        :type: string
        :storage_location: value
        :search: true
      :content_location:
        :label: Ort
        :type: linked
        :linked_table: places
        :template_name: Örtlichkeit
      :width:
        :label: Breite
        :type: number
        :storage_location: value
        :validations:
          :format: integer
      :height:
        :label: Höhe
        :type: number
        :storage_location: value
        :validations:
          :format: integer
      :content_size:
        :label: Dateigröße
        :type: number
        :storage_location: value
        :validations:
          :format: integer
      :file_format:
        :label: Dateiformat
        :type: string
        :storage_location: value
      :tags:
        :type: mixin
        :name: tags
      :data_type:
        :label: Inhaltstype
        :type: classification
        :tree_label: Inhaltstypen
        :default_value: "Bild"
      :content_classifications:
        :type: mixin
        :name: content_classifications
      :meta_data:
        :type: mixin
        :name: meta_data
      :additional_properties:
        :type: mixin
        :name: additional_properties
