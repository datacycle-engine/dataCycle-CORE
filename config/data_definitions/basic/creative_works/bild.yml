---
- :data:
    :name: Bild
    :type: object
    :content_type: entity
    :permissions:
      :read_write: true
    :boost: 10.0
    :properties:
      :id:
        :label: id
        :type: string
        :storage_type: string
        :storage_location: key
        :validations:
          :format: uuid
      :headline:
        :label: Titel
        :type: string
        :storage_type: string
        :storage_location: column
        :search: true
        :editor:
          :type: input
          :options:
            :data-validate: text
      :validity_period:
        :type: mixin
        :name: validity_period
      :caption:
        :label: Alt-Label
        :type: string
        :storage_type: string
        :storage_location: content
        :search: true
        :editor:
          :type: input
      :description:
        :label: Beschreibung
        :type: string
        :storage_type: text
        :storage_location: column
        :search: true
        :editor:
          :type: quillEditor
          :options:
            :data-size: basic
      :content_url:
        :label: Bild URL
        :type: string
        :storage_type: string
        :storage_location: metadata
        :validations:
          :format: url
        :editor:
          :type: input
          :options:
            :data-validate: text
      :thumbnail_url:
        :label: Thumbnail URL
        :type: string
        :storage_type: string
        :storage_location: metadata
        :validations:
          :format: url
        :editor:
          :type: image
      :url:
        :label: Inhalt URL
        :type: string
        :storage_type: string
        :storage_location: metadata
        :validations:
          :format: url
        :editor:
          :type: input
          :options:
            :data-validate: text
      :asset:
        :label: Datei
        :type: asset
        :type_name: DataCycleCore::Image
        :storage_location: asset_relation
        :editor:
          :type: imageAsset
      :photographer:
        :label: Fotograf
        :type: string
        :storage_type: string
        :storage_location: metadata
        :search: true
        :editor:
          :type: input
      :license:
        :label: Copyright / Lizenz
        :type: string
        :storage_type: string
        :storage_location: metadata
        :search: true
        :editor:
          :type: input
      :content_location:
        :label: Ort
        :type: object
        :storage_location: places
        :name: Örtlichkeit
        :editor:
          :type: objectBrowser
      :width:
        :label: Breite
        :type: number
        :storage_type: number
        :storage_location: metadata
        :validations:
          :format: integer
        :editor:
          :type: input
      :height:
        :label: Höhe
        :type: number
        :storage_type: number
        :storage_location: metadata
        :validations:
          :format: integer
        :editor:
          :type: input
      :content_size:
        :label: Dateigröße
        :type: number
        :storage_type: number
        :storage_location: metadata
        :validations:
          :format: integer
        :editor:
          :type: input
      :file_format:
        :label: Dateiformat
        :type: string
        :storage_type: string
        :storage_location: metadata
        :editor:
          :type: input
      :data_type:
        :label: Inhaltstype
        :type: classificationTreeLabel
        :type_name: Inhaltstypen
        :storage_location: classification_relation
        :default_value: "Bild"
      :content_classifications:
        :type: mixin
        :name: content_classifications
      :meta_data:
        :type: mixin
        :name: meta_data