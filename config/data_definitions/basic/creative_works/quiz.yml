---
- :data:
    :name: Quiz
    :type: object
    :content_type: entity
    :releasable: true
    :permissions:
      :read_write: true
    :boost: 100.0
    :properties:
      :id:
        :label: id
        :type: string
        :storage_type: string
        :storage_location: key
        :validations:
          :format: uuid
      :headline:
        :label: Titel
        :type: string
        :storage_type: string
        :storage_location: column
        :search: true
        :validations:
          :minLength: 1
        :editor:
          :type: input
          :options:
            :data-validate: text
      :validity_period:
        :type: mixin
        :name: validity_period
      :alternative_headline:
        :label: Subüberschrift
        :type: string
        :storage_type: string
        :storage_location: content
        :search: true
        :editor:
          :type: input
      :description:
        :label: Teasertext
        :type: string
        :storage_type: text
        :storage_location: column
        :search: true
        :editor:
          :type: quillEditor
          :options:
            :data-size: full
      :question:
        :label: Frage
        :type: object
        :storage_location: creative_works
        :delete: true
        :name: Frage
        :editor:
          :type: embeddedObject
      :data_type:
        :label: Inhaltstype
        :type: classificationTreeLabel
        :type_name: Inhaltstypen
        :storage_location: classification_relation
        :default_value: "Quiz"
      :content_classifications:
        :type: mixin
        :name: content_classifications
      :meta_data:
        :type: mixin
        :name: meta_data

- :data:
    :name: Frage
    :type: object
    :content_type: embedded
    :permissions:
      :read_write: true
    :properties:
      :id:
        :label: id
        :type: string
        :storage_type: string
        :storage_location: key
        :validations:
          :format: uuid
      :headline:
        :label: Frage
        :type: string
        :storage_type: string
        :storage_location: column
        :validations:
          :minLength: 1
        :editor:
          :type: input
          :options:
            :data-validate: text
      :text:
        :label: Hinweis
        :type: string
        :storage_type: text
        :storage_location: content
        :editor:
          :type: quillEditor
          :options:
            :data-size: basic
      :image:
        :label: Bild
        :type: embeddedLinkArray
        :type_name: creative_works
        :storage_type: array
        :storage_location: metadata
        :validations:
          :max: 1
        :editor:
          :type: objectBrowser
          :options:
            :data-validate: media
            :data-type: image
      :accepted_answer:
        :label: Richtige Antwort
        :type: object
        :storage_location: creative_works
        :delete: true
        :name: Antwort
        :validations:
          :maxLength: 1
        :editor:
          :type: embeddedObject
          :sorting: 6
      :suggested_answer:
        :label: Falsche Antwort
        :type: object
        :storage_location: creative_works
        :delete: true
        :name: Antwort
        :editor:
          :type: embeddedObject
      :data_type:
        :label: Inhaltstype
        :type: classificationTreeLabel
        :type_name: Inhaltstypen
        :storage_location: classification_relation
        :default_value: "Frage"
      :meta_data:
        :type: mixin
        :name: meta_data

- :data:
    :name: Antwort
    :type: object
    :content_type: embedded
    :permissions:
      :read_write: true
    :properties:
      :id:
        :label: id
        :type: string
        :storage_type: string
        :storage_location: key
        :validations:
          :format: uuid
      :text:
        :label: Antwort
        :type: string
        :storage_type: text
        :storage_location: content
        :validations:
          :minLength: 1
        :editor:
          :type: quillEditor
          :options:
            :data-size: basic
            :data-validate: text
      :image:
        :label: Bild
        :type: embeddedLinkArray
        :type_name: creative_works
        :storage_type: array
        :storage_location: metadata
        :validations:
          :max: 1
        :editor:
          :type: objectBrowser
          :options:
            :data-validate: media
            :data-type: image
      :data_type:
        :label: Inhaltstype
        :type: classificationTreeLabel
        :type_name: Inhaltstypen
        :storage_location: classification_relation
        :default_value: "Antwort"
      :meta_data:
        :type: mixin
        :name: meta_data