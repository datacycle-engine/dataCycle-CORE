        :type: classification
        :tree_label: EURO Velo Radrouten
        :ui:
          :show:
            :content_area: header
      :bikecomfort:
        :label: Schwierigkeitsgrad
        :type: classification
        :tree_label: Schwierigkeitsgrad
        :ui:
          :show:
            :content_area: header
