        :type: classification
        :tree_label: Erhalter
        :ui:
          :show:
            :content_area: header
      :atroute:
        :label: Österreichische Radrouten
        :type: classification
        :tree_label: Österreichische Radrouten
        :ui:
          :show:
            :content_area: header
      :eurovelo:
