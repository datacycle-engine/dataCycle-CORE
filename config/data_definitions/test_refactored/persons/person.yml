---
- :data:
    :name: Person
    :type: object
    :content_type: entity
    :boost: 1.0
    :properties:
      :id:
        :label: id
        :type: key
      :given_name:
        :label: Vorname
        :type: string
        :storage_location: column
        :search: true
        :validations:
          :minLength: 1
      :family_name:
        :label: Nachname
        :type: string
        :storage_location: column
        :search: true
        :validations:
          :minLength: 1
      :honorific_prefix:
        :label: "Anrede / Titel"
        :type: string
        :storage_location: translated_value
      :contact_info:
        :type: mixin
        :name: contact_info
      :postal_address:
        :type: mixin
        :name: postal_address
      :job_title:
        :label: Position
        :type: string
        :storage_location: translated_value
        :search: true
      :description:
        :label: Teasertext
        :type: string
        :storage_location: column
        :search: true
        :ui:
          :edit:
            :type: quillEditor
            :options:
              :data-size: full
#      :image:
#        :label: Bilder
#        :type: linked
#        :linked_table: creative_works
##        :stored_filter: (name ?)
#        :ui:
#          :edit:
#            :type: objectBrowser
#            :options:
#              :data-validate: media
#              :data-type: image
      :gender:
        :label: Geschlecht
        :type: classification
        :tree_label: Geschlecht
      :data_type:
        :label: Inhaltstype
        :type: classification
        :tree_label: Inhaltstypen
        :default_value: "Person"
      :content_classifications:
        :type: mixin
        :name: content_classifications
      :meta_data:
        :type: mixin
        :name: meta_data
