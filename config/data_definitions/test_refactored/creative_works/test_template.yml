---
- :data:
    :name: Test-Template
    :type: object
    :content_type: entity
    :boost: 100.0
    :features:
      :releasable: true
    :properties:
      :id:
        :label: id
        :type: key
#      :overlay:
#        :label: TestOverlay
#        :type: embedded
#        :linked_table: creative_works
#        :template_name: TestOverlay
#        :validations:
#          :maxLength: 1
      :headline:
        :label: Titel
        :type: string
        :storage_location: column
        :search: true
        :validations:
          :min: 1
      :description:
        :label: Teasertext
        :type: string
        :storage_location: column
        :search: true
        :ui:
          :edit:
            :type: text_editor
            :options:
              :data-size: basic
      :text:
        :label: Fließtext
        :type: string
        :storage_location: translated_value
        :search: true
        :ui:
          :edit:
            :type: text_editor
            :options:
              :data-size: full
      :number_test:
        :label: Number-Test
        :type: number
        :storage_location: value
        :validations:
          :format: integer
      :url:
        :label: Inhalt URL
        :type: string
        :storage_location: value
        :validations:
          :format: url
      :primary_image:
        :label: Hauptbild
        :type: linked
        :linked_table: creative_works
        :template_name: Bild
        :validations:
          :max: 1
      :image:
        :label: Bilder
        :type: linked
        :linked_table: creative_works
        :template_name: Bild
      :content_location:
        :label: Ort
        :type: linked
        :linked_table: places
        :template_name: Örtlichkeit
      :quotation:
        :label: Zitat
        :type: embedded
        :linked_table: creative_works
        :template_name: Zitat
