#        :label: Bild
#        :type: asset
#        :asset_type: image
#      :asset:
#        :label: File-Asset
#        :type: asset
#        :asset_type: file
      :data_type:
        :label: Inhaltstype
        :type: classification
        :tree_label: Inhaltstypen
        :default_value: "Test-Template"
      :contact_info:
        :type: mixin
        :name: contact_info
      :postal_address:
        :type: mixin
        :name: postal_address
      :validity_period:
        :type: mixin
        :name: validity_period
      :content_classifications:
        :type: mixin
        :name: content_classifications
      :meta_data:
        :type: mixin
        :name: meta_data
