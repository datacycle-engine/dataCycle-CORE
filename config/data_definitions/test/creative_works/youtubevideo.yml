---
- :data:
    :name: Youtube-Video
    :type: object
    :content_type: embedded
    :permissions:
      :read_write: true
    :boost: 1.0
    :properties:
      :id:
        :label: id
        :type: string
        :storage_type: string
        :storage_location: key
        :validations:
          :format: uuid
      :headline:
        :label: Titel
        :type: string
        :storage_type: string
        :storage_location: column
        :search: true
        :validations:
          :minLength: 1
        :editor:
          :type: input
          :sorting: 1
          :options:
            :data-validate: text
      :youtube_url:
        :label: Youtube Url
        :type: string
        :storage_type: string
        :storage_location: content
        :validations:
          :minLength: 1
          :format: url
        :editor:
          :type: input
          :sorting: 2
          :options:
            :data-validate: text
      :data_type:
        :label: Inhaltstype
        :type: classificationTreeLabel
        :type_name: Inhaltstypen
        :storage_location: classification_relation
        :default_value: "Youtube-Video"
      # mixin: meta_data
      :creator:
        :label: Ersteller
        :type: embeddedLink
        :type_name: users
        :storage_type: string
        :storage_location: metadata
      :date_created:
        :label: Erstellungsdatum
        :type: string
        :storage_type: string
        :storage_location: metadata
        :validations:
          :format: date_time
      :date_modified:
        :label: Änderungsdatum
        :type: string
        :storage_type: string
        :storage_location: metadata
        :validations:
          :format: date_time
