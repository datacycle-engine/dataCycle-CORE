---
- :data:
    :name: MobileApplication
    :type: object
    :content_type: embedded
    :boost: 1.0
    :properties:
      :id:
        :label: id
        :type: string
        :storage_type: string
        :storage_location: key
        :validations:
          :format: uuid
      :url:
        :label: URL
        :type: string
        :storage_type: string
        :storage_location: content
        :validations:
          :minLength: 1
          :format: url
        :editor:
          :type: input
          :options:
            :data-validate: text
      :operating_system:
        :label: Plattform
        :type: classificationTreeLabel
        :type_name: Plattform
        :storage_location: classification_relation
        :editor:
          :type: classificationSelector
      :data_type:
        :label: Inhaltstype
        :type: classificationTreeLabel
        :type_name: Inhaltstypen
        :storage_location: classification_relation
        :default_value: "MobileApplication"
      :meta_data:
        :type: mixin
        :name: meta_data