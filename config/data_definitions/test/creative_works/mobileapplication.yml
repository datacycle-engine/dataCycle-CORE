---
- :data:
    :name: MobileApplication
    :type: object
    :content_type: embedded
    :permissions:
      :read_write: true
    :boost: 1.0
    :properties:
      :id:
        :label: id
        :type: string
        :storage_type: string
        :storage_location: key
        :validations:
          :format: uuid
      :url:
        :label: URL
        :type: string
        :storage_type: string
        :storage_location: content
        :validations:
          :minLength: 1
          :format: url
        :editor:
          :type: input
          :sorting: 1
          :options:
            :data-validate: text
      :operating_system:
        :label: Plattform
        :type: classificationTreeLabel
        :type_name: Plattform
        :storage_location: classification_relation
        :editor:
          :type: classificationSelector
          :sorting: 2
          :options:
            :tabindex: -1
      :data_type:
        :label: Inhaltstype
        :type: classificationTreeLabel
        :type_name: Inhaltstypen
        :storage_location: classification_relation
        :default_value: "MobileApplication"
      # mixin: meta_data
      :creator:
        :label: Ersteller
        :type: embeddedLink
        :type_name: users
        :storage_type: string
        :storage_location: metadata
      :date_created:
        :label: Erstellungsdatum
        :type: string
        :storage_type: string
        :storage_location: metadata
        :validations:
          :format: date_time
      :date_modified:
        :label: Änderungsdatum
        :type: string
        :storage_type: string
        :storage_location: metadata
        :validations:
          :format: date_time
