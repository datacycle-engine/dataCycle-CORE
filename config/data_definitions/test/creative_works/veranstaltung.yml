---
- :data:
    :name: Veranstaltung
    :type: object
    :content_type: entity
    :releasable: true
    :permissions:
      :read_write: true
    :boost: 100.0
    :properties:
      :id:
        :label: id
        :type: string
        :storage_type: string
        :storage_location: key
        :validations:
          :format: uuid
      :headline:
        :label: Titel
        :type: string
        :storage_type: string
        :storage_location: column
        :search: true
        :validations:
          :minLength: 1
        :editor:
          :type: input
          :options:
            :data-validate: text
      :validity_period:
        :type: mixin
        :name: validity_period
      :description:
        :label: Teasertext
        :type: string
        :storage_type: text
        :storage_location: column
        :search: true
        :editor:
          :type: quillEditor
          :options:
            :data-size: full
      :name:
        :label: Linktext
        :type: string
        :storage_type: string
        :storage_location: content
        :editor:
          :type: input
      :content_location:
        :label: Veranstaltungsort
        :type: object
        :storage_location: places
        :name: Örtlichkeit
        :delete: false
        :validations:
          :max: 1
        :editor:
          :type: objectBrowser
          :options:
            :data-validate: object
            :data-type: place
      :event:
        :label: Veranstaltungsdaten
        :type: object
        :storage_location: events
        :delete: true
        :name: Event
        :editor:
          :type: embeddedObject
      :image:
        :label: Bilder
        :type: embeddedLinkArray
        :type_name: creative_works
        :storage_type: array
        :storage_location: metadata
        :editor:
          :type: objectBrowser
          :options:
            :data-validate: media
            :data-type: image
      :video:
        :label: Videos
        :type: embeddedLinkArray
        :type_name: creative_works
        :storage_type: array
        :storage_location: metadata
        :editor:
          :type: objectBrowser
          :options:
            :data-validate: media
            :data-type: video
      :youtube_video:
        :label: Youtube Video
        :type: object
        :storage_location: creative_works
        :delete: true
        :name: Youtube-Video
        :editor:
          :type: embeddedObject
          :options:
            :data-validate: text
      :data_type:
        :label: Inhaltstype
        :type: classificationTreeLabel
        :type_name: Inhaltstypen
        :storage_location: classification_relation
        :default_value: "Veranstaltung"
      :content_classifications:
        :type: mixin
        :name: content_classifications
      :meta_data:
        :type: mixin
        :name: meta_data