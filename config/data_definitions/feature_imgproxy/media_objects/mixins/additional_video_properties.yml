---
- :data:
    :name: additional_video_properties
    :type: mixin
    :properties:
      :virtual_original_url:
        :label: Virtual Original Url
        :storage_location: virtual
        :type: virtual
        :virtual:
          :type: string
          :module: Utility::Virtual::Asset
          :method: imgproxy
          :transformation:
            :version: original
          :parameters:
            :0: asset
        :api:
          :disabled: true
          :v4:
            :disabled: false
            :name: dc:originalUrl
        :ui:
          :show:
            :disabled: true
      :virtual_thumbnail_url:
        :label: Virtual Thumbnail Url
        :storage_location: virtual
        :type: virtual
        :virtual:
          :type: string
          :module: Utility::Virtual::Asset
          :method: imgproxy
          :transformation:
            :version: thumb
          :processing:
            :resize_type: fit
            :width: 300
            :height: 300
            :enlarge: 0
            :gravity: ce
            :format: jpeg
          :parameters:
            :0: asset
        :api:
          :disabled: true
          :v4:
            :disabled: false
            :name: thumbnailUrl
        :ui:
          :show:
            :disabled: true