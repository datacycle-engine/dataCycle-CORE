---
- :data:
    :name: geo_shape
    :type: mixin
    :properties:
      :line:
        :label: Route
        :type: geographic
        :storage_location: column
        :ui:
          :edit:
            :type: LineString
            :options:
              :data_upload: true
              :additional_value_paths:
                - - poi
                  - location
        :api:
          :disabled: false
          :v4:
            :name: line
            :transformation:
              :method: nest
              :name: geo
              :type: GeoShape
