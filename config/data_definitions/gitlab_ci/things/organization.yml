---
- :data:
    :name: Organization
    :type: object
    :schema_type: Organization
    :content_type: entity
    :boost: 1.0
    :properties:
      :id:
        :label: id
        :type: key
      :name:
        :label: Firmenname
        :type: string
        :storage_location: column
        :search: true
        :validations:
          :min: 1
        :ui:
          :show:
            :disabled: true
        :api:
          :name: legal_name
      :contact_info:
        :type: mixin
        :name: contact_info
      :postal_address:
        :type: mixin
        :name: postal_address
      :description:
        :label: Text
        :type: string
        :storage_location: column
        :search: true
        :ui:
          :edit:
            :type: text_editor
            :options:
              :data-size: full
      :image:
        :label: Bilder
        :type: linked
        :linked_table: creative_works
        :template_name: Bild
      :data_type:
        :label: Inhaltstype
        :type: classification
        :tree_label: Inhaltstypen
        :default_value: "Organisation"
      :content_classifications:
        :type: mixin
        :name: content_classifications
      :meta_data:
        :type: mixin
        :name: meta_data
      :additional_properties:
        :type: mixin
        :name: additional_properties
