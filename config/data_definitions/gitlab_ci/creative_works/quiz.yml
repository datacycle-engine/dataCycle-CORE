---
- :data:
    :name: Quiz
    :type: object
    :content_type: entity
    :boost: 100.0
    :features:
      :publication_schedule: ['publication_schedule']
      :releasable: true
    :properties:
      :id:
        :label: id
        :type: key
      :title:
        :type: mixin
        :name: title
      :validity_period:
        :type: mixin
        :name: validity_period
      :alternative_headline:
        :label: Subüberschrift
        :type: string
        :storage_location: translated_value
        :search: true
      :description:
        :label: Teasertext
        :type: string
        :storage_location: column
        :search: true
        :ui:
          :edit:
            :type: text_editor
            :options:
              :data-size: basic
      :question:
        :label: Frage
        :type: embedded
        :linked_table: creative_works
        :template_name: Frage
      :data_type:
        :label: Inhaltstype
        :type: classification
        :tree_label: Inhaltstypen
        :default_value: "Quiz"
      :content_classifications:
        :type: mixin
        :name: content_classifications
      :publication_schedule:
        :type: mixin
        :name: publication_schedule
      :meta_data:
        :type: mixin
        :name: meta_data
      :additional_properties:
        :type: mixin
        :name: additional_properties

- :data:
    :name: Frage
    :type: object
    :content_type: embedded
    :properties:
      :id:
        :label: id
        :type: key
      :headline:
        :label: Titel
        :type: string
        :storage_location: column
        :validations:
          :min: 1
      :text:
        :label: Fließtext
        :type: string
        :storage_location: translated_value
        :ui:
          :edit:
            :type: text_editor
            :options:
              :data-size: basic
      :image:
        :label: Bilder
        :type: linked
        :linked_table: creative_works
        :template_name: Bild
        :validations:
          :max: 1
      :accepted_answer:
        :label: Richtige Antwort
        :type: embedded
        :linked_table: creative_works
        :template_name: Antwort
        :validations:
          :max: 1
      :suggested_answer:
        :label: Falsche Antwort
        :type: embedded
        :linked_table: creative_works
        :template_name: Antwort
      :data_type:
        :label: Inhaltstype
        :type: classification
        :tree_label: Inhaltstypen
        :default_value: "Frage"
      :meta_data:
        :type: mixin
        :name: meta_data

- :data:
    :name: Antwort
    :type: object
    :content_type: embedded
    :properties:
      :id:
        :label: id
        :type: key
      :text:
        :label: Antwort
        :type: string
        :storage_location: translated_value
        :validations:
          :min: 1
        :ui:
          :edit:
            :type: text_editor
            :options:
              :data-size: basic
      :image:
        :label: Bilder
        :type: linked
        :linked_table: creative_works
        :template_name: Bild
        :validations:
          :max: 1
      :data_type:
        :label: Inhaltstype
        :type: classification
        :tree_label: Inhaltstypen
        :default_value: "Antwort"
      :meta_data:
        :type: mixin
        :name: meta_data