---
- :data:
    :name: Rezept
    :type: object
    :content_type: entity
    :boost: 100.0
    :features:
      :releasable:
        :allowed: true
    :properties:
      :id:
        :label: id
        :type: key
      :release_status:
        :type: mixin
        :name: releasable
      :title:
        :type: mixin
        :name: title
      :validity_period:
        :type: mixin
        :name: validity_period
      :description:
        :label: Teasertext
        :type: string
        :storage_location: column
        :search: true
        :ui:
          :edit:
            :type: text_editor
            :options:
              :data-size: basic
      :link_name:
        :label: Linktitel
        :type: string
        :storage_location: translated_value
        :search: true
      :image:
        :label: Bilder
        :type: linked
        :linked_table: things
        :template_name: Bild
      :recipe_instructions:
        :label: Fließtext
        :type: string
        :storage_location: translated_value
        :search: true
        :ui:
          :edit:
            :type: text_editor
            :options:
              :data-size: full
      :recipe_yield:
        :label: Portionen
        :type: string
        :storage_location: translated_value
        :search: true
      :total_time:
        :label: Kochzeit
        :type: number
        :storage_location: value
        :validations:
          :format: integer
          :max: 300
        :ui:
          :edit:
            :type: duration
            :options:
              :data-unit: min
          :show:
            :options:
              :data-unit: min
      :recipe_course:
        :label: 'Gang'
        :type: classification
        :tree_label: 'Rezept-Gänge'
      :recipe_category:
        :label: 'Kategorie'
        :type: classification
        :tree_label: 'Rezept-Kategorien'
      :recipe_ingredient:
        :label: Zutaten
        :type: string
        :storage_location: translated_value
        :search: true
        :ui:
          :edit:
            :type: text_editor
            :options:
              :data-size: full
      :data_type:
        :label: Inhaltstype
        :type: classification
        :tree_label: Inhaltstypen
        :default_value: "Rezept"
      :content_classifications:
        :type: mixin
        :name: content_classifications
      :publication_schedule:
        :type: mixin
        :name: publication_schedule
      :meta_data:
        :type: mixin
        :name: meta_data
      :additional_properties:
        :type: mixin
        :name: additional_properties
