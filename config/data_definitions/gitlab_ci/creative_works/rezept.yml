---
- :data:
    :name: Rezept
    :type: object
    :content_type: entity
    :features:
      :releasable: true
    :boost: 100.0
    :properties:
      :id:
        :label: id
        :type: string
        :storage_type: string
        :storage_location: key
        :validations:
          :format: uuid
      :headline:
        :label: Titel
        :type: string
        :storage_type: string
        :storage_location: column
        :search: true
        :validations:
          :minLength: 1
        :editor:
          :type: input
          :options:
            :data-validate: text
      :validity_period:
        :type: mixin
        :name: validity_period
      :description:
        :label: Teasertext
        :type: string
        :storage_type: text
        :storage_location: column
        :search: true
        :editor:
          :type: quillEditor
          :options:
            :data-size: basic
      :name:
        :label: Linktitel
        :type: string
        :storage_type: string
        :storage_location: content
        :search: true
        :editor:
          :type: input
      :image:
        :label: Bilder
        :type: embeddedLinkArray
        :type_name: creative_works
        :storage_type: array
        :storage_location: metadata
        :editor:
          :type: objectBrowser
          :options:
            :data-validate: media
            :data-type: image
      :recipe_instructions:
        :label: Fließtext
        :type: string
        :storage_type: text
        :storage_location: content
        :search: true
        :editor:
          :type: quillEditor
          :options:
            :data-size: full
      :recipe_yield:
        :label: Portionen
        :type: string
        :storage_type: string
        :storage_location: content
        :search: true
        :editor:
          :type: input
      :total_time:
        :label: Kochzeit
        :type: number
        :storage_type: number
        :storage_location: content
        :validations:
          :format: integer
          :max: 300
        :editor:
          :type: duration
          :options:
            :data-type: duration
            :data-validate: integer
            :data-unit: min
      :recipe_course:
        :label: 'Gang'
        :type: classificationTreeLabel
        :type_name: 'Rezept-Gänge'
        :storage_location: classification_relation
        :editor:
          :type: classificationSelector
      :recipe_category:
        :label: 'Kategorie'
        :type: classificationTreeLabel
        :type_name: 'Rezept-Kategorien'
        :storage_location: classification_relation
        :editor:
          :type: classificationSelector
      :recipe_ingredient:
        :label: Zutaten
        :type: string
        :storage_type: text
        :storage_location: content
        :editor:
          :type: quillEditor
          :options:
            :data-size: full
      :data_type:
        :label: Inhaltstype
        :type: classificationTreeLabel
        :type_name: Inhaltstypen
        :storage_location: classification_relation
        :default_value: "Rezept"
      :content_classifications:
        :type: mixin
        :name: content_classifications
      :meta_data:
        :type: mixin
        :name: meta_data
      :additional_properties:
        :type: mixin
        :name: additional_properties