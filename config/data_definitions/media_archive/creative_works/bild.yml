---
- :data:
    :name: Bild
    :type: object
    :schema_type: CreativeWork
    :content_type: entity
    :boost: 10.0
    :features:
      :creatable:
        :allowed: true
      :translatable:
        :allowed: true
    :api:
      :type: ImageObject
    :properties:
      :id:
        :label: id
        :type: key
      :title:
        :type: mixin
        :name: title
      :validity_period:
        :type: mixin
        :name: validity_period
      :caption:
        :label: Alt-Label
        :type: string
        :storage_location: translated_value
        :search: true
      :description:
        :label: Teasertext
        :type: string
        :storage_location: column
        :search: true
        :ui:
          :edit:
            :type: text_editor
            :options:
              :data-size: basic
      :content_url:
        :label: Bild URL
        :type: string
        :storage_location: value
        :validations:
          :format: url
        :api:
          :minimal: true
      :thumbnail_url:
        :label: Thumbnail URL
        :type: string
        :storage_location: value
        :validations:
          :format: url
        :ui:
          :show:
            :type: preview_image
        :api:
          :minimal: true
      :url:
        :label: Inhalt URL
        :type: string
        :storage_location: value
        :validations:
          :format: url
        :api:
          :name: sameAs
#      :asset:
#        :label: Datei
#        :type: asset
#        :type_name: DataCycleCore::Image
#        :storage_location: asset_relation
#        :editor:
#          :type: imageAsset
      :photographer:
        :label: Fotograf
        :type: string
        :storage_location: value
        :search: true
      :license:
        :label: Copyright / Lizenz
        :type: string
        :storage_location: value
        :search: true
      :content_location:
        :label: Ort
        :type: linked
        :template_name: Örtlichkeit
      :width:
        :label: Breite
        :type: number
        :storage_location: value
        :validations:
          :format: integer
      :height:
        :label: Höhe
        :type: number
        :storage_location: value
        :validations:
          :format: integer
      :content_size:
        :label: Dateigröße
        :type: number
        :storage_location: value
        :validations:
          :format: integer
      :file_format:
        :label: Dateiformat
        :type: string
        :storage_location: value
      :tags:
        :type: mixin
        :name: tags
      :media_archive:
        :type: mixin
        :name: media_archive
      :media_archive_categories:
        :type: mixin
        :name: media_archive_categories
      :data_type:
        :label: Inhaltstype
        :type: classification
        :tree_label: Inhaltstypen
        :default_value: "Bild"
      :content_classifications:
        :type: mixin
        :name: content_classifications
      :meta_data:
        :type: mixin
        :name: meta_data
      :additional_properties:
        :type: mixin
        :name: additional_properties
