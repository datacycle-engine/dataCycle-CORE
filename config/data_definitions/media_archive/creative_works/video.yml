---
- :data:
    :name: Video
    :type: object
    :content_type: entity
    :boost: 10.0
    :properties:
      :id:
        :label: id
        :type: string
        :storage_type: string
        :storage_location: key
        :validations:
          :format: uuid
      :headline:
        :label: Titel
        :type: string
        :storage_type: string
        :storage_location: column
        :search: true
        :editor:
          :type: input
          :options:
            :data-validate: text
      :validity_period:
        :type: mixin
        :name: validity_period
      :caption:
        :label: Alt-Label
        :type: string
        :storage_type: string
        :storage_location: content
        :search: true
        :editor:
          :type: input
      :description:
        :label: Beschreibung
        :type: string
        :storage_type: text
        :storage_location: column
        :search: true
        :editor:
          :type: quillEditor
          :options:
            :data-size: basic
      :content_url:
        :label: Bild URL
        :type: string
        :storage_type: string
        :storage_location: metadata
        :validations:
          :format: url
        :editor:
          :type: input
          :options:
            :data-validate: text
      :thumbnail_url:
        :label: Thumbnail URL
        :type: string
        :storage_type: string
        :storage_location: metadata
        :validations:
          :format: url
        :editor:
          :type: image
      :url:
        :label: Inhalt URL
        :type: string
        :storage_type: string
        :storage_location: metadata
        :validations:
          :format: url
        :editor:
          :type: input
          :options:
            :data-validate: text
      :image:
        :label: Teaserbild
        :type: string
        :storage_type: string
        :storage_location: metadata
        :validations:
          :format: url
        :editor:
          :type: image
      :youtube_url:
        :label: YouTube URL
        :type: string
        :storage_type: string
        :storage_location: metadata
        :validations:
          :format: url
        :editor:
          :type: input
          :options:
            :data-validate: text
#      :asset:
#        :label: Datei
#        :type: asset
#        :type_name: DataCycleCore::Video
#        :storage_location: asset_relation
#        :editor:
#          :type: videoAsset
      :license:
        :label: Copyright / Lizenz
        :type: string
        :storage_type: string
        :storage_location: metadata
        :search: true
        :editor:
          :type: input
      :content_location:
        :label: Ort
        :type: object
        :storage_location: places
        :name: Örtlichkeit
        :editor:
          :type: objectBrowser
      :width:
        :label: Breite
        :type: number
        :storage_type: number
        :storage_location: metadata
        :validations:
          :format: integer
        :editor:
          :type: input
      :height:
        :label: Höhe
        :type: number
        :storage_type: number
        :storage_location: metadata
        :validations:
          :format: integer
        :editor:
          :type: input
      :content_size:
        :label: Dateigröße
        :type: number
        :storage_type: number
        :storage_location: metadata
        :validations:
          :format: integer
        :editor:
          :type: input
      :file_format:
        :label: Dateiformat
        :type: string
        :storage_type: string
        :storage_location: metadata
        :editor:
          :type: input
      :duration:
        :label: Länge
        :type: string
        :storage_type: string
        :storage_location: metadata
        :editor:
          :type: input
      :director:
        :label: "Regie"
        :type: object
        :storage_location: persons
        :name: Person
        :delete: false
        :editor:
          :type: objectBrowser
          :options:
            :data-validate: object
            :data-type: person
      :contributor:
        :label: "Kamera"
        :type: object
        :storage_location: persons
        :name: Person
        :delete: false
        :editor:
          :type: objectBrowser
          :options:
            :data-validate: object
            :data-type: person
      :tags:
        :type: mixin
        :name: tags
      :media_archive:
        :type: mixin
        :name: media_archive
      :media_archive_categories:
        :type: mixin
        :name: media_archive_categories
      :data_type:
        :label: Inhaltstype
        :type: classificationTreeLabel
        :type_name: Inhaltstypen
        :storage_location: classification_relation
        :default_value: "Video"
      :content_classifications:
        :type: mixin
        :name: content_classifications
      :meta_data:
        :type: mixin
        :name: meta_data
