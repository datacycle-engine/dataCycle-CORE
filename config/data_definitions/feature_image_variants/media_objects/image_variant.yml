---
- :data:
    :name: ImageVariant
    :type: object
    :schema_type: CreativeWork
    :content_type: embedded
    :features:
      :image_editor:
        :allowed: true
    :api:
      :type:
        - CreativeWork
        - MediaObject
        - ImageObject
    :properties:
      :id:
        :label: id
        :type: key
      :name:
        :label: Name
        :type: string
        :storage_location: column
        :search: true
      :asset:
        :label: Datei
        :type: asset
        :asset_type: image
        :api:
          :disabled: true
      :content_url:
        :label: Bild URL
        :storage_location: value
        :type: computed
        :compute:
          :type: string
          :module: Utility::Compute::Asset
          :method: content_url
          :parameters:
            :0: asset
        :ui:
          :show:
            :disabled: true
        :api:
          :minimal: true
      :thumbnail_url:
        :label: Thumbnail URL
        :storage_location: value
        :type: computed
        :compute:
          :type: string
          :module: Utility::Compute::Image
          :method: thumbnail_url
          :parameters:
            :0: asset
        :ui:
          :show:
            :partial: preview_image
        :api:
          :minimal: true
      :url:
        :label: Inhalt URL
        :type: string
        :storage_location: value
        :validations:
          :format: url
        :api:
          :name: sameAs
        :xml:
          :name: sameAs
        :ui:
          :edit:
            :disabled: true
      :width:
        :label: Breite
        :storage_location: value
        :type: computed
        :compute:
          :type: number
          :module: Utility::Compute::Image
          :method: width
          :parameters:
            :0: asset
        :ui:
          :show:
            :options:
              :data-unit: px
        :api:
          :partial: property_value
          :type: QuantitativeValue
          :unit_text: pixel
          :unit_code: E37
          :transformation:
            :method: nest
            :name: width
        :advanced_search: true
      :height:
        :label: Höhe
        :storage_location: value
        :type: computed
        :compute:
          :type: number
          :module: Utility::Compute::Image
          :method: height
          :parameters:
            :0: asset
        :ui:
          :show:
            :options:
              :data-unit: px
        :api:
          :partial: property_value
          :type: QuantitativeValue
          :unit_text: pixel
          :unit_code: E37
          :transformation:
            :method: nest
            :name: height
        :advanced_search: true
      # schema.org: TEXT with KB/MB
      # data-cycle: Integer (Byte)
      :content_size:
        :label: Dateigröße
        :storage_location: value
        :type: computed
        :compute:
          :type: number
          :module: Utility::Compute::Asset
          :method: file_size
          :parameters:
            :0: asset
        :advanced_search: true
      :file_format:
        :label: Dateiformat
        :storage_location: value
        :type: computed
        :compute:
          :type: string
          :module: Utility::Compute::Asset
          :method: file_format
          :parameters:
            :0: asset
      :upload_date:
        :label: Hochgeladen am
        :type: date
        :storage_location: value
        :ui:
          :edit:
            :options:
              :placeholder: tt.mm.jjjj
              :class: daterange
        :default_value:
          module: DataCycleCore::Utility::DefaultValue::Date
          method: beginning_of_day
        :advanced_search: true
      :gravity:
        :label: Gravity
        :type: classification
        :tree_label: Gravity
      :api_gravity:
        :label: Gravity
        :storage_location: virtual
        :type: virtual
        :virtual:
          :type: string
          :module: Utility::Virtual::Classification
          :method: concat
          :key: uri
          :parameters:
            :0: gravity
        :api:
          :disabled: true
          :v4:
            :disabled: false
            :name: dc:gravity
        :ui:
          :show:
            :disabled: true
      :virtual_original_url:
        :label: Virtual Original Url
        :storage_location: virtual
        :type: virtual
        :virtual:
          :type: string
          :module: Utility::Virtual::Asset
          :method: imgproxy
          :transformation:
            :version: original
          :parameters:
            :0: asset
        :api:
          :disabled: true
          :v4:
            :disabled: true
            :name: dc:originalUrl
        :ui:
          :show:
            :disabled: true
      :virtual_content_url:
        :label: Virtual Content Url
        :storage_location: virtual
        :type: virtual
        :virtual:
          :type: string
          :module: Utility::Virtual::Asset
          :method: imgproxy
          :transformation:
            :version: default
          :processing:
            :resize_type: fit
            :width: 0
            :height: 0
            :enlarge: 0
            :gravity: ce
          :parameters:
            :0: asset
        :api:
          :disabled: true
          :v4:
            :disabled: false
            :name: contentUrl
        :ui:
          :show:
            :disabled: true
      :virtual_thumbnail_url:
        :label: Virtual Thumbnail Url
        :storage_location: virtual
        :type: virtual
        :virtual:
          :type: string
          :module: Utility::Virtual::Asset
          :method: imgproxy
          :transformation:
            :version: thumb
          :processing:
            :resize_type: fit
            :width: 300
            :height: 300
            :enlarge: 0
            :gravity: ce
            :format: jpeg
          :parameters:
            :0: asset
        :api:
          :disabled: true
          :v4:
            :disabled: false
            :name: thumbnailUrl
        :ui:
          :show:
            :disabled: true
      :virtual_web_url:
        :label: Virtual Web Url
        :storage_location: virtual
        :type: virtual
        :virtual:
          :type: string
          :module: Utility::Virtual::Asset
          :method: imgproxy
          :transformation:
            :version: web
          :processing:
            :resize_type: fit
            :width: 2048
            :height: 2048
            :enlarge: 0
            :gravity: ce
            :format: jpeg
          :parameters:
            :0: asset
        :api:
          :disabled: true
          :v4:
            :disabled: false
            :name: dc:webUrl
        :ui:
          :show:
            :disabled: true
      :meta_data:
        :type: mixin
        :name: meta_data
