---
- :data:
    :name: additional_image_properties
    :type: mixin
    :properties:
      :encoding:
        :label: Bild-Varianten
        :type: embedded
        :template_name: ImageVariant
        :translated: true
      :gravity:
        :label: Gravity
        :type: classification
        :tree_label: Gravity
        :global: true
        :ui:
          :show:
            :content_area: header
      :api_gravity:
        :label: Gravity
        :storage_location: virtual
        :type: virtual
        :virtual:
          :type: string
          :module: Utility::Virtual::Classification
          :method: concat
          :key: uri
          :parameters:
            :0: gravity
        :api:
          :disabled: true
          :v4:
            :disabled: false
            :name: dc:gravity
        :ui:
          :show:
            :disabled: true
      :virtual_original_url:
        :label: Virtual Original Url
        :storage_location: virtual
        :type: virtual
        :virtual:
          :type: string
          :module: Utility::Virtual::Asset
          :method: imgproxy
          :transformation:
            :version: original
          :parameters:
            :0: asset
        :api:
          :disabled: true
          :v4:
            :disabled: true
            :name: dc:originalUrl
        :ui:
          :show:
            :disabled: true
      :virtual_content_url:
        :label: Virtual Content Url
        :storage_location: virtual
        :type: virtual
        :virtual:
          :type: string
          :module: Utility::Virtual::Asset
          :method: imgproxy
          :transformation:
            :version: default
          :processing:
            :resize_type: fit
            :width: 0
            :height: 0
            :enlarge: 0
            :gravity: ce
          :parameters:
            :0: asset
        :api:
          :disabled: true
          :v4:
            :disabled: false
            :name: contentUrl
        :ui:
          :show:
            :disabled: true
      :virtual_thumbnail_url:
        :label: Virtual Thumbnail Url
        :storage_location: virtual
        :type: virtual
        :virtual:
          :type: string
          :module: Utility::Virtual::Asset
          :method: imgproxy
          :transformation:
            :version: thumb
          :processing:
            :resize_type: fit
            :width: 300
            :height: 300
            :enlarge: 0
            :gravity: ce
            :format: jpeg
          :parameters:
            :0: asset
        :api:
          :disabled: true
          :v4:
            :disabled: false
            :name: thumbnailUrl
        :ui:
          :show:
            :disabled: true
      :virtual_web_url:
        :label: Virtual Web Url
        :storage_location: virtual
        :type: virtual
        :virtual:
          :type: string
          :module: Utility::Virtual::Asset
          :method: imgproxy
          :transformation:
            :version: web
          :processing:
            :resize_type: fit
            :width: 2048
            :height: 2048
            :enlarge: 0
            :gravity: ce
            :format: jpeg
          :parameters:
            :0: asset
        :api:
          :disabled: true
          :v4:
            :disabled: false
            :name: dc:webUrl
        :ui:
          :show:
            :disabled: true
