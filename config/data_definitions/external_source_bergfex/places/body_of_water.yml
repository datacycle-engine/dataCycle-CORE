---
- :data:
    :name: See
    :type: object
    :schema_type: Place
    :content_type: entity
    :boost: 100.0
    :features:
      :overlay:
        :allowed: true
    :properties:
      :id:
        :label: id
        :type: key
      :overlay:
        :label: Overlay
        :type: embedded
        :linked_table: things
        :template_name: BodyOfWaterOverlay
        :validations:
          :max: 1
      :title:
        :type: mixin
        :name: title
      :water_temp:
        :label: Seetemperatur
        :type: object
        :storage_location: value
        :properties:
          :temperature:
            :label: Temperatur
            :type: number
            :storage_location: value
            :validations:
              :format: float
            :ui:
              :edit:
                :options:
                  :data-unit: °C
              :show:
                :options:
                  :data-unit: °C
          :temp_at:
            :label: vom
            :type: datetime
            :storage_location: value
            :validations:
              :format: date_time
            :ui:
              :edit:
                :type: datetime
                :options:
                  :class: single_date
                  :placeholder: "tt.mm.jjjj --:--"
          :quality:
            :label: Wasserqualität
            :type: string
            :storage_location: value
      :area:
        :label: Fläche
        :type: number
        :storage_location: value
        :validations:
          :format: float
        :ui:
          :edit:
            :options:
              :data-unit: km²
          :show:
            :options:
              :data-unit: km²
      :depth:
        :label: Tiefe
        :type: number
        :storage_location: value
        :validations:
          :format: float
        :ui:
          :edit:
            :options:
              :data-unit: m
          :show:
            :options:
              :data-unit: m
      :geo:
        :type: mixin
        :name: geo
      :opening_hours_specification:
        :label: Öffnungszeit
        :type: embedded
        :linked_table: things
        :template_name: Öffnungszeit - Erweitert
      :url:
        :label: Link
        :type: string
        :storage_location: translated_value
      :data_type:
        :label: Inhaltstype
        :type: classification
        :tree_label: Inhaltstypen
        :default_value: "Badeseen"
      :content_classifications:
        :type: mixin
        :name: content_classifications
      :meta_data:
        :type: mixin
        :name: meta_data
      :additional_properties:
        :type: mixin
        :name: additional_properties
