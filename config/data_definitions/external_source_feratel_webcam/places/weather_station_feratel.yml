        :type: linked
        :stored_filter:
          -
            :with_classification_aliases_and_treename:
              :treeLabel: Inhaltstypen
              :aliases:
                - Wetterprognose (wetter.at)
                - Wetterprognose (oberlandwetter.at)
      :image:
