---
- :data:
    :name: Tour
    :type: object
    :permissions:
      :read_write: true
    :boost: 10.0
    :properties:
      :id:
        :label: id
        :type: string
        :storage_type: string
        :storage_location: key
        :validations:
          :format: uuid
      :name:
        :label: Titel
        :type: string
        :storage_type: string
        :storage_location: column
        :search: true
        :validations:
          :minLength: 1
        :editor:
          :type: input
          :sorting: 1
          :options:
            :data-validate: text
      :description:
        :label: Beschreibung
        :type: string
        :storage_type: string
        :storage_location: column
        :search: true
        :editor:
          :sorting: 8
          :options:
            :readonly: true
      :text:
        :label: Text
        :type: string
        :storage_type: text
        :storage_location: content
        :search: true
        :editor:
          :type: quillEditor
          :sorting: 9
          :options:
            :data-size: basic
      :primary_image:
        :label: Hauptbild
        :type: embeddedLinkArray
        :type_name: creative_works
        :storage_type: string
        :storage_location: metadata
        :validations:
          :max: 1
        :editor:
          :type: objectBrowser
          :sorting: 10
          :options:
            :data-validate: media
            :data-type: image
      :image:
        :label: Bilder
        :type: embeddedLinkArray
        :type_name: creative_works
        :storage_type: string
        :storage_location: metadata
        :editor:
          :type: objectBrowser
          :sorting: 11
          :options:
            :data-validate: media
            :data-type: image
      # mixin: Outdoor Active
      :author:
        :label: Autor
        :type: string
        :storage_type: string
        :storage_location: metadata
        :editor:
          :sorting: 17
          :type: input
      :price:
        :label: Preis
        :type: string
        :storage_type: string
        :storage_location: content
        :editor:
          :sorting: 18
      :directions:
        :label: Anfahrtsbeschreibung
        :type: string
        :storage_type: string
        :storage_location: content
        :search: true
        :editor:
          :sorting: 19
          :type: input
      :parking:
        :label: Parkmöglichkeit
        :type: string
        :storage_type: string
        :storage_location: content
        :search: true
        :editor:
          :sorting: 20
          :type: input
      :elevation:
        :label: Meereshöhe
        :type: number
        :storage_type: number
        :storage_location: column
        :validations:
          :format: float
        :editor:
          :sorting: 21
          :type: input
      :hours_available:
        :label: Service-Zeiten
        :type: string
        :storage_type: string
        :storage_location: content
        :editor:
          :sorting: 22
          :type: input
      # mixin Outdoor Active Categories
      :frontend_type:
        :label: Frontend-Typ
        :type: classificationTreeLabel
        :type_name: OutdoorActive - FrontendTypes
        :storage_location: classification_relation
        :editor:
          :sorting: 30
          :options:
            :readonly: true
      :categories:
        :label: Kategorien
        :type: classificationTreeLabel
        :type_name: OutdoorActive - Kategorien
        :storage_location: classification_relation
        :editor:
          :sorting: 31
      :regions:
        :label: Regionen
        :type: classificationTreeLabel
        :type_name: OutdoorActive - Regionen
        :storage_location: classification_relation
        :editor:
          :sorting: 32
          :options:
            :readonly: true
      :source:
        :label: Quelle
        :type: classificationTreeLabel
        :type_name: OutdoorActive - Quellen
        :storage_location: classification_relation
        :editor:
          :sorting: 33
          :options:
            :readonly: true
      # minxin: Outdoor Active Tour
      :start_location:
        :label: Startkoordinaten
        :type: geographic
        :storage_type: geographic
        :storage_location: metadata
        :editor:
          :sorting: 50
          :options:
            :disabled: disabled
      :tour:
        :label: Route
        :type: geographic
        :storage_type: geographic
        :storage_location: metadata
        :editor:
          :sorting: 51
          :options:
            :disabled: disabled
      :directions_public_transport:
        :label: Anfahrt mit öffentlichen Verkehrsmitteln
        :type: string
        :storage_type: string
        :storage_location: content
        :search: true
        :editor:
          :sorting: 52
          :type: input
      :instructions:
        :label: Wegbeschreibung
        :type: string
        :storage_type: string
        :storage_location: content
        :search: true
        :editor:
          :sorting: 53
          :type: input
      :safety_instructions:
        :label: Sicherheitshinweis
        :type: string
        :storage_type: string
        :storage_location: content
        :search: true
        :editor:
          :sorting: 54
          :type: input
      :equipment:
        :label: Ausrüstung
        :type: string
        :storage_type: string
        :storage_location: content
        :search: true
        :editor:
          :sorting: 55
          :type: input
      :suggestion:
        :label: Tipps
        :type: string
        :storage_type: string
        :storage_location: content
        :search: true
        :editor:
          :sorting: 56
          :type: input
      :additional_information:
        :label: Zusatzinformation
        :type: string
        :storage_type: string
        :storage_location: content
        :search: true
        :editor:
          :sorting: 57
          :type: input
      :ascent:
        :label: Aufstieg (m)
        :type: number
        :storage_type: number
        :storage_location: metadata
        :editor:
          :sorting: 58
          :type: input
      :descent:
        :label: Abstieg (m)
        :type: number
        :storage_type: number
        :storage_location: metadata
        :editor:
          :sorting: 59
          :type: input
      :min_altitude:
        :label: Minimale Seehöhe (m)
        :type: number
        :storage_type: number
        :storage_location: metadata
        :editor:
          :sorting: 60
          :type: input
      :max_altitude:
        :label: Maximale Seehöhe (m)
        :type: number
        :storage_type: number
        :storage_location: metadata
        :editor:
          :sorting: 61
          :type: input
      :length:
        :label: Länge (m)
        :type: number
        :storage_type: number
        :storage_location: metadata
        :editor:
          :sorting: 62
          :type: input
      :duration:
        :label: Dauer (min)
        :type: number
        :storage_type: number
        :storage_location: metadata
        :editor:
          :sorting: 63
          :type: input
      :condition_rating:
        :label: Bewertung - Kondition
        :type: number
        :storage_type: number
        :storage_location: metadata
        :editor:
          :sorting: 64
          :type: input
      :difficulty_rating:
        :label: Bewertung - Schwierigkeit
        :type: number
        :storage_type: number
        :storage_location: metadata
        :editor:
          :sorting: 65
          :type: input
      :experience_rating:
        :label: Bewertung - Erlebnis
        :type: number
        :storage_type: number
        :storage_location: metadata
        :editor:
          :sorting: 66
          :type: input
      :landscape_rating:
        :label: Bewertung - Landschaft
        :type: number
        :storage_type: number
        :storage_location: metadata
        :editor:
          :sorting: 67
          :type: input
      :data_type:
        :label: Inhaltstype
        :type: classificationTreeLabel
        :type_name: Inhaltstypen
        :storage_location: classification_relation
