---
- :data:
    :name: POI
    :type: object
    :content_type: entity
    :boost: 10.0
    :api:
      :type: TouristAttraction
    :properties:
      :id:
        :label: id
        :type: key
      :title:
        :type: mixin
        :name: title
      :opening_hours_specification:
        :label: Öffnungszeit
        :type: embedded
        :linked_table: creative_works
        :template_name: Öffnungszeit
      :postal_address:
        :type: mixin
        :name: postal_address
      :geo:
        :type: mixin
        :name: geo
      :contact_info:
        :type: mixin
        :name: contact_info
      :description:
        :label: Beschreibung
        :type: string
        :storage_location: column
        :search: true
        :ui:
          :edit:
            :type: text_editor
            :options:
              :data-size: basic
      :primary_image:
        :label: Hauptbild
        :type: linked
        :linked_table: creative_works
        :template_name: Bild
        :validations:
          :max: 1
        :api:
          :name: image
      :image:
        :label: Bilder
        :type: linked
        :linked_table: creative_works
        :template_name: Bild
        :api:
          :name: photo
      :poi_category:
        :label: Kategorie
        :type: classification
        :tree_label: "POI - Kategorien"
        :ui:
          :show:
            :content_area: header
      :data_type:
        :label: Inhaltstype
        :type: classification
        :tree_label: Inhaltstypen
        :default_value: "POI"
      :content_classifications:
        :type: mixin
        :name: content_classifications
      :meta_data:
        :type: mixin
        :name: meta_data
      :additional_properties:
        :type: mixin
        :name: additional_properties