---
- :data:
    :name: Lift
    :type: object
    :content_type: entity
    :boost: 10.0
    :features:
      :geocode:
        :allowed: true
      :overlay:
        :allowed: true
    :api:
      :type: TouristAttraction
    :properties:
      :id:
        :label: id
        :type: key
      :title:
        :type: mixin
        :name: title
      :overlay:
        :label: Overlay
        :type: embedded
        :linked_table: creative_works
        :template_name: PlaceOverlay
        :validations:
          :max: 1
      :opening_hours_specification:
        :label: Öffnungszeit
        :type: embedded
        :linked_table: creative_works
        :template_name: Öffnungszeit
      :postal_address:
        :type: mixin
        :name: postal_address
      :geo:
        :type: mixin
        :name: geo
      :contact_info:
        :type: mixin
        :name: contact_info
      :description:
        :label: Beschreibung
        :type: string
        :storage_location: column
        :search: true
        :ui:
          :edit:
            :type: text_editor
            :options:
              :data-size: basic
      :text:
        :label: Text
        :type: string
        :storage_location: translated_value
        :search: true
        :ui:
          :edit:
            :type: text_editor
            :options:
              :data-size: basic
      :primary_image:
        :label: Hauptbild
        :type: linked
        :linked_table: creative_works
        :template_name: Bild
        :validations:
          :max: 1
        :api:
          :name: image
      :image:
        :label: Bilder
        :type: linked
        :linked_table: creative_works
        :template_name: Bild
        :api:
          :name: photo
      :data_type:
        :label: Inhaltstype
        :type: classification
        :tree_label: Inhaltstypen
        :default_value: "Lift"
      :feratel_resort:
        :type: mixin
        :name: feratel_resort
      :meta_data:
        :type: mixin
        :name: meta_data
      :additional_properties:
        :type: mixin
        :name: additional_properties
