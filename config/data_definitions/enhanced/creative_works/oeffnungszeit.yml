---
- :data:
    :name: Öffnungszeit
    :type: object
    :content_type: embedded
    :properties:
      :id:
        :label: id
        :type: key
      :validity:
        :label: Gültigkeit
        :type: object
        :storage_location: value
        :validations:
          :daterange:
            :from: valid_from
            :to: valid_through
        :ui:
          :edit:
            :type: daterange
        :properties:
          :valid_from:
            :label: gültig von
            :type: datetime
            :storage_location: value
            :validations:
              :format: date_time
            :ui:
              :edit:
                :type: date
                :options:
                  :data-validate: daterange
                  :placeholder: tt.mm.jjjj
            :editor:
              :type: date
              :options:
                :data-type: datepicker
                :data-validate: daterange
                :placeholder: tt.mm.jjjj
          :valid_through:
            :label: gültig bis
            :type: datetime
            :storage_location: value
            :validations:
              :format: date_time
            :ui:
              :edit:
                :type: date
                :options:
                  :data-validate: daterange
                  :placeholder: tt.mm.jjjj
      :day_of_week:
        :label: Wochentag
        :type: classification
        :tree_label: Wochentage
      :opens:
        :label: geöffnet von
        :type: string
        :storage_location: value
        :validations:
          :pattern: "/^([0-9]|0[0-9]|1[0-9]|2[0-3]):[0-5][0-9](:[0-5][0-9])?$/"
        :ui:
          :edit:
            :options:
              :placeholder: hh:mm:ss
      :closes:
        :label: geöffnet bis
        :type: string
        :storage_location: value
        :validations:
          :pattern: "/^([0-9]|0[0-9]|1[0-9]|2[0-3]):[0-5][0-9](:[0-5][0-9])?$/"
        :ui:
          :edit:
            :options:
              :placeholder: hh:mm:ss
      :data_type:
        :label: Inhaltstype
        :type: classification
        :tree_label: Inhaltstypen
        :default_value: "Öffnungszeit"
      :meta_data:
        :type: mixin
        :name: meta_data