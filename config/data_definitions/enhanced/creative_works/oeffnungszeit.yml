---
- :data:
    :name: Öffnungszeit
    :type: object
    :content_type: embedded
    :permissions:
      :read_write: true
    :properties:
      :id:
        :label: id
        :type: string
        :storage_type: string
        :storage_location: key
        :validations:
          :format: uuid
      :validity:
        :label: Gültigkeit
        :type: object
        :storage_location: metadata
        :validations:
          :daterange:
            :from: valid_from
            :to: valid_through
        :editor:
          :options:
            :class: daterange
        :properties:
          :valid_from:
            :label: gültig von
            :type: string
            :storage_type: string
            :storage_location: metadata
            :validations:
              :format: date_time
            :editor:
              :type: date
              :options:
                :data-type: datepicker
                :data-validate: daterange
                :placeholder: tt.mm.jjjj
          :valid_through:
            :label: gültig bis
            :type: string
            :storage_type: string
            :storage_location: metadata
            :validations:
              :format: date_time
            :editor:
              :type: date
              :options:
                :data-type: datepicker
                :data-validate: daterange
                :placeholder: tt.mm.jjjj
      :day_of_week:
        :label: 'Wochentag'
        :type: classificationTreeLabel
        :type_name: 'Wochentage'
        :storage_location: classification_relation
        :editor:
          :type: classificationSelector
      :opens:
        :label: geöffnet von
        :type: string
        :storage_type: string
        :storage_location: metadata
        :validations:
          :pattern: "/^([0-9]|0[0-9]|1[0-9]|2[0-3]):[0-5][0-9](:[0-5][0-9])?$/"
        :editor:
          :type: input
          :options:
            :placeholder: hh:mm:ss
      :closes:
        :label: geöffnet bis
        :type: string
        :storage_type: string
        :storage_location: metadata
        :validations:
          :pattern: "/^([0-9]|0[0-9]|1[0-9]|2[0-3]):[0-5][0-9](:[0-5][0-9])?$/"
        :editor:
          :type: input
          :options:
            :placeholder: hh:mm:ss
      :data_type:
        :label: Inhaltstype
        :type: classificationTreeLabel
        :type_name: Inhaltstypen
        :storage_location: classification_relation
        :default_value: "Öffnungszeit"
      :meta_data:
        :type: mixin
        :name: meta_data