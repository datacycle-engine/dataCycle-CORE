---
- :data:
    :name: meta_data
    :type: mixin
    :properties:
      :universal_classifications:
        :label: Classifications
        :type: classification
        :external: true
        :universal: true
        :ui:
          :show:
            :content_area: header
            :partial: universal_classifications
      :cc_rel:
        :type: mixin
        :name: cc_rel
      :date_created:
        :label: Erstellungsdatum
        :type: datetime
        :storage_location: value
        :ui:
         :edit:
           disabled: true
         :show:
           :type: date
      :date_modified:
        :label: Änderungsdatum
        :type: datetime
        :storage_location: value
        :ui:
         :edit:
           disabled: true
         :show:
           :type: date
      :date_deleted:
        :label: Gelöschtdatum
        :type: datetime
        :storage_location: value
        :ui:
         :edit:
           disabled: true
         :show:
           :type: date
      :external_key:
        :label: external_key
        :type: string
        :storage_location: column
        :ui:
          :show:
            :disabled: true
          :edit:
            :disabled: true
        :api:
          :disabled: true
