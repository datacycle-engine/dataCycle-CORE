---
- :data:
    :name: geo
    :type: mixin
    :properties:
      :longitude:
        :label: Longitude
        :type: number
        :storage_location: column
        :validations:
          :format: float
        :normalize:
          :id: longitude
          :type: longitude
        :api:
          :transformation:
            :method: nest
            :name: geo
            :type: GeoCoordinates
          :minimal: true
        :ui:
          :edit:
            :disabled: true
          :show:
            :disabled: true
      :latitude:
        :label: Latitude
        :type: number
        :storage_location: column
        :validations:
          :format: float
        :normalize:
          :id: latitude
          :type: latitude
        :api:
          :transformation:
            :method: nest
            :name: geo
            :type: GeoCoordinates
          :minimal: true
        :ui:
          :edit:
            :disabled: true
          :show:
            :disabled: true
      :elevation:
        :label: Meereshöhe (m)
        :type: number
        :storage_location: column
        :validations:
          :format: float
        :api:
          :transformation:
            :method: nest
            :name: geo
            :type: GeoCoordinates
          :minimal: true
        :ui:
          :edit:
            :disabled: true
          :show:
            :disabled: true
      :location:
        :label: GPS-Koordinaten
        :type: geographic
        :storage_location: column
        :api:
          :disabled: true
      :line:
        :label: Linie
        :type: geographic
        :storage_location: value
        :ui:
          :edit:
            :type: LineString
            :options:
              - data_upload
            #   :marker_path:
            #     - marker
            #     - content_location
        # :storage_location: column
        :api:
          :disabled: false
