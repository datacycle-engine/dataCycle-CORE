---
- :data:
    :name: Event
    :type: object
    :schema_type: Event
    :boost: 100.0
    :content_type: entity
    :features:
      :overlay:
        :allowed: true
      :translatable:
        :allowed: true
      :download:
        :allowed: true
      :serialize:
        :allowed: true
        :serializers:
          :xml: true
          :json: true
          :indesign: true
    :properties:
      :id:
        :label: id
        :type: key
      :overlay:
        :label: Overlay
        :type: embedded
        :template_name: EventOverlay
        :validations:
          :max: 1
      :title:
        :type: mixin
        :name: title
      :validity_period:
        :type: mixin
        :name: validity_period
      :content_classifications:
        :type: mixin
        :name: content_classifications
      :event_period:
        :label: Veranstaltungszeitraum
        :type: object
        :storage_location: value
        :validations:
          :daterange:
            :from: start_date
            :to: end_date
        :ui:
          :edit:
            :type: daterange
          :show:
            :content_area: header
        :api:
          :transformation:
            :method: unwrap
        :properties:
          :start_date:
            :label: Startzeitpunkt
            :type: datetime
            :storage_location: column
            :validations:
              :format: date_time
            :ui:
              :edit:
                :type: datetime
                :options:
                  :data-validate: daterange
                  :placeholder: "tt.mm.jjjj --:--"
            :normalize:
              :id: eventstart
              :type: datetime
          :end_date:
            :label: Endzeitpunkt
            :type: datetime
            :storage_location: column
            :validations:
              :format: date_time
            :ui:
              :edit:
                :type: datetime
                :options:
                  :data-validate: daterange
                  :placeholder: "tt.mm.jjjj --:--"
            :normalize:
              :id: eventend
              :type: datetime
      :description:
        :label: Beschreibung
        :type: string
        :storage_location: column
        :search: true
        :ui:
          :edit:
            :type: text_editor
            :options:
              :data-size: full
      :url:
        :label: Inhalt URL
        :type: string
        :storage_location: translated_value
        :external: true
        :validations:
          :format: url
        :api:
          :name: sameAs
        :xml:
          :name: sameAs
      :same_as:
        :label: Link
        :type: string
        :storage_location: translated_value
        :validations:
          :format: url
        :api:
          :name: link
          :partial: property_value
          :type: PropertyValue
          :transformation:
            :method: combine
            :name: additionalProperty
        :xml:
          :name: link
      :image:
        :label: Bilder
        :type: linked
        :template_name: Bild
      :content_location:
        :label: Veranstaltungsort
        :type: linked
        :stored_filter:
          -
            :with_classification_aliases_and_treename:
              :treeLabel: Inhaltstypen
              :aliases:
                - Ort
        :api:
          :name: location
      :event_schedule:
        :label: Termine
        :type: schedule
        :api:
          :disabled: true
      :sub_event:
        :label: Veranstaltungsdaten
        :type: embedded
        :template_name: SubEvent
      :schedule:
        :label: Event-Schedule
        :type: embedded
        :template_name: EventSchedule
        :translated: true
        :api:
          :name: eventSchedule
          :v4:
            :disabled: true
      :super_event:
        :label: Veranstaltungsserie
        :type: linked
        :template_name: Eventserie
        :inverse_of: sub_event
      :performer:
        :label: Ausführende Person/Organisation
        :type: linked
        :stored_filter:
          -
            :with_classification_aliases_and_treename:
              :treeLabel: Inhaltstypen
              :aliases:
                - Person
                - Organisation
      :organizer:
        :label: Veranstalter
        :type: linked
        :stored_filter:
          -
            :with_classification_aliases_and_treename:
              :treeLabel: Inhaltstypen
              :aliases:
                - Person
                - Organisation
                - LocalBusiness
      :offers:
        :label: Angebote
        :type: embedded
        :template_name: Angebot
        :translated: true
      :potential_action:
        :label: Link mit weiterführenden Infos
        :type: string
        :storage_location: translated_value
        :api:
          :partial: action
          :type: ViewAction
      :linked_data:
        :type: mixin
        :name: linked_data
      :subject_of:
        :label: Thema von
        :type: linked
        :inverse_of: about
        :link_direction: inverse
        :global: true
      :data_type:
        :label: Inhaltstyp
        :type: classification
        :tree_label: Inhaltstypen
        :default_value: "Veranstaltung"
      :meta_data:
        :type: mixin
        :name: meta_data
      :event_db:
        :type: mixin
        :name: event_db
      :v_ticket:
        :type: mixin
        :name: v_ticket
      :feratel_events:
        :type: mixin
        :name: feratel_events
      :hrs_dd_events:
        :type: mixin
        :name: hrs_dd_events
      :marche_events:
        :type: mixin
        :name: marche_events
      :puglia_events:
        :type: mixin
        :name: puglia_events
      :piemonte_events:
        :type: mixin
        :name: piemonte_events
      :additional_properties:
        :type: mixin
        :name: additional_properties
