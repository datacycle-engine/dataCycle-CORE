---
- :data:
    :name: SubEvent
    :type: object
    :schema_type: Event
    :content_type: embedded
    :features:
      :translatable:
        :allowed: true
    :properties:
      :id:
        :label: id
        :type: key
      :name:
        :label: Titel
        :type: string
        :storage_location: column
        :search: true
      :start_date:
        :label: Startzeitpunkt
        :storage_location: column
        :type: computed
        :compute:
          :type: datetime
          :module: Utility::Compute::Schedule
          :method: start_date
          :parameters:
            :0: event_schedule
        :ui:
          :show:
            :content_area: none
      :end_date:
        :label: Endzeitpunkt
        :storage_location: column
        :type: computed
        :compute:
          :type: datetime
          :module: Utility::Compute::Schedule
          :method: end_date
          :parameters:
            :0: event_schedule
        :ui:
          :show:
            :content_area: none
      :description:
        :label: Beschreibung
        :type: string
        :storage_location: column
        :search: true
        :ui:
          :edit:
            :type: text_editor
            :options:
              :data-size: basic
      :image:
        :label: Bilder
        :type: linked
        :template_name: Bild
      :url:
        :label: Inhalt URL
        :type: string
        :storage_location: translated_value
        :external: true
        :validations:
          :format: url
        :api:
          :name: sameAs
        :xml:
          :name: sameAs
      :content_location:
        :label: Veranstaltungsort
        :type: linked
        :template_name: Örtlichkeit
        :validations:
          :max: 1
        :api:
          :name: location
      :data_type:
        :label: Inhaltstyp
        :type: classification
        :tree_label: Inhaltstypen
        :default_value: 'Veranstaltungstermin'
