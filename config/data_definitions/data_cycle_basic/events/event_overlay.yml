---
- :data:
    :name: EventOverlay
    :type: object
    :schema_type: Event
    :content_type: embedded
    :features:
      :translatable:
        :allowed: true
    :properties:
      :id:
        :label: id
        :type: key
      :name:
        :label: Titel
        :type: string
        :storage_location: column
        :search: true
      :start_date:
        :label: Startzeitpunkt
        :storage_location: column
        :type: computed
        :compute:
          :type: datetime
          :module: Utility::Compute::Schedule
          :method: start_date
          :parameters:
            :0: event_schedule
        :ui:
          :show:
            :content_area: none
      :end_date:
        :label: Endzeitpunkt
        :storage_location: column
        :type: computed
        :compute:
          :type: datetime
          :module: Utility::Compute::Schedule
          :method: end_date
          :parameters:
            :0: event_schedule
        :ui:
          :show:
            :content_area: none
      :description:
        :label: Teasertext
        :type: string
        :storage_location: column
        :search: true
        :ui:
          :edit:
            :type: text_editor
            :options:
              :data-size: basic
      :image:
        :label: Bilder
        :type: linked
        :template_name: Bild
      :url:
        :label: URL
        :type: string
        :storage_location: translated_value
        :validations:
          :format: url
        :api:
          :name: sameAs
        :xml:
          :name: sameAs
      :content_location:
        :label: Veranstaltungsort
        :type: linked
        :template_name: Örtlichkeit
        :api:
          :name: location
      :virtual_location:
        :label: Virtueller Veranstaltungsort
        :type: embedded
        :template_name: VirtualLocation
        :api:
          :disabled: true
          :v4:
            :disabled: false
            :transformation:
              :method: append
              :name: location
      :event_attendance_mode:
        :label: Veranstaltungsteilnahmemodus
        :type: classification
        :tree_label: Veranstaltungsteilnahmemodus
        :ui:
          :show:
            :content_area: header
          :edit:
            :type: radio_button
        :api:
          :disabled: true
          :v4:
            :disabled: false
            :partial: string
      :event_status:
        :label: Veranstaltungsstatus
        :type: classification
        :tree_label: Veranstaltungsstatus
        :ui:
          :show:
            :content_area: header
          :edit:
            :type: radio_button
        :api:
          :disabled: true
          :v4:
            :disabled: false
            :partial: string
      :event_schedule:
        :label: Termine
        :type: schedule
        :api:
          :disabled: true
          :v4:
            :disabled: false
      :schedule:
        :label: Event-Schedule
        :type: embedded
        :template_name: EventSchedule
        :translated: true
        :api:
          :name: eventSchedule
          :v4:
            :disabled: true
        :ui:
          :edit:
            :disabled: true
          :show:
            :disabled: true
