---
- :data:
    :name: Unterkunft
    :type: object
    :schema_type: Place
    :content_type: entity
    :boost: 10.0
    :features:
      :geocode:
        :allowed: true
      :overlay:
        :allowed: true
      :translatable:
        :allowed: true
      :download:
        :allowed: true
      :serialize:
        :allowed: true
        :serializers:
          :xml: true
          :json: true
          :gpx: true
          :indesign: true
    :api:
      :type: LodgingBusiness
    :properties:
      :id:
        :label: id
        :type: key
      :title:
        :type: mixin
        :name: title
      :overlay:
        :label: Overlay
        :type: embedded
        :template_name: PlaceOverlay
        :validations:
          :max: 1
      :additional_information:
        :label: Ergänzende Information
        :type: embedded
        :template_name: Ergänzende Information
        :translated: true
      :content_classifications:
        :type: mixin
        :name: content_classifications
      :opening_hours_specification:
        :label: Öffnungszeit
        :type: embedded
        :template_name: Öffnungszeit
        :translated: true
      :postal_address:
        :type: mixin
        :name: postal_address
      :geo:
        :type: mixin
        :name: geo
      :contact_info:
        :type: mixin
        :name: contact_info
      :place_attributes:
        :type: mixin
        :name: place_attributes
      :linked_data:
        :type: mixin
        :name: linked_data
      :contains_place:
        :label: Services
        :type: linked
        :template_name: Zimmer
        :translated: true
      :makes_offer:
        :label: Angebote
        :type: embedded
        :template_name: Angebot
        :translated: true
      # move to dataCycleProperty
      :price_range:
        :label: Preis-Info
        :type: string
        :storage_location: translated_value
        :search: true
        :ui:
          :edit:
            :type: text_editor
            :options:
              :data-size: basic
      :aggregate_rating:
        :label: Durchschittswertung
        :type: embedded
        :template_name: Durchschittswertung
        :translated: true
      :potential_actions:
        :type: mixin
        :name: potential_actions
      :outdoor_active:
        :type: mixin
        :name: outdoor_active
      :outdoor_active_categories:
        :type: mixin
        :name: outdoor_active_categories
      :outdoor_active_external_system:
        :type: mixin
        :name: outdoor_active_external_system
      :feratel_categories:
        :type: mixin
        :name: feratel_categories
      :external_source_attribtues:
        :type: mixin
        :name: external_source_attribtues
      :xamoom:
        :type: mixin
        :name: xamoom
      :booking:
        :type: mixin
        :name: booking
      :hrs:
        :type: mixin
        :name: hrs
      :data_type:
        :label: Inhaltstyp
        :type: classification
        :tree_label: Inhaltstypen
        :default_value: "Unterkunft"
      :meta_data:
        :type: mixin
        :name: meta_data
      :additional_properties:
        :type: mixin
        :name: additional_properties
