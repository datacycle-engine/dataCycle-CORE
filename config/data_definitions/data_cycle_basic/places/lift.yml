---
- :data:
    :name: Lift
    :type: object
    :schema_type: Place
    :content_type: entity
    :boost: 10.0
    :features:
      :geocode:
        :allowed: true
      :overlay:
        :allowed: true
      :translatable:
        :allowed: true
    :api:
      :type: TouristAttraction
    :properties:
      :id:
        :label: id
        :type: key
      :title:
        :type: mixin
        :name: title
      :overlay:
        :label: Overlay
        :type: embedded
        :template_name: PlaceOverlay
        :validations:
          :max: 1
      :opening_hours_specification:
        :label: Öffnungszeit
        :type: embedded
        :template_name: Öffnungszeit
      :postal_address:
        :type: mixin
        :name: postal_address
      :geo:
        :type: mixin
        :name: geo
      :contact_info:
        :type: mixin
        :name: contact_info
      :place_attributes:
        :type: mixin
        :name: place_attributes
      :content_classifications:
        :type: mixin
        :name: content_classifications
      :data_type:
        :label: Inhaltstype
        :type: classification
        :tree_label: Inhaltstypen
        :default_value: "Lift"
      :feratel_cps:
        :type: mixin
        :name: feratel_cps
      :meta_data:
        :type: mixin
        :name: meta_data
      :additional_properties:
        :type: mixin
        :name: additional_properties
