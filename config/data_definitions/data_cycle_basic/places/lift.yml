---
- :data:
    :name: Lift
    :type: object
    :schema_type: Place
    :content_type: entity
    :boost: 10.0
    :features:
      :geocode:
        :allowed: true
      :overlay:
        :allowed: true
      :translatable:
        :allowed: true
      :download:
        :allowed: true
      :serialize:
        :allowed: true
        :serializers:
          :xml: true
          :json: true
          :gpx: true
          :indesign: true
    :api:
      :type:
        - TouristAttraction
        - 'dcls:Lift'
        - 'odta:SkiLift'
    :properties:
      :id:
        :label: id
        :type: key
      :title:
        :type: mixin
        :name: title
      :overlay:
        :label: Overlay
        :type: embedded
        :template_name: SimplePlaceOverlay
        :translated: true
        :validations:
          :max: 1
      :content_classifications:
        :type: mixin
        :name: content_classifications
      :opening_hours_specification:
        :label: Öffnungszeit
        :type: embedded
        :template_name: Öffnungszeit
        :translated: true
      :postal_address:
        :type: mixin
        :name: postal_address
      :geo:
        :type: mixin
        :name: geo
      :length:
        :label: Länge (m)
        :type: number
        :storage_location: value
        :validations:
          :format: float
        :api:
          :v4:
            :format:
              :append: m
      :geo_shape:
        :type: mixin
        :name: geo_shape
      :contact_info:
        :type: mixin
        :name: contact_info
      :place_attributes:
        :type: mixin
        :name: place_attributes
      :man_per_h:
        :label: Personen pro Stunde
        :type: number
        :storage_location: value
      :man_per_t:
        :label: Personen pro Fahrt
        :type: number
        :storage_location: value
        :ui:
          :edit:
            :options:
              :data-unit: Personen
          :show:
            :options:
              :data-unit: Personen
      :order_string:
        :label: nr
        :type: string
        :storage_location: value
      :snow_resort:
        :label: Skigebiet
        :template_name: Skigebiet
        :type: linked
        :inverse_of: lift_details
      :linked_data:
        :type: mixin
        :name: linked_data
      :potential_actions:
        :type: mixin
        :name: potential_actions
      :data_type:
        :label: Inhaltstyp
        :type: classification
        :tree_label: Inhaltstypen
        :default_value: "Lift"
      :feratel_cps:
        :type: mixin
        :name: feratel_cps
      :cc_rel:
        :type: mixin
        :name: cc_rel
      :meta_data:
        :type: mixin
        :name: meta_data
      :additional_properties:
        :type: mixin
        :name: additional_properties
