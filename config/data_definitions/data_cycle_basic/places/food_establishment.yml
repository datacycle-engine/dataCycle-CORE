---
- :data:
    :name: Gastronomischer Betrieb
    :type: object
    :schema_type: Place
    :content_type: entity
    :boost: 10.0
    :api:
      :type: FoodEstablishment
    :features:
      :geocode:
        :allowed: true
      :overlay:
        :allowed: true
      :translatable:
        :allowed: true
      :download:
        :allowed: true
      :serialize:
        :allowed: true
        :serializers:
          :xml: true
          :json: true
          :gpx: true
    :properties:
      :id:
        :label: id
        :type: key
      :title:
        :type: mixin
        :name: title
      :overlay:
        :label: Overlay
        :type: embedded
        :template_name: PlaceOverlay
        :validations:
          :max: 1
      :opening_hours_specification:
        :label: Öffnungszeit
        :type: embedded
        :template_name: Öffnungszeit
        :translated: true
      :dining_hours_specification:
        :label: Warme Küche
        :type: embedded
        :template_name: Öffnungszeit
        :translated: true
        :api:
          :partial: opening_hours_specification
      :postal_address:
        :type: mixin
        :name: postal_address
      :geo:
        :type: mixin
        :name: geo
      :contact_info:
        :type: mixin
        :name: contact_info
      :place_attributes:
        :type: mixin
        :name: place_attributes
      :price_range:
        :label: Preis-Info
        :type: string
        :storage_location: translated_value
        :search: true
        :ui:
          :edit:
            :type: text_editor
            :options:
              :data-size: basic
      :outdoor_active:
        :type: mixin
        :name: outdoor_active
      :outdoor_active_link:
        :type: mixin
        :name: outdoor_active_link
      :outdoor_active_categories:
        :type: mixin
        :name: outdoor_active_categories
      :outdoor_active_external_system:
        :type: mixin
        :name: outdoor_active_external_system
      :potential_actions:
        :type: mixin
        :name: potential_actions
      :data_type:
        :label: Inhaltstyp
        :type: classification
        :tree_label: Inhaltstypen
        :default_value: "Gastronomischer Betrieb"
      :feratel:
        :type: mixin
        :name: feratel_categories
      :feratel_cps:
        :type: mixin
        :name: feratel_cps
      :pimcore_categories:
        :type: mixin
        :name: pimcore_categories
      :wogehmahin:
        :type: mixin
        :name: wogehmahin
      :content_classifications:
        :type: mixin
        :name: content_classifications
      :meta_data:
        :type: mixin
        :name: meta_data
      :additional_properties:
        :type: mixin
        :name: additional_properties
