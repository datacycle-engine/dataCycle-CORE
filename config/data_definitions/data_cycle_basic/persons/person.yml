---
- :data:
    :name: Person
    :type: object
    :schema_type: Person
    :content_type: entity
    :boost: 1.0
    :features:
      :translatable:
        :allowed: true
      :creatable:
        :allowed: true
      :download:
        :allowed: true
      :serialize:
        :allowed: true
        :serializers:
          :xml: true
          :json: true
    :properties:
      :id:
        :label: id
        :type: key
      :title:
        :type: mixin
        :name: title
      :overlay:
        :label: Overlay
        :type: embedded
        :template_name: PersonOverlay
        :validations:
          :max: 1
      :content_classifications:
        :type: mixin
        :name: content_classifications
      :honorific_prefix:
        :label: "Anrede / Titel"
        :type: string
        :storage_location: translated_value
        :normalize:
          :id: degree
          :type: degree
      :honorific_suffix:
        :label: "Titel nachgestellt"
        :type: string
        :storage_location: translated_value
      :postal_address:
        :type: mixin
        :name: postal_address
      :contact_info:
        :type: mixin
        :name: contact_info
      :job_title:
        :label: Position
        :type: string
        :storage_location: translated_value
        :search: true
      :description:
        :label: Text
        :type: string
        :storage_location: column
        :search: true
        :ui:
          :edit:
            :type: text_editor
            :options:
              :data-size: full
      :image:
        :label: Bilder
        :type: linked
        :template_name: Bild
      :gender:
        :label: Geschlecht
        :type: classification
        :tree_label: Geschlecht
        :ui:
          :show:
            :content_area: header
        :api:
          :partial: gender
          :type: GenderType
          :transformation:
            :method: serialize
            :name: string
      :member_of:
        :label: Organisation
        :type: linked
        :template_name: Organization
        :inverse_of: member
      :data_type:
        :label: Inhaltstyp
        :type: classification
        :tree_label: Inhaltstypen
        :default_value: "Person"
      :meta_data:
        :type: mixin
        :name: meta_data
      :additional_properties:
        :type: mixin
        :name: additional_properties
