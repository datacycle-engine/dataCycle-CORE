        :label: Angebots URL
        :type: string
        :storage_location: translated_value
        :validations:
          :format: url
        :api:
          :v4:
            :name: sameAs
      # :hours_available:
      #   :label: Verfügbarkeit
      #   :type: embedded
      #   :template_name: EventSchedule
      #   :translated: true
      #   :api:
      #     :name: eventSchedule
      #     :v4:
      #       :disabled: true
      :hours_available:
        :label: Termine
        :type: schedule
        :api:
          :disabled: true
      :provider:
        :label: Dienstleister
        :type: linked
        :stored_filter:
          -
            :with_classification_aliases_and_treename:
              :treeLabel: Inhaltstypen
              :aliases:
                - LocalBusiness
                - Unterkunft
                - Organisation
      :offers:
        :label: Angebote
        :type: linked
        :template_name: Offer
