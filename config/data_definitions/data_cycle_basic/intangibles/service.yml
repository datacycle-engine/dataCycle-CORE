- :data:
    :name: Service
    :type: object
    :schema_type: Intangible
    :content_type: entity
    :features:
      :translatable:
        :allowed: true
    :properties:
      :id:
        :label: id
        :type: key
      :name:
        :label: Titel
        :type: string
        :storage_location: column
        :search: true
        :validations:
          :required: true
        :api:
          :minimal: true
        :ui:
          :show:
            :disabled: true
      :description:
        :label: Beschreibung
        :type: string
        :storage_location: column
        :search: true
        :ui:
          :edit:
            :type: text_editor
            :options:
              :data-size: full
      :text:
        :label: Beschreibung (lang)
        :type: string
        :storage_location: translated_value
        :search: true
        :ui:
          :edit:
            :type: text_editor
            :options:
              :data-size: full
        :api:
          :partial: property_value
          :type: PropertyValue
          :transformation:
            :method: combine
            :name: additionalProperty
      :image:
        :label: Bilder
        :type: linked
        :template_name: Bild
      :subject_of:
        :label: Ergänzende Information
        :type: embedded
        :template_name: Ergänzende Information
      :url:
        :label: Angebots URL
        :type: string
        :storage_location: translated_value
        :validations:
          :format: url
        :api:
          :v4:
            :name: sameAs
      :area_served:
        :label: Treffpunkt
        :type: linked
        :template_name: Örtlichkeit
      :hours_available:
        :label: Termine
        :type: schedule
        :api:
          :disabled: true
          :v4:
            :disabled: false
      :provider:
        :label: Dienstleister
        :type: linked
        :stored_filter:
          -
            :with_classification_aliases_and_treename:
              :treeLabel: Inhaltstypen
              :aliases:
                - LocalBusiness
                - Unterkunft
                - Organisation
      :offers:
        :label: Angebote
        :type: embedded
        :template_name: Angebot
      :feratel_service_classifications:
        :type: mixin
        :name: feratel_service_classifications
      :data_type:
        :label: Inhaltstype
        :type: classification
        :tree_label: Inhaltstypen
        :default_value: Service
      :cc_rel:
        :type: mixin
        :name: cc_rel
      :meta_data:
        :type: mixin
        :name: meta_data
