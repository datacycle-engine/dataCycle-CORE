---
- :data:
    :name: Rezept
    :type: object
    :schema_type: CreativeWork
    :content_type: entity
    :boost: 100.0
    :features:
      :releasable:
        :allowed: true
      :creatable:
        :allowed: true
    :api:
      :type: Recipe
    :properties:
      :id:
        :label: id
        :type: key
      :release_status:
        :type: mixin
        :name: releasable
      :title:
        :type: mixin
        :name: title
      :validity_period:
        :type: mixin
        :name: validity_period
      :creative_attributes:
        :type: mixin
        :name: creative_attributes
      :recipe_instructions:
        :label: Fließtext
        :type: string
        :storage_location: translated_value
        :search: true
        :ui:
          :edit:
            :type: text_editor
            :options:
              :data-size: full
      :recipe_yield:
        :label: Portionen
        :type: string
        :storage_location: translated_value
        :search: true
      :total_time:
        :label: Kochzeit
        :type: number
        :storage_location: value
        :validations:
          :format: integer
          :max: 300
        :ui:
          :edit:
            :type: duration
            :options:
              :data-unit: min
          :show:
            :options:
              :data-unit: min
        :api:
          :partial: duration
          :format:
            :append: M
            :prepend: PT
      :recipe_course:
        :label: 'Gang'
        :type: classification
        :tree_label: 'Rezept-Gänge'
        :api:
          :disabled: true
      :recipe_category:
        :label: 'Kategorie'
        :type: classification
        :tree_label: 'Rezept-Kategorien'
        :api:
          :partial: string
      :recipe_ingredient:
        :label: Zutaten
        :type: string
        :storage_location: translated_value
        :search: true
        :ui:
          :edit:
            :type: text_editor
            :options:
              :data-size: full
      :keywords:
        :label: Keywords
        :storage_location: translated_value
        :type: computed
        :compute:
          :type: string
          :module: Utility::Compute::Classification
          :method: keywords
          :parameters:
            :0: tags
            :1: recipe_course
        :ui:
          :show:
            :disabled: true
      :data_type:
        :label: Inhaltstype
        :type: classification
        :tree_label: Inhaltstypen
        :default_value: "Rezept"
      :content_classifications:
        :type: mixin
        :name: content_classifications
      :publication_schedule:
        :type: mixin
        :name: publication_schedule
      :meta_data:
        :type: mixin
        :name: meta_data
      :additional_properties:
        :type: mixin
        :name: additional_properties
