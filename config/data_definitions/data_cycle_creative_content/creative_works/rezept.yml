---
- :data:
    :name: Rezept
    :type: object
    :schema_type: CreativeWork
    :content_type: entity
    :boost: 100.0
    :api:
      :type: Recipe
    :features:
      :releasable:
        :allowed: true
      :creatable:
        :allowed: true
      :download:
        :allowed: true
      :serialize:
        :allowed: true
        :serializers:
          :xml: true
          :json: true
          :indesign: true
    :properties:
      :id:
        :label: id
        :type: key
      :release_status:
        :type: mixin
        :name: releasable
      :title:
        :type: mixin
        :name: title
      :validity_period:
        :type: mixin
        :name: validity_period
      :content_classifications:
        :type: mixin
        :name: content_classifications
      :creative_attributes:
        :type: mixin
        :name: creative_attributes
      :recipe_instructions:
        :label: Zutatengruppe
        :type: embedded
        :template_name: Zutatengruppe
      :recipe_yield:
        :label: Portionen
        :type: string
        :storage_location: translated_value
        :search: true
      :total_time:
        :label: Kochzeit
        :type: number
        :storage_location: value
        :validations:
          :format: integer
          :max: 300
        :ui:
          :edit:
            :type: duration
            :options:
              :data-unit: min
          :show:
            :options:
              :data-unit: min
        :api:
          :partial: duration
          :format:
            :append: M
            :prepend: PT
        :advanced_search: true
      :recipe_course:
        :label: 'Gang'
        :type: classification
        :tree_label: 'Rezept-Gänge'
      :recipe_category:
        :label: 'Kategorie'
        :type: classification
        :tree_label: 'Rezept-Kategorien'
        :api:
          :partial: string
      :keywords:
        :label: Keywords
        :storage_location: translated_value
        :type: computed
        :compute:
          :type: string
          :module: Utility::Compute::Classification
          :method: keywords
          :parameters:
            :0: tags
            :1: recipe_course
            :2: recipe_category
        :ui:
          :show:
            :disabled: true
      :data_type:
        :label: Inhaltstyp
        :type: classification
        :tree_label: Inhaltstypen
        :default_value: Rezept
      :meta_data:
        :type: mixin
        :name: meta_data
      :additional_properties:
        :type: mixin
        :name: additional_properties

- :data:
    :name: Zutatengruppe
    :type: object
    :schema_type: CreativeWork
    :content_type: embedded
    :api:
      :type: Recipe
    :properties:
      :id:
        :label: id
        :type: key
      :name:
        :label: Name
        :type: string
        :storage_location: column
        :search: true
      :recipe_instructions:
        :label: Anleitung
        :type: string
        :storage_location: translated_value
        :ui:
          :edit:
            :type: text_editor
            :options:
              :data-size: full
      :recipe_ingredient:
        :label: Zutat
        :type: embedded
        :template_name: Zutat
        :api:
          :transformation:
            :method: map
            :key: name
      :data_type:
        :label: Inhaltstyp
        :type: classification
        :tree_label: Inhaltstypen
        :default_value: Zutatengruppe

- :data:
    :name: Zutat
    :type: object
    :schema_type: CreativeWork
    :content_type: embedded
    :properties:
      :id:
        :label: id
        :type: key
      :name:
        :label: Name und Menge
        :type: string
        :storage_location: column
        :search: true
        :validations:
          :required: true
      :data_type:
        :label: Inhaltstyp
        :type: classification
        :tree_label: Inhaltstypen
        :default_value: Zutat
