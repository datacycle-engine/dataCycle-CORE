---
- :data:
    :name: Angebot
    :type: object
    :schema_type: CreativeWork
    :content_type: entity
    :boost: 100.0
    :features:
      :releasable:
        :allowed: true
      :creatable:
        :allowed: true
    :properties:
      :id:
        :label: id
        :type: key
      :release_status:
        :type: mixin
        :name: releasable
      :title:
        :type: mixin
        :name: title
      :validity_period:
        :type: mixin
        :name: validity_period
      :creative_attributes:
        :type: mixin
        :name: creative_attributes
      :offer_period:
        :label: Angebotdetails
        :type: embedded
        :template_name: Angebotszeitraum
        :api:
          :name: offers
      :data_type:
        :label: Inhaltstype
        :type: classification
        :tree_label: Inhaltstypen
        :default_value: "Angebot"
      :content_classifications:
        :type: mixin
        :name: content_classifications
      :publication_schedule:
        :type: mixin
        :name: publication_schedule
      :meta_data:
        :type: mixin
        :name: meta_data
      :additional_properties:
        :type: mixin
        :name: additional_properties

- :data:
    :name: Angebotszeitraum
    :type: object
    :schema_type: CreativeWork
    :content_type: embedded
    :api:
      :type: Offer
    :properties:
      :id:
        :label: id
        :type: key
      :price:
        :label: Preis
        :type: string
        :storage_location: value
      :offer_period:
        :label: Zeitraum
        :type: object
        :storage_location: value
        :validations:
          :daterange:
            :from: valid_from
            :to: valid_until
        :ui:
          :edit:
            :type: daterange
        :api:
          :transformation:
            :method: unwrap
        :properties:
          :valid_from:
            :label: "Zeitraum von"
            :type: datetime
            :storage_location: value
            :validations:
              :format: date_time
            :ui:
              :edit:
                :type: date
                :options:
                  :data-validate: daterange
                  :placeholder: tt.mm.jjjj
              :show:
                :type: date
          :valid_until:
            :label: "bis"
            :type: datetime
            :storage_location: value
            :validations:
              :format: date_time
            :ui:
              :edit:
                :type: date
                :options:
                  :data-validate: daterange
                  :placeholder: tt.mm.jjjj
              :show:
                :type: date
            :api:
              :name: validThrough
      :data_type:
        :label: Inhaltstype
        :type: classification
        :tree_label: Inhaltstypen
        :default_value: "Angebotszeitraum"
