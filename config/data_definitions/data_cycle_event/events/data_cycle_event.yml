---
- :data:
    :name: dataCycleEvent
    :type: object
    :schema_type: Event
    :boost: 100.0
    :content_type: entity
    :features:
      :overlay:
        :allowed: true
      :creatable:
        :allowed: true
      :translatable:
        :allowed: true
    :properties:
      :id:
        :label: id
        :type: key
      :overlay:
        :label: Overlay
        :type: embedded
        :template_name: dataCycleEventOverlay
        :validations:
          :max: 1
      :title:
        :type: mixin
        :name: title
      :validity_period:
        :type: mixin
        :name: validity_period
      :description:
        :label: Beschreibung
        :type: string
        :storage_location: column
        :search: true
        :ui:
          :edit:
            :type: text_editor
            :options:
              :data-size: basic
      :duration:
        :label: Frequenz
        :type: string
        :storage_location: value
      :same_as:
        :label: Inhalt URL
        :type: string
        :storage_location: translated_value
        :external: true
        :validations:
          :format: url
      :event_schedule:
        :label: Event-Schedule
        :type: embedded
        :template_name: dataCycleEventSchedule
      :image:
        :label: Bilder
        :type: linked
        :template_name: Bild
      :content_location:
        :label: Veranstaltungsort
        :type: linked
        :template_name: Örtlichkeit
        :validations:
          :max: 1
        :api:
          :name: location
      :data_type:
        :label: Inhaltstype
        :type: classification
        :tree_label: Inhaltstypen
        :default_value: "dataCycleEvent"
      :content_classifications:
        :type: mixin
        :name: content_classifications
      :meta_data:
        :type: mixin
        :name: meta_data
      :event_db:
        :type: mixin
        :name: event_db
      :feratel_events:
        :type: mixin
        :name: feratel_events
      :v_ticket:
        :type: mixin
        :name: v_ticket
      :additional_properties:
        :type: mixin
        :name: additional_properties
