:publication_schedule:
  :enabled: false

:download:
  :enabled: true
  :collections:
    :content:
      :enabled: false
    :watch_list:
      :enabled: false
      :serializers:
        :asset: false
        :json: false
        :xml: false
        :indesign: false
    :stored_filter:
      :enabled: false
      :serializers:
        :asset: false
        :json: false
        :xml: false
        :indesign: false
  :dependencies:
    - serialize

:serialize:
  :enabled: true
  :serializers:
    :asset: false
    :json: false
    :gpx: true
    :xml: false

:overlay:
  :enabled: true
  :attribute_keys:
    - overlay

:releasable:
  :enabled: false
  :attribute_keys:
    - release_status_id
    - release_status_comment
  :classification_names:
    :valid: freigegeben
    :partner: beim Partner
    :review: in Review
    :archive: archiviert

:life_cycle:
  :enabled: false

:idea_collection:
  :enabled: false

:container:
  :enabled: false

:main_filter:
  :enabled: true
  :autoload_last_filter: true
  :config:
    :backend:
      :filter:
        :search: true
        # :classification_tree: Inhaltstypen # toplevel classifications from this tree will be available as clickable buttons
        :classification_trees:
          - Inhaltstypen
        # :permanent_advanced: # always visible advanced filtesrs, can be a hash with the same config as :advanced_filter:, this filters will always be shown in the advanced filter section
        :advanced: true # can be a hash with the same config as :advanced_filter:, this filters will always be shown in the advanced filter section
      :store: true
      :add_items_to_watch_list: true
      :language: true
      :mode_selector: true
      :sortable: true
    :things:
      :filter:
        :search: true
        :classification_trees:
          - 'Inhaltstypen'
      :language: true
      :mode_selector: true
      :collapse: true
    :collection:
      :filter:
        :search: true
        :classification_trees:
          - 'Inhaltstypen'
      :language: true
      :mode_selector: true
      :collapse: true
    :classification_tree:
      :filter:
        :classification_trees:
          - Inhaltstypen
          - Märkte
      :language: true
    :publications:
      :filter:
        :classification_trees:
          - Inhaltstypen
        :advanced: true
        :publication_date: true
      :language: true
    :subscriptions:
      :filter:
        :search: true
      :language: true
      :mode_selector: true

:sortable:
  :enabled: false
  :updated_at: true
  :created_at: true
  :translated_name: true

:advanced_filter:
  :enabled: true
  :config:
    :visible: false
    :schedule_exceptions:
      - validity_schedule
  :classification_alias_ids: all
  :external_source: true
  :external_system: false
  :creator: true
  :classification_tree_ids: true
  :date_range: all
  :validity_period:
    :absolute: true
    :relative: true
  :inactive_things:
    :absolute: true
    :relative: true
  :in_schedule:
    :absolute: true
    :relative: true
  :geo_filter:
    :geo_radius: false
    :geo_within_classification:
      false
      # - Administrative Einheiten
