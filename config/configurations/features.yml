    :bild: image
    :video: video

:normalize:
  :enabled: false

:duplicate_content:
  :enabled: false

:image_optimizer:
  :enabled: true
  :config:
    :pngout: false
    :svgo: false
    :advpng: false
    :gifsicle:
      :careful: true
    :optipng:
      :strip: false
      :level: 1
    :jpegtran:
      :copy_chunks: true
    :jpegoptim:
      :strip: :com
    :pngquant:
      :speed: 10

:duplicate_candidate:
  :enabled: false

:content_lock:
  :enabled: false
  :lock_length: <%= 30.minutes %>
  :lock_renew_before: <%= 5.minutes %>

:user_api:
