manage_system_subjects:
  actions: manage
  segment: SubjectByConditions
  parameters:
    - - DataCycleCore::ClassificationTreeLabel
      - DataCycleCore::ConceptScheme
      - DataCycleCore::ClassificationAlias
      - DataCycleCore::Classification
      - DataCycleCore::ClassificationTree
      - DataCycleCore::Concept

# only system_admin may recompute computed attributes from the admin dashboard
# (super_admin's dash_board whitelist deliberately excludes these actions)
dash_board_computed_attributes:
  actions:
    - computed_attributes_form
    - update_computed_attributes
  segment: SubjectByConditions
  parameters:
    - - :dash_board

read_api_configs:
  actions: read
  segment: SubjectByConditions
  parameters:
    - - :api_config_schema
      - :api_config_features
      - :api_config_common

user_actions:
  actions: manage
  segment: SubjectByConditions
  parameters: DataCycleCore::User

role_filter:
  actions: filter
  segment: SubjectByConditions
  parameters: DataCycleCore::Role

watch_list_bulk_actions:
  actions:
    - show
    - bulk_edit
    - bulk_delete
    - update
    - change_owner
    - create_api
    - update_description
    - show_description
  segment: SubjectByConditions
  parameters: DataCycleCore::WatchList
