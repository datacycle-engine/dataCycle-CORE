---
name: Pimcore
credentials:
  host: https://www.montafon.at/webservice/imx
  end_point: infrastructure
  apikey: 6b46d5f1240824f1a27b6aaa3641e03d96694789f5700d149dae2aa144ea150d
default_options:
  locales: [de, en]
config:
  download_config:
    infrastructures:
      sorting: 1
      source_type: infrastructures
      endpoint: DataCycleCore::Generic::Pimcore::Endpoint
      download_strategy: DataCycleCore::Generic::Pimcore::Download
  import_config:
    categories:
      sorting: 1
      source_type: infrastructures
      import_strategy: DataCycleCore::Generic::Common::ImportTags
      tree_label: 'Pimcore - Categories'
      tag_id_path: 'categories.id'
      tag_name_path: 'categories.name'
      external_id_prefix: 'Pimcore - Category - '
    city:
      sorting: 2
      source_type: infrastructures
      import_strategy: DataCycleCore::Generic::Common::ImportTags
      tree_label: 'Pimcore - Cities'
      tag_id_path: 'city.id'
      tag_name_path: 'city.name'
      external_id_prefix: 'Pimcore - City - '
    images:
      sorting: 5
      source_type: infrastructures
      import_strategy: DataCycleCore::Generic::Pimcore::ImportImages
      transformations:
        image:
          template: Bild
          content_url_prefix: 'https://www.montafon.at'
    infrastructures:
      sorting: 10
      source_type: infrastructures
      import_strategy: DataCycleCore::Generic::Pimcore::ImportInfrastructure
      transformations:
        image:
          template: Bild
        infrastructure:
          template: POI
