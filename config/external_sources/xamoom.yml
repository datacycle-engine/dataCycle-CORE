---
name: Xamoom
credentials:
  host: https://xamoom-api-dot-xamoom-cloud.appspot.com/
  end_point: _api/v2/integration/spots
  key: xxxxx-xxxx-xxxx-xxxx-xxx
config:
  download_config:
    spots:
      sorting: 1
      source_type: spots
      endpoint: DataCycleCore::Generic::Xamoom::Endpoint
      download_strategy: DataCycleCore::Generic::Xamoom::Download
  import_config:
    tags:
      sorting: 1
      source_type: spots
      import_strategy: DataCycleCore::Generic::Common::ImportTags
      tree_label: 'Xamoom - Tags'
      tag_id_path: 'attributes.tags'
      tag_name_path: 'attributes.tags'
      external_id_prefix: 'Xamoom - tag - '
    spots:
      sorting: 2
      source_type: spots
      import_strategy: DataCycleCore::Generic::Xamoom::ImportSpots
      transformations:
        image:
          content_type: DataCycleCore::CreativeWork
          template: Bild
          default_values:
            data_type:
              tree_label: Inhaltstypen
              value: Bild
        spot:
          content_type: DataCycleCore::Place
          template: Örtlichkeit
          default_values:
            data_type:
              tree_label: Inhaltstypen
              value: Örtlichkeit
