      api_fulltext_fields_string?: 'must be a valid field string for fulltext search (allowed values: name,dc:slug,dc:classification, e.g. "name,dc:slug")'
      ruby_module_or_class?: "must be a valid Ruby module or class"
      ruby_module?: "must be a valid Ruby module"
      ruby_class?: "must be a valid Ruby class"
