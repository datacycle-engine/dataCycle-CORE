        login_required: "Der Autorisierungsserver erfordert Endbenutzer-Authentifizierung"
        consent_required: "Der Autorisierungsserver erfordert Endbenutzer-Zustimmung"
        interaction_required: "Der Autorisierungsserver erfordert Endbenutzer-Interaktion"
