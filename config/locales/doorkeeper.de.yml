        invalid_grant: "Die bereitgestellte Autorisierungsberechtigung ist ungültig, abgelaufen, widerrufen, stimmt nicht mit der in der Autorisierungsanfrage verwendeten Weiterleitungs-URI überein oder wurde an einen anderen Client ausgestellt."
        unsupported_grant_type: "Der Autorisierungs-Grant-Type wird vom Autorisierungsserver nicht unterstützt."

        invalid_token:
          revoked: "Das Access-Token wurde widerrufen"
          expired: "Das Access-Token ist abgelaufen"
          unknown: "Das Access-Token ist ungültig"
        revoke:
          unauthorized: "Sie sind nicht autorisiert, dieses Token zu widerrufen"

        forbidden_token:
