---
name: DataCycle - Media
credentials:
  storage_type: local
  # docker:
  # directory: ./private/import/local_assets
  directory: ./test/fixtures/files
  delete: true
config:
  import_config:
    images:
      sorting: 1
      source_type: images
      asset_type: DataCycleCore::Image
      import_strategy: DataCycleCore::Generic::DataCycleMedia::ImportAssets
      extract_tags:
        mode: folder
      #        mode: filename
      #        delimiter: '_'
      #        tree_label: 'Medien - Tags'
      #        attribute_name: 'media_tags'
      transformations:
        asset:
          template: Bild
    videos:
      sorting: 2
      source_type: videos
      asset_type: DataCycleCore::Video
      import_strategy: DataCycleCore::Generic::DataCycleMedia::ImportAssets
      extract_tags:
        mode: folder
      transformations:
        asset:
          template: Video
    audio:
      sorting: 3
      source_type: audio
      asset_type: DataCycleCore::Audio
      import_strategy: DataCycleCore::Generic::DataCycleMedia::ImportAssets
      extract_tags:
        mode: folder
      transformations:
        asset:
          template: Audio
    pdf:
      sorting: 4
      source_type: pdf
      asset_type: DataCycleCore::Pdf
      import_strategy: DataCycleCore::Generic::DataCycleMedia::ImportAssets
      extract_tags:
        mode: folder
      transformations:
        asset:
          template: PDF
