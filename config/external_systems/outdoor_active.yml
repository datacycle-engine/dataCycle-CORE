---
name: OutdoorActive
credentials:
  import:
    project: api-vbg-alpinfonet
    key: 'XUBRAKED-EMWGMGL9-4OSSRCN4'
    host: http://www.outdooractive.com
    end_point: api/project
  export:
    xml:
      source: 'datacycle-kaernten'
    #    owner: 'woerthersee'
    host: 'http://web:3000'
    key: 'datacycle-kaernten'
default_options:
  import:
    locales: [de, en]
    outdoor_active_tour_base_url: 'https://touren.vorarlberg.travel/'
    external_url: 'https://dms.outdooractive.com/%{locale}/poi/%{external_key}'
  export:
    external_url: 'https://dms.outdooractive.com/%{locale}/poi/%{external_key}'
    external_key_param: outdoor_active_id
config:
  download_config:
    tour_categories:
      sorting: 1
      source_type: tour_categories
      endpoint: DataCycleCore::Generic::OutdoorActive::Endpoint
      endpoint_method: tour_categories
      download_strategy: DataCycleCore::Generic::OutdoorActive::Download
    place_categories:
      sorting: 2
      source_type: place_categories
      endpoint: DataCycleCore::Generic::OutdoorActive::Endpoint
      endpoint_method: place_categories
      download_strategy: DataCycleCore::Generic::OutdoorActive::Download
    regions:
      sorting: 3
      source_type: regions
      endpoint: DataCycleCore::Generic::OutdoorActive::Endpoint
      download_strategy: DataCycleCore::Generic::OutdoorActive::Download
    places:
      sorting: 4
      source_type: places
      endpoint: DataCycleCore::Generic::OutdoorActive::Endpoint
      download_strategy: DataCycleCore::Generic::OutdoorActive::Download
    tours:
      sorting: 5
      source_type: tours
      endpoint: DataCycleCore::Generic::OutdoorActive::Endpoint
      download_strategy: DataCycleCore::Generic::OutdoorActive::Download
  import_config:
    tour_categories:
      sorting: 1
      source_type: tour_categories
      locales: [de, en]
      import_strategy: DataCycleCore::Generic::OutdoorActive::ImportCategories
      tree_label: OutdoorActive - Touren-Kategorien
    place_categories:
      sorting: 2
      source_type: place_categories
      locales: [de, en]
      import_strategy: DataCycleCore::Generic::OutdoorActive::ImportCategories
      tree_label: OutdoorActive - POI-Kategorien
    regions:
      sorting: 3
      source_type: regions
      locales: [de, en]
      import_strategy: DataCycleCore::Generic::OutdoorActive::ImportRegions
      tree_label: OutdoorActive - Regionen
    source_places:
      sorting: 4
      source_type: places
      locales: [de]
      import_strategy: DataCycleCore::Generic::Common::ImportTags
      tree_label: OutdoorActive - Quellen
      tag_id_path: 'meta.source.id'
      tag_name_path: 'meta.source.name'
      external_id_prefix: 'SOURCE:'
    source_tours:
      sorting: 5
      source_type: tours
      locales: [de]
      import_strategy: DataCycleCore::Generic::Common::ImportTags
      tree_label: OutdoorActive - Quellen
      tag_id_path: 'meta.source.id'
      tag_name_path: 'meta.source.name'
      external_id_prefix: 'SOURCE:'
    frontendtype_places:
      sorting: 6
      source_type: places
      locales: [de]
      import_strategy: DataCycleCore::Generic::Common::ImportTags
      tree_label: OutdoorActive - FrontendTypes
      tag_id_path: 'frontendtype'
      tag_name_path: 'frontendtype'
      external_id_prefix: 'FRONTENDTYPE:'
      external_id_hash_method: 'MD5'
    frontendtype_tours:
      sorting: 7
      source_type: tours
      locales: [de]
      import_strategy: DataCycleCore::Generic::Common::ImportTags
      tree_label: OutdoorActive - FrontendTypes
      tag_id_path: 'frontendtype'
      tag_name_path: 'frontendtype'
      external_id_prefix: 'FRONTENDTYPE:'
      external_id_hash_method: 'MD5'
    tag_places:
      sorting: 8
      source_type: places
      locales: [de]
      import_strategy: DataCycleCore::Generic::Common::ImportTags
      tree_label: OutdoorActive - Tags
      tag_id_path: 'properties.property.tag'
      tag_name_path: 'properties.property.text'
      external_id_prefix: 'TAG:'
    tag_tours:
      sorting: 9
      source_type: tours
      locales: [de]
      import_strategy: DataCycleCore::Generic::Common::ImportTags
      tree_label: OutdoorActive - Tags
      tag_id_path: 'properties.property.tag'
      tag_name_path: 'properties.property.text'
      external_id_prefix: 'TAG:'
    places:
      sorting: 10
      source_type: places
      source_filter:
        'dump.de.frontendtype': 'poi'
        'dump.de.meta.workflow.state': 'published'
        'seen_at':
          '$gte': '{{ 3.days.ago.beginning_of_day }}'
      import_strategy: DataCycleCore::Generic::OutdoorActive::ImportPlaces
      transformations:
        image:
          template: Bild
        place:
          template: POI
    delete_places:
      sorting: 11
      import_strategy: DataCycleCore::Generic::Common::DeleteContents
      source_type: places
      source_filter:
        '$or':
          - 'dump.de.meta.workflow.state':
              '$ne': 'published'
          - 'seen_at':
              '$lt': '{{ 3.days.ago.beginning_of_day }}'
      external_key_path: 'id'
    tours:
      sorting: 20
      source_type: tours
      source_filter:
        'dump.de.meta.workflow.state': 'published'
        'seen_at':
          '$gte': '{{ 3.days.ago.beginning_of_day }}'
      import_strategy: DataCycleCore::Generic::OutdoorActive::ImportTours
      transformations:
        image:
          template: Bild
        tour:
          template: Tour
    delete_tours:
      sorting: 21
      import_strategy: DataCycleCore::Generic::Common::DeleteContents
      source_type: tours
      source_filter:
        '$or':
          - 'dump.de.meta.workflow.state':
              '$ne': 'published'
          - 'seen_at':
              '$lt': '{{ 3.days.ago.beginning_of_day }}'
      external_key_path: 'id'
  export_config:
    endpoint: DataCycleCore::Export::OutdoorActive::Endpoint
    update:
      strategy: DataCycleCore::Export::OutdoorActive::Update
    delete:
      strategy: DataCycleCore::Export::OutdoorActive::Delete
  refresh_config:
    endpoint: DataCycleCore::Export::OutdoorActive::Endpoint
    strategy: DataCycleCore::Export::OutdoorActive::JobStatus
