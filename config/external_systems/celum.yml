---
name: Celum
credentials:
  host: http://media.austrianwine.com/api/
  user: admin
  password: 'd9ZdhuxEdSPLJdk)av9RHyeh'
default_options:
  locales: [de]
config:
  download_config:
    keywords:
      sorting: 1
      source_type: keywords
      endpoint: DataCycleCore::Generic::Celum::Endpoint
      download_strategy: DataCycleCore::Generic::Celum::DownloadVerbose
    keyword_catalogs:
      sorting: 2
      source_type: keyword_catalogs
      endpoint: DataCycleCore::Generic::Celum::Endpoint
      download_strategy: DataCycleCore::Generic::Celum::DownloadVerbose
    users:
      sorting: 3
      source_type: users
      endpoint: DataCycleCore::Generic::Celum::Endpoint
      download_strategy: DataCycleCore::Generic::Celum::Download
    user_groups:
      sorting: 4
      source_type: user_groups
      endpoint: DataCycleCore::Generic::Celum::Endpoint
      download_strategy: DataCycleCore::Generic::Celum::Download
    folders:
      sorting: 5
      source_type: folders
      endpoint: DataCycleCore::Generic::Celum::Endpoint
      download_strategy: DataCycleCore::Generic::Celum::DownloadVerbose
    documents:
      sorting: 10
      source_type: documents
      endpoint: DataCycleCore::Generic::Celum::Endpoint
      download_strategy: DataCycleCore::Generic::Celum::DownloadVerbose
  import_config:
    keywords:
      sorting: 1
      source_type: keywords
      import_strategy: DataCycleCore::Generic::Celum::ImportKeywords
      tree_label: Celum - Keywords
      locales: [de]
    # keyword_catalogs:
    #   sorting: 2
    #   source_type: keyword_catalogs
    #   import_strategy: DataCycleCore::Generic::Celum::ImportKeywordCatalogs
    #   tree_label: Celum - KeywordCatalogs
    #   locales: [de]
    folders:
      sorting: 3
      source_type: folders
      import_strategy: DataCycleCore::Generic::Celum::ImportFolders
      tree_label: Celum - Folders
      locales: [de]
    users:
      sorting: 5
      source_type: users
      import_strategy: DataCycleCore::Generic::Celum::ImportUsers
      tree_label: Celum - Users
      external_id_prefix: 'Celum - User - '
      locales: [de]
    images:
      sorting: 10
      source_type: documents
      source_filter:
        'dump.de.assetType.#cdata-section': '1'
        'dump.de.fileExtension.#cdata-section':
          $in:
            - 'png'
            - 'gif'
            - 'jpg'
            - 'jpeg'
      import_strategy: DataCycleCore::Generic::Celum::ImportDocuments
      locales: [de]
      transformations:
        asset:
          template: Bild
          asset_type: DataCycleCore::Image
    audio:
      sorting: 11
      source_type: documents
      source_filter:
        'dump.de.assetType.#cdata-section': '4'
        'dump.de.fileExtension.#cdata-section': 'mp3'
      import_strategy: DataCycleCore::Generic::Celum::ImportDocuments
      locales: [de]
      transformations:
        asset:
          template: Audio
          asset_type: DataCycleCore::Audio
    video:
      sorting: 12
      source_type: documents
      source_filter:
        'dump.de.assetType.#cdata-section': '3'
        'dump.de.fileExtension.#cdata-section': 'mp4'
      import_strategy: DataCycleCore::Generic::Celum::ImportDocuments
      locales: [de]
      transformations:
        asset:
          template: Video
          asset_type: DataCycleCore::Video
    asset:
      sorting: 13
      source_type: documents
      source_filter:
        'dump.de.fileExtension.#cdata-section':
          $in:
            - 'ai'
            - 'eps'
            - 'ppt'
            - 'pptx'
      import_strategy: DataCycleCore::Generic::Celum::ImportDocuments
      locales: [de]
      transformations:
        asset:
          template: Datei
          asset_type: DataCycleCore::Asset
    pdf:
      sorting: 14
      source_type: documents
      source_filter:
        'dump.de.fileExtension.#cdata-section': 'pdf'
      import_strategy: DataCycleCore::Generic::Celum::ImportDocuments
      locales: [de]
      transformations:
        asset:
          template: PDF
          asset_type: DataCycleCore::Pdf
