---
name: OutdoorActive KW # to avaoid name collisions for tests
identifier: outdooractive
credentials:
  import:
    project: 'api-kaernten'
    key: 'IVCBFZ9K-EMWGKVPT-4OSSVBUY'
    host: http://www.outdooractive.com
    end_point: api/project
  export:
    xml:
      source: 'datacycle-kaernten'
    host: 'http://unknown'
    key: 'datacycle-kaernten'
default_options:
  locales: [de, en, it]
  external_url: 'https://dms.outdooractive.com/%{locale}/poi/%{external_key}'
  external_key_param: outdoor_active_id
config:
  download_config:
    tour_categories:
      sorting: 1
      source_type: tour_categories
      endpoint: DataCycleCore::Generic::OutdoorActive::Endpoint
      endpoint_method: tour_categories
      download_strategy: DataCycleCore::Generic::OutdoorActive::DownloadFull
    place_categories:
      sorting: 2
      source_type: place_categories
      endpoint: DataCycleCore::Generic::OutdoorActive::Endpoint
      endpoint_method: place_categories
      download_strategy: DataCycleCore::Generic::OutdoorActive::DownloadFull
    regions:
      sorting: 3
      source_type: regions
      endpoint: DataCycleCore::Generic::OutdoorActive::Endpoint
      download_strategy: DataCycleCore::Generic::OutdoorActive::DownloadFull
    places:
      sorting: 4
      source_type: places
      endpoint: DataCycleCore::Generic::OutdoorActive::Endpoint
      download_strategy: DataCycleCore::Generic::OutdoorActive::Download
    tours:
      sorting: 5
      source_type: tours
      endpoint: DataCycleCore::Generic::OutdoorActive::Endpoint
      download_strategy: DataCycleCore::Generic::OutdoorActive::Download
    external_categories:
      sorting: 5
      source_type: external_categories
      endpoint: DataCycleCore::Generic::OutdoorActive::CsvEndpoint
      download_strategy: DataCycleCore::Generic::OutdoorActive::CsvDownload
      filename: Outdooractive.Interface.CategoryKeys.csv
      locales: [de]
    external_source_keys:
      sorting: 5
      source_type: external_source_keys
      endpoint: DataCycleCore::Generic::OutdoorActive::CsvEndpoint
      download_strategy: DataCycleCore::Generic::OutdoorActive::CsvDownload
      filename: Outdooractive.Interface.SourceKeys.csv
      locales: [de]
    external_statuses:
      sorting: 6
      source_type: external_statuses
      endpoint: DataCycleCore::Generic::OutdoorActive::CsvEndpoint
      download_strategy: DataCycleCore::Generic::OutdoorActive::CsvDownload
      filename: Outdooractive.Interface.Statuses.csv
      locales: [de]
  import_config:
    tour_categories:
      sorting: 1
      source_type: tour_categories
      locales: [de]
      import_strategy: DataCycleCore::Generic::OutdoorActive::ImportCategories
      tree_label: OutdoorActive - Touren-Kategorien
    place_categories:
      sorting: 2
      source_type: place_categories
      locales: [de]
      import_strategy: DataCycleCore::Generic::OutdoorActive::ImportCategories
      tree_label: OutdoorActive - POI-Kategorien
    regions:
      sorting: 3
      source_type: regions
      import_strategy: DataCycleCore::Generic::OutdoorActive::ImportRegions
      locales: [de]
    source_tours:
      sorting: 4
      source_type: tours
      import_strategy: DataCycleCore::Generic::Common::ImportTags
      tree_label: OutdoorActive - Quellen
      tag_id_path: 'meta.source.id'
      tag_name_path: 'meta.source.name'
      external_id_prefix: 'SOURCE:'
      locales: [de]
    source_places:
      sorting: 5
      source_type: places
      import_strategy: DataCycleCore::Generic::Common::ImportTags
      tree_label: OutdoorActive - Quellen
      tag_id_path: 'meta.source.id'
      tag_name_path: 'meta.source.name'
      external_id_prefix: 'SOURCE:'
      locales: [de]
    frontendtype_tours:
      sorting: 6
      source_type: tours
      import_strategy: DataCycleCore::Generic::Common::ImportTags
      tree_label: OutdoorActive - FrontendTypes
      tag_id_path: 'frontendtype'
      tag_name_path: 'frontendtype'
      external_id_prefix: 'FRONTENDTYPE:'
      external_id_hash_method: 'MD5'
      locales: [de]
    frontendtype_places:
      sorting: 6
      source_type: places
      import_strategy: DataCycleCore::Generic::Common::ImportTags
      tree_label: OutdoorActive - FrontendTypes
      tag_id_path: 'frontendtype'
      tag_name_path: 'frontendtype'
      external_id_prefix: 'FRONTENDTYPE:'
      external_id_hash_method: 'MD5'
      locales: [de]
    tag_tours:
      sorting: 7
      source_type: tours
      import_strategy: DataCycleCore::Generic::Common::ImportTags
      tree_label: OutdoorActive - Tags
      tag_id_path: 'properties.property.tag'
      tag_name_path: 'properties.property.text'
      external_id_prefix: 'TAG:'
      locales: [de]
    tag_places:
      sorting: 8
      source_type: places
      import_strategy: DataCycleCore::Generic::Common::ImportTags
      tree_label: OutdoorActive - Tags
      tag_id_path: 'properties.property.tag'
      tag_name_path: 'properties.property.text'
      external_id_prefix: 'TAG:'
      locales: [de]
    tours:
      sorting: 20
      source_type: tours
      import_strategy: DataCycleCore::Generic::OutdoorActive::ImportTours
      transformations:
        image:
          template: Bild
        tour:
          template: Tour
    lodging_businesses:
      sorting: 25
      source_type: places
      import_strategy: DataCycleCore::Generic::OutdoorActive::ImportPlaces
      transformations:
        image:
          template: Bild
        place:
          template: Unterkunft
      source_filter:
        'dump.de.frontendtype': 'lodging'
        'dump.de.meta.workflow.state': 'published'
    external_categories:
      sorting: 37
      source_type: external_categories
      locales: [de]
      import_strategy: DataCycleCore::Generic::OutdoorActive::ImportCategories
      tree_label: OutdoorActive - System - Kategorien
    external_source_keys:
      sorting: 38
      source_type: external_source_keys
      locales: [de]
      import_strategy: DataCycleCore::Generic::OutdoorActive::ImportCategories
      tree_label: OutdoorActive - System - Quellen
    external_statuses:
      sorting: 39
      source_type: external_statuses
      locales: [de]
      import_strategy: DataCycleCore::Generic::OutdoorActive::ImportCategories
      tree_label: OutdoorActive - System - Stati
  export_config:
    endpoint: DataCycleCore::Export::OutdoorActive::Endpoint
    update:
      strategy: DataCycleCore::Export::OutdoorActive::Update
    delete:
      strategy: DataCycleCore::Export::OutdoorActive::Delete
  refresh_config:
    endpoint: DataCycleCore::Export::OutdoorActive::Endpoint
    strategy: DataCycleCore::Export::OutdoorActive::JobStatus
