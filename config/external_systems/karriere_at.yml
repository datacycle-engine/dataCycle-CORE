---
name: karriere.at
identifier: karriereat
deactivated: true
credentials:
  host: HOST
  end_point: ENDPOINT
  fbclid: FBCLID
default_options:
  locales: [de]
config:
  download_config:
    jobs:
      sorting: 1
      source_type: jobs
      endpoint: DataCycleCore::Generic::KarriereAt::Endpoint
      download_strategy: DataCycleCore::Generic::KarriereAt::Download
  import_config:
    keywords:
      sorting: 1
      source_type: jobs
      import_strategy: DataCycleCore::Generic::Common::ImportTags
      tree_label: karriere.at - Keywords
      tag_id_path: keywords
      tag_name_path: keywords
      external_id_prefix: 'karriere.at - Keyword - '
    employment_types:
      sorting: 2
      source_type: jobs
      import_strategy: DataCycleCore::Generic::Common::ImportTags
      tree_label: karriere.at - Employment Types
      tag_path: employmentTypes
      tag_id_path: employmentTypes.id
      tag_name_path: employmentTypes.label
      external_id_prefix: 'karriere.at - Employment Type - '
    job_fields:
      sorting: 3
      source_type: jobs
      import_strategy: DataCycleCore::Generic::Common::ImportTags
      tree_label: karriere.at - Job Fields
      tag_path: jobFields
      tag_id_path: jobFields.id
      tag_name_path: jobFields.label
      external_id_prefix: 'karriere.at - Job Field - '
    countries:
      sorting: 4
      source_type: jobs
      import_strategy: DataCycleCore::Generic::Common::ImportTags
      tree_label: karriere.at - Countries
      tag_path: countries
      tag_id_path: countries.label
      tag_name_path: countries.label
      external_id_prefix: 'karriere.at - Country - '
    states:
      sorting: 5
      source_type: jobs
      import_strategy: DataCycleCore::Generic::Common::ImportTags
      tree_label: karriere.at - States
      tag_path: states
      tag_id_path: states.label
      tag_name_path: states.label
      external_id_prefix: 'karriere.at - State - '
    jobs:
      sorting: 10
      source_type: jobs
      import_strategy: DataCycleCore::Generic::KarriereAt::ImportJob
      source_filter:
        seen_at:
          '$gte': '{{ 3.days.ago.beginning_of_day }}'
      transformations:
        organization:
          template: Organization
          default_values:
            data_type:
              tree_label: Inhaltstypen
              value: Organization
        place:
          template: Örtlichkeit
          default_value:
            data_type:
              tree_label: Inhaltstypen
              value: Örtlichkeit
        job:
          template: JobPosting
          default_values:
            data_type:
              tree_label: Inhaltstypen
              value: Jobs
    delete_jobs:
      sorting: 11
      import_strategy: DataCycleCore::Generic::Common::DeleteContents
      source_type: jobs
      source_filter:
        seen_at:
          '$lt': '{{ 3.days.ago.beginning_of_day }}'
      external_key_path: 'id.text'
