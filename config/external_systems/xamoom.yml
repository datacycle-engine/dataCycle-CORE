---
name: Xamoom
credentials:
  host: HOST
  end_point: ENDPOINT
  key: KEY
config:
  download_config:
    spots:
      sorting: 1
      source_type: spots
      endpoint: DataCycleCore::Generic::Xamoom::Endpoint
      download_strategy: DataCycleCore::Generic::Xamoom::Download
  import_config:
    tags:
      sorting: 1
      source_type: spots
      import_strategy: DataCycleCore::Generic::Common::ImportTags
      tree_label: 'Xamoom - Tags'
      tag_id_path: 'attributes.tags'
      tag_name_path: 'attributes.tags'
      external_id_prefix: 'Xamoom - tag - '
    spots:
      sorting: 2
      source_type: spots
      import_strategy: DataCycleCore::Generic::Xamoom::ImportSpots
      transformations:
        image:
          template: Bild
          default_values:
            data_type:
              tree_label: Inhaltstypen
              value: Bild
        spot:
          template: Örtlichkeit
          default_values:
            data_type:
              tree_label: Inhaltstypen
              value: Örtlichkeit
