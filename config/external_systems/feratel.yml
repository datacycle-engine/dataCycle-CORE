    #   source_type: DataCycleCore::Generic::SourceType::AdditionalServiceProvider
    #   target_type: DataCycleCore::Place
    #   image_template: Bild
    #   data_template: POI
    #   import_strategy: DataCycleCore::Generic::Feratel::ImportPlaces
    infrastructures:
      sorting: 20
      source_type: infrastructure_items
      import_strategy: DataCycleCore::Generic::Feratel::ImportInfrastructure
      transformations:
        image:
          template: Bild
        infrastructure:
          template: POI
    delete_infrastructures:
      sorting: 21
      import_strategy: DataCycleCore::Generic::Common::DeleteContents
      source_type: infrastructure_items
      source_filter:
        '$or':
          - "{{ ['dump', I18n.locale, 'deleted_at'].join('.') }}":
              '$lt': '{{ Time.zone.now }}'
      external_key_path: 'Id'
    accommodations:
      sorting: 22
      source_type: accommodations
      import_strategy: DataCycleCore::Generic::Feratel::ImportAccommodations
      transformations:
        image:
          template: Bild
        place:
          template: Unterkunft
    delete_accommodations:
      sorting: 23
      import_strategy: DataCycleCore::Generic::Common::DeleteContents
      source_type: accommodations
      source_filter:
        '$or':
          - "{{ ['dump', I18n.locale, 'deleted_at'].join('.') }}":
              '$lt': '{{ Time.zone.now }}'
      external_key_path: 'Id'
    serial_events:
      sorting: 24
      source_type: serial_events
      source_filter:
        '$and':
          - 'seen_at':
              '$gte': '{{ 3.days.ago.beginning_of_day }}'
      import_strategy: DataCycleCore::Generic::Feratel::ImportSerialEvents
      transformations:
        serial_event:
          template: Eventserie
    delete_serial_events:
      sorting: 25
      import_strategy: DataCycleCore::Generic::Common::DeleteContents
      source_type: serial_events
      source_filter:
        '$or':
          - 'seen_at':
              '$lt': '{{ 3.days.ago.beginning_of_day }}'
      external_key_path: 'Id'
    events:
      sorting: 26
      source_type: events
      import_strategy: DataCycleCore::Generic::Feratel::ImportEvents
      transformations:
        image:
          template: Bild
        place:
          template: Örtlichkeit
        event:
          template: Event
    delete_events:
      sorting: 27
      import_strategy: DataCycleCore::Generic::Common::DeleteContents
      source_type: events
      source_filter:
        '$or':
          - "{{ ['dump', I18n.locale, 'deleted_at'].join('.') }}":
              '$lt': '{{ Time.zone.now }}'
      external_key_path: 'Id'
