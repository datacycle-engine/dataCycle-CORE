# gitlab-ci configuration file

include:
  - project: 'data-cycle/data-cycle-core'
    ref: docker
    file: '/gitlab_templates/.gitlab-ci-dc-docker.yml'

variables:
  DOCKER_URL: 'http://core.datacycle.at'
  GITLAB_ENVIRONMENT: 'docker'

.local_test_vars: &local_test_vars
  variables:
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: 'password'
    POSTGRES_HOST: postgres
    POSTGRES_DB: data-cycle-base_test
    POSTGRES_PORT: '5432'
    MONGODB_HOST: mongodb
    RAILS_ENV: test
    TZ: Europe/Vienna

########################################################################
######################### Job Configuration HiddenFields
.rails_test_config:
  <<: *local_test_vars
  stage: test
  extends: .job_cache_config
  artifacts:
    name: '$CI_JOB_NAME'
    expire_in: 1 week
    paths:
      - coverage/
  script:
    - bundle exec rake db:drop
    - bundle exec rake db:create
    - bundle exec rake db:migrate
    - bundle exec rake db:seed
    - bundle exec rails test -b

########################################################################
######################### Branch Configuration
.docker_ci_config: &docker_ci
  only:
    - docker
  tags:
    - dc-docker

#.master_ci_config: &master_ci
