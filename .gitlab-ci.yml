image: git.pixelpoint.biz:5050/data-cycle/data-cycle-core/base:latest

variables:
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: 'password'
  POSTGRES_HOST: postgres
  POSTGRES_DB: data-cycle-base_test
  POSTGRES_PORT: '5432'
  MONGODB_HOST: mongodb
  RAILS_ENV: test
  TZ: Europe/Vienna

stages:
  - build
  - test
  - check
  - deploy

before_script:
  # uncomment for local testing (via local gitlab-runner)
  # delete me
  - 'which ssh-agent || ( apt-get update -y && apt-get install openssh-client -y )'
  - eval $(ssh-agent -s)
  - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add - > /dev/null
  # uncomment for local testing END
  - mkdir -p ~/.ssh
  - chmod 700 ~/.ssh
  - ssh-keyscan git.pixelpoint.biz >> ~/.ssh/known_hosts
  - chmod 644 ~/.ssh/known_hosts

  - gem install bundler
  - bundle config set --local path 'cache/bundler'
  - bundle install

  - dpkg-reconfigure -f noninteractive tzdata
  - ln -snf /usr/share/zoneinfo/$TZ /etc/localtime && echo $TZ > /etc/timezone

  - cd $CI_PROJECT_DIR
  - mkdir -p log
  - mkdir -p test/dummy/public/downloads
  - export RUBYOPT="-W:no-deprecated -W:no-experimental"

cache:
  key: application-cache
  untracked: false
  paths:
    - cache/bundler
    - node_modules
    - public/assets
    - tmp/cache/vite

services:
  - name: 'git.pixelpoint.biz:5050/data-cycle/data-cycle-core/postgres:latest'
    alias: postgres
    command: ['postgres']
  - name: mvertes/alpine-mongo:4.0.6-1
    alias: mongodb

########################################################################
######################### Job Configuration HiddenFields
.job_cache_config:
  cache:
    key: application-cache
    paths:
      - cache/bundler
      - node_modules
      - public/assets
      - tmp/cache/vite
    policy: pull

.build_caches_config:
  stage: build
  script:
    - gem install bundler
    - bundle config set --local path 'cache/bundler'
    - bundle install
    - npm install
    - npm update

.rails_test_config:
  extends: .job_cache_config
  artifacts:
    name: '$CI_JOB_NAME'
    expire_in: 1 week
    paths:
      - coverage/
  script:
    - bundle exec rake db:drop
    - bundle exec rake db:create
    - bundle exec rake db:migrate
    - bundle exec rake db:seed
    - bundle exec rails test -b

.code_validation_config:
  extends: .job_cache_config
  stage: check
  script:
    - bundle exec bundle-audit update
    - bundle exec bundle audit check --ignore CVE-2021-21288 CVE-2021-21305
    - bundle exec brakeman
    - bundle exec rubocop --format fuubar
    - bundle exec fasterer

.deploy_config:
  extends: .job_cache_config
  stage: deploy
  script:
    - echo "$DEPLOY_KEY" | tr -d '\r' | ssh-add - > /dev/null
    - bundle exec cap $CI_COMMIT_REF_NAME deploy
  allow_failure: false

########################################################################
######################### Branch Configuration HidenFields
.master_ci_config: &master_ci
  only:
    - master
  tags:
    - dc-core

.develop_ci_config: &develop_ci
  only:
    - develop
  tags:
    - dc-core-develop

.review_ci_config: &review_ci
  only:
    - branches
  except:
    - master
    - develop
  tags:
    - dc-core-review

########################################################################
######################### Master
build_caches:
  <<: *master_ci
  extends: .build_caches_config

rails_test:
  <<: *master_ci
  extends: .rails_test_config

code_validation:
  <<: *master_ci
  extends: .code_validation_config

####################### Deploy Master
deploy_master:
  <<: *master_ci
  extends: .deploy_config
  tags:
    - dc-core-deploy
  environment:
    name: production
    url: https://core.datacycle.at/
  when: manual

########################################################################
######################### Development
build_caches_develop:
  <<: *develop_ci
  extends: .build_caches_config

rails_test_develop:
  <<: *develop_ci
  extends: .rails_test_config

code_validation_develop:
  <<: *develop_ci
  extends: .code_validation_config

####################### Deploy Development
deploy_develop:
  <<: *develop_ci
  extends: .deploy_config
  tags:
    - dc-core-deploy
  environment:
    name: development
    url: https://core-develop.datacycle.at/
  when: manual

########################################################################
######################### Review Apps
build_review_caches:
  <<: *review_ci
  extends: .build_caches_config

rails_review_test:
  <<: *review_ci
  extends: .rails_test_config

code_review_validation:
  <<: *review_ci
  extends: .code_validation_config
