image: patrickrainer/data_cycle_base:2.5.1

variables:
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: ""
  POSTGRES_HOST: postgres
  POSTGRES_DB: data-cycle-base_test
  POSTGRES_PORT: "5432"
  MONGODB_HOST: mongodb
  RAILS_ENV: test
  TZ: Europe/Vienna

stages:
  - build
  - test
  - check
  - deploy

before_script:
# uncomment for local testing (via local gitlab-runner)
# delete me
  - 'which ssh-agent || ( apt-get update -y && apt-get install openssh-client -y )'
  - eval $(ssh-agent -s)
  - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add - > /dev/null
# uncomment for local testing END
  - mkdir -p ~/.ssh
  - chmod 700 ~/.ssh
  - ssh-keyscan git.pixelpoint.biz >> ~/.ssh/known_hosts
  - chmod 644 ~/.ssh/known_hosts

  - bundle install --path=cache/bundler

  - dpkg-reconfigure -f noninteractive tzdata
  - ln -snf /usr/share/zoneinfo/$TZ /etc/localtime && echo $TZ > /etc/timezone

  - cd $CI_PROJECT_DIR

cache:
  key: application-cache
  untracked: false
  paths:
    - cache/bundler
    - node_modules
    - lib/assets

services:
  - name: mdillon/postgis:9.6
    alias: postgres
  - name: mvertes/alpine-mongo:3.4.10-0
    alias: mongodb

########################################################################
######################### Job Configuration HiddenFields
.job_cache_config:
  cache:
    key: application-cache
    paths:
      - cache/bundler
      - node_modules
      - lib/assets
    policy: pull

.build_caches_config:
  stage: build
  script:
    - bundle install --path=cache/bundler
    - yarn
    - npx gulp production

.rails_test_config:
  extends: .job_cache_config
  script:
    - bundle exec rake db:drop
    - bundle exec rake db:create
    - bundle exec rake db:migrate
    - bundle exec rake db:seed
    - bundle exec rails test -b

.cypress_config:
  extends: .job_cache_config
  script:
    - bundle exec rake db:drop
    - bundle exec rake db:create
    - bundle exec rake db:migrate
    - bundle exec rake db:seed
    - bundle exec rake app:data_cycle_core:update:import_classifications
    - bundle exec rake app:data_cycle_core:update:import_templates
    - cd test/dummy && bundle exec rails server -b 0.0.0.0 -p 3000 -d
    - cd $CI_PROJECT_DIR && npx cypress run
  artifacts:
    name: "${CI_JOB_STAGE}_${CI_COMMIT_REF_NAME}_cypress"
    paths:
    - cypress/screenshots/
    expire_in: 1 week
    when: on_failure

.code_validation_config:
  extends: .job_cache_config
  stage: check
  script:
    - bundle exec bundle-audit update
    - bundle exec bundle audit check
    - bundle exec brakeman
    - bundle exec rubocop --format fuubar

.deploy_config:
  extends: .job_cache_config
  stage: deploy
  script:
    - echo "$DEPLOY_KEY" | tr -d '\r' | ssh-add - > /dev/null
    - bundle exec cap $CI_COMMIT_REF_NAME deploy
  allow_failure: false

########################################################################
######################### Branch Configuration HidenFields
.master_ci_config: &master_ci
  only:
    - master
    - develop
    - release
    - pre-release
  tags:
    - data-cycle-core

.review_ci_config: &review_ci
  only:
    - branches
  except:
    - master
    - release
    - pre-release
    - develop
  tags:
    - data-cycle-review

########################################################################
######################### Release / Pre-Release / Development
build_caches:
  <<: *master_ci
  extends: .build_caches_config

rails_test:
  <<: *master_ci
  extends: .rails_test_config

cypress:
  <<: *master_ci
  extends: .cypress_config

code_validation:
  <<: *master_ci
  extends: .code_validation_config

####################### Deploy Development
deploy_develop:
  <<: *master_ci
  only:
    - develop
  extends: .deploy_config
  environment:
    name: development
    url: http://core-development.datacycle.at/
  when: manual

########################################################################
######################### Review Apps
build_review_caches:
  <<: *review_ci
  extends: .build_caches_config

#rails_review_test:
#  <<: *review_ci
#  extends: .rails_test_config
#
#cypress_review:
#  <<: *review_ci
#  extends: .cypress_config
#
#code_review_validation:
#  <<: *review_ci
#  extends: .code_validation_config

deploy_review:
  <<: *review_ci
  extends: .job_cache_config
  stage: deploy
  script:
    - cd test/dummy && bundle exec rake tmp:create
    - cd $CI_PROJECT_DIR
    - echo "$DEPLOY_KEY" | tr -d '\r' | ssh-add - > /dev/null
    - bundle exec cap review deploy:initial branch=$CI_COMMIT_REF_NAME application=$CI_COMMIT_REF_SLUG
  environment:
    name: review/$CI_COMMIT_REF_NAME
    url: http://core-$CI_COMMIT_REF_SLUG.datacycle.at
    on_stop: stop_review
  when: manual
  allow_failure: false

stop_review:
  <<: *review_ci
  stage: deploy
  variables:
    GIT_STRATEGY: none
  before_script:
    # uncomment for local testing
    - 'which ssh-agent || ( apt-get update -y && apt-get install openssh-client -y )'
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add - > /dev/null
    # uncomment for local testing END
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan git.pixelpoint.biz >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts

    - git init
    - git remote add origin $CI_REPOSITORY_URL
    - git fetch
    - git reset origin/develop
    - git checkout -t origin/develop
    - git reset origin/develop --hard

    - bundle install --path=cache/bundler

    - cd $CI_PROJECT_DIR
  script:
    - echo "$DEPLOY_KEY" | tr -d '\r' | ssh-add - > /dev/null
    - bundle exec cap review review:undeploy application=$CI_COMMIT_REF_SLUG
  environment:
    name: review/$CI_COMMIT_REF_NAME
    action: stop
  when: manual
