########################################################################
######################### Development / Staging - Systems
include:
  - project: 'data-cycle/data-cycle-core'
    ref: develop
    file: '/gitlab_templates/.gitlab-ci-dc-common.yml'

.development_ci_config: &development_ci
  only:
    - develop
  tags:
    - dc-develop

build_caches_develop:
  <<: *development_ci
  extends: .build_caches_config

code_validation_develop:
  <<: *development_ci
  extends: .code_validation_config

deploy_develop:
  <<: *development_ci
  extends: .deploy_config
  tags:
    - dc-deploy
  environment:
    name: development
    url: $DEVELOPMENT_URL
  when: manual
