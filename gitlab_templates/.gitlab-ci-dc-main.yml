########################################################################
######################### Development / Staging - Systems
stages:
  - build
  - check
  - test
  - deploy

before_script:
  # uncomment for local testing
  - 'which ssh-agent || ( apt-get update -y && apt-get install openssh-client -y )'
  - eval $(ssh-agent -s)
  - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add - > /dev/null
  # uncomment for local testing END
  - mkdir -p ~/.ssh
  - chmod 700 ~/.ssh
  - ssh-keyscan git.pixelpoint.biz >> ~/.ssh/known_hosts
  - chmod 644 ~/.ssh/known_hosts

  - rm -Rf vendor/gems/data-cycle-core
  - git submodule sync --recursive
  - git submodule update --init --recursive --force

  - gem install bundler
  - bundle config set --local path 'cache/bundler'
  - bundle install

#  - dpkg-reconfigure -f noninteractive tzdata
#  - ln -snf /usr/share/zoneinfo/$TZ /etc/localtime && echo $TZ > /etc/timezone
  - export RUBYOPT="-W:no-deprecated -W:no-experimental"

########################################################################
######################### Branch Configuration
.master_ci_config: &master_ci
  only:
    - master
  tags:
    - dc-master

########################################################################
######################### Master / Production - Systems
build_caches:
  <<: *master_ci
  extends: .build_caches_config

code_validation:
  <<: *master_ci
  extends: .code_validation_config

deploy:
  <<: *master_ci
  extends: .deploy_config
  tags:
    - dc-deploy
  environment:
    name: production
    url: $PRODUCTION_URL
  when: manual
