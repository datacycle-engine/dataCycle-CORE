########################################################################
######################### Branch Configuration
.docker_develop_ci_config: &docker_develop_ci
  only:
    - develop
  tags:
    - dc-docker

########################################################################
######################### Master / Production - Systems
build_caches_develop:
  <<: *docker_develop_ci
  extends: .build_caches_config

code_validation_develop:
  <<: *docker_develop_ci
  extends: .code_validation_config

build-docker-job_develop:
  <<: *docker_develop_ci
  stage: build-docker
  image: docker:20.10
  variables:
    DOCKER_BUILDKIT: 1
    GIT_SUBMODULE_STRATEGY: recursive
  services:
    - docker:dind
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
  script:
    - docker build --pull -f vendor/gems/data-cycle-core/Dockerfile -t "$CI_REGISTRY_IMAGE" --target production .
    - docker push "$CI_REGISTRY_IMAGE"
  after_script:
    - docker logout $CI_REGISTRY

deploy-docker-job_develop:
  <<: *docker_develop_ci
  stage: deploy
  image: docker:20.10
  allow_failure: false
  variables:
    DOCKER_HOST: 'ssh://$DEPLOY_USER@$DEPLOY_TARGET'
    GIT_SUBMODULE_STRATEGY: recursive
  before_script:
    # Configure SSH
    - eval $(ssh-agent -s)
    - echo "$DEPLOY_KEY" | tr -d '\r' | ssh-add - > /dev/null
    - mkdir -p ~/.ssh
    - '[[ -f /.dockerenv ]] && echo -e "Host *\n\tStrictHostKeyChecking no\n\n" > ~/.ssh/config'
    # Configure Docker
    - apk add docker-compose
    - apk add bash
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
    - cp $PRODUCTION_ENVIRONMENT $(pwd)/.env.production
    - echo "APPSIGNAL_APP_REVISION=$CI_COMMIT_SHA" >> $(pwd)/.env.production
  script:
    # update ssh config of deployment target to support bigger number of active sessions
    # e.g. MaxSessions 20
    - echo "$DOCKER_HOST"
    - bash vendor/gems/data-cycle-core/docker/utility/ssh_helper.sh .env.production vendor/gems/data-cycle-core/docker/utility/check_bind_mounts.sh
    - docker-compose --env-file .env.production pull
    - docker-compose --env-file .env.production build
    - docker-compose --env-file .env.production --profile migrate run migrate_project bash /app/docker/utility/migrate.sh
    - docker-compose --env-file .env.production up --scale job_worker_cache_invalidation=2 --scale job_worker_search_update=3 -d --force-recreate
  after_script:
    - docker logout $CI_REGISTRY
  environment:
    name: $GITLAB_ENVIRONMENT_DEVELOPMENT
    url: $DOCKER_URL_DEVELOPMENT
    on_stop: stop-docker-job_develop
  when: manual

stop-docker-job_develop:
  <<: *docker_develop_ci
  stage: deploy
  image: docker:20.10
  allow_failure: false
  variables:
    DOCKER_HOST: 'ssh://$DEPLOY_USER@$DEPLOY_TARGET'
    GIT_SUBMODULE_STRATEGY: recursive
  before_script:
    # Configure SSH
    - eval $(ssh-agent -s)
    - echo "$DEPLOY_KEY" | tr -d '\r' | ssh-add - > /dev/null
    - mkdir -p ~/.ssh
    - '[[ -f /.dockerenv ]] && echo -e "Host *\n\tStrictHostKeyChecking no\n\n" > ~/.ssh/config'
    # Configure Docker
    - apk add docker-compose
    - apk add bash
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
    - cp $PRODUCTION_ENVIRONMENT $(pwd)/.env.production
  script:
    # update ssh config of deployment target to support bigger number of active sessions
    # e.g. MaxSessions 20
    - echo "$DOCKER_HOST"
    - docker-compose --env-file .env.production stop
  after_script:
    - docker logout $CI_REGISTRY
  environment:
    name: $GITLAB_ENVIRONMENT_DEVELOPMENT
    action: stop
  when: manual
