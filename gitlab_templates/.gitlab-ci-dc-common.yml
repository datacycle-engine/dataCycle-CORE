image: git.pixelpoint.biz:5050/data-cycle/data-cycle-core/base:latest

variables:
  GIT_SUBMODULE_STRATEGY: recursive
  PRODUCTION_URL: ''
  DEVELOPMENT_URL: ''
  DOCKER_URL: ''
  DOCKER_URL_DEVELOPMENT: ''
  GITLAB_ENVIRONMENT: ''
  GITLAB_ENVIRONMENT_DEVELOPMENT: ''

.local_test_vars: &local_test_vars
  variables:
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: 'password'
    POSTGRES_HOST: postgres
    POSTGRES_DB: data-cycle-base_test
    POSTGRES_PORT: '5432'
    MONGODB_HOST: mongodb
    #    POSTGRES_VERSION: 13
    RAILS_ENV: test
    TZ: Europe/Vienna

cache:
  key: application-cache
  untracked: false
  paths:
    - cache/bundler
    - node_modules
    - public/assets
    - tmp/cache/vite
    # - lib/assets
    # Enable for local rails test
    # - vendor/gems/data-cycle-core/node_modules
    # - vendor/gems/data-cycle-core/lib/assets

services:
  - name: 'git.pixelpoint.biz:5050/data-cycle/data-cycle-core/postgres:latest'
    alias: postgres
    command: ['postgres']
  - name: mvertes/alpine-mongo:4.0.6-1
    alias: mongodb

########################################################################
######################### Job Configuration
.job_cache_config:
  cache:
    key: application-cache
    paths:
      - cache/bundler
      - node_modules
      - public/assets
      - tmp/cache/vite
      # - lib/assets
      # Enable for local rails test
      # - vendor/gems/data-cycle-core/node_modules
      # - vendor/gems/data-cycle-core/lib/assets
    policy: pull

.build_caches_config:
  <<: *local_test_vars
  stage: build
  script:
    - gem install bundler
    - bundle config set --local path 'cache/bundler'
    - bundle install
    - cd $CI_PROJECT_DIR
    - yarn
    - yarn upgrade

.code_validation_config:
  <<: *local_test_vars
  extends: .job_cache_config
  stage: check
  script:
    - bundle exec bundle-audit update
    - bundle exec bundle audit check --ignore CVE-2021-21288 CVE-2021-21305
    - bundle exec brakeman -c vendor/gems/data-cycle-core/config/brakeman.yml
    - bundle exec rubocop --format fuubar
    - bundle exec fasterer

.rails_test_config:
  <<: *local_test_vars
  extends: .job_cache_config
  stage: test
  artifacts:
    name: "$CI_JOB_NAME"
    expire_in: 1 week
    paths:
      - coverage/
  script:
    - bundle exec rake db:drop
    - bundle exec rake db:create
    - bundle exec rake db:migrate
    - bundle exec rake db:seed
    - bundle exec rails test -b

.deploy_config:
  <<: *local_test_vars
  extends: .job_cache_config
  stage: deploy
  cache:
    policy: pull-push
  script:
    - echo "$DEPLOY_KEY" | tr -d '\r' | ssh-add - > /dev/null
    - bundle exec cap $CI_COMMIT_REF_NAME deploy
  allow_failure: false

